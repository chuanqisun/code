<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF to Markdown</title>
  </head>
  <body>
    <main>
      <h1>PDF to Markdown</h1>

      <input id="file" type="file" accept="application/pdf,.pdf" />
      <button id="convert" disabled>Convert</button>
      <button id="copy" disabled>Copy Markdown</button>
      <p id="status">Loading libraries…</p>

      <h2>Markdown</h2>
      <textarea id="output" rows="24" style="width: 100%"></textarea>

      <h2>Extracted images</h2>
      <section id="images"></section>
    </main>

    <script type="module">
      const liteParseUrl = "https://esm.sh/@llamaindex/liteparse-wasm@2.6.0";
      const liteParseWasmUrl = `${liteParseUrl}/liteparse_wasm_bg.wasm`;

      const fileInput = document.querySelector("#file");
      const convertButton = document.querySelector("#convert");
      const copyButton = document.querySelector("#copy");
      const output = document.querySelector("#output");
      const imagesElement = document.querySelector("#images");
      const status = document.querySelector("#status");

      const objectUrls = [];
      let parser;
      let mupdf;

      try {
        const liteparse = await import(liteParseUrl);
        await liteparse.default(liteParseWasmUrl);

        parser = new liteparse.LiteParse({
          ocrEnabled: false,
          outputFormat: "markdown",
        });

        mupdf = await import("https://cdn.jsdelivr.net/npm/mupdf@1.28.0/dist/mupdf.js");

        convertButton.disabled = false;
        status.textContent = "Ready.";
      } catch (error) {
        status.textContent = `Load failed: ${error.message}`;
      }

      function clearImages() {
        objectUrls.splice(0).forEach(URL.revokeObjectURL);
        imagesElement.replaceChildren();
      }

      function displayImage(data, filename) {
        const blob = new Blob([data], { type: "image/png" });
        const url = URL.createObjectURL(blob);
        objectUrls.push(url);

        const figure = document.createElement("figure");
        const caption = document.createElement("figcaption");
        const image = document.createElement("img");
        const download = document.createElement("a");

        caption.textContent = filename;

        image.src = url;
        image.alt = filename;
        image.loading = "lazy";
        image.style.maxWidth = "100%";

        download.href = url;
        download.download = filename;
        download.textContent = `Download ${filename}`;

        figure.append(caption, image, document.createElement("br"), download);

        imagesElement.append(figure);
      }

      async function extractImages(bytes) {
        const pdf = mupdf.Document.openDocument(bytes, "application/pdf");

        try {
          const pageCount = pdf.countPages();

          for (let pageIndex = 0; pageIndex < pageCount; pageIndex++) {
            const page = pdf.loadPage(pageIndex);
            const foundImages = [];

            const device = new mupdf.Device({
              fillImage(image) {
                foundImages.push(image);
              },
              fillImageMask(image) {
                foundImages.push(image);
              },
            });

            try {
              page.runPageContents(device, mupdf.Matrix.identity);
              device.close();

              for (let imageIndex = 0; imageIndex < foundImages.length; imageIndex++) {
                const sourceImage = foundImages[imageIndex];
                const pixmap = sourceImage.toPixmap();

                try {
                  const filename = `image_p${pageIndex + 1}_${imageIndex}.png`;
                  displayImage(pixmap.asPNG(), filename);
                } finally {
                  pixmap.destroy?.();
                }
              }
            } finally {
              device.destroy?.();
              page.destroy?.();
            }

            status.textContent = `Extracting images: page ${pageIndex + 1}/${pageCount}…`;

            await new Promise(requestAnimationFrame);
          }
        } finally {
          pdf.destroy?.();
        }
      }

      convertButton.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file) return;

        convertButton.disabled = true;
        copyButton.disabled = true;
        output.value = "";
        clearImages();

        try {
          const buffer = await file.arrayBuffer();

          status.textContent = "Converting PDF…";
          const result = await parser.parse(new Uint8Array(buffer));

          output.value = result.text;
          copyButton.disabled = false;

          status.textContent = "Extracting images…";
          await extractImages(new Uint8Array(buffer));

          status.textContent = "Done.";
        } catch (error) {
          console.error(error);
          status.textContent = `Conversion failed: ${error.message}`;
        } finally {
          convertButton.disabled = false;
        }
      });

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(output.value);
        status.textContent = "Markdown copied.";
      });

      window.addEventListener("pagehide", clearImages);
    </script>
  </body>
</html>
