<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fast Metaball Demo</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from "https://esm.sh/three@0.180.0/build/three.module.js";
      import { OrbitControls } from "https://esm.sh/three@0.180.0/examples/jsm/controls/OrbitControls.js";

      // ===== Parameters =====
      const GRID_SIZE = 20;
      const GRID_DEPTH = 1;
      const INITIAL_SPHERES = 40;
      const MOVE_DURATION = 0.2;
      const WAIT_DURATION = 0;
      const SPHERE_RADIUS = 0.1;
      const METABALL_THRESHOLD = 0.35;
      const RAYMARCH_STEPS = 8;
      const REFINE_STEPS = 4;
      // ======================

      const TOTAL_POINTS = GRID_SIZE * GRID_SIZE * GRID_DEPTH;
      const SPHERE_COUNT = Math.min(INITIAL_SPHERES, TOTAL_POINTS);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
      camera.position.set(0, 0, 9);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.update();

      const cubeSize = 4;
      const half = cubeSize / 2;
      const wallDepth = Math.max(SPHERE_RADIUS * 2.0, 0.2);

      function makeCoords(gridSize, worldSize) {
        const arr = [];
        if (gridSize === 1) return [0];
        for (let i = 0; i < gridSize; i++) arr.push(-worldSize / 2 + (worldSize * i) / (gridSize - 1));
        return arr;
      }

      function toIndex(ix, iy, iz) {
        return ix + GRID_SIZE * (iy + GRID_SIZE * iz);
      }
      function fromIndex(index) {
        return {
          ix: index % GRID_SIZE,
          iy: Math.floor(index / GRID_SIZE) % GRID_SIZE,
          iz: Math.floor(index / (GRID_SIZE * GRID_SIZE)),
        };
      }
      function neighbors(index) {
        const { ix, iy, iz } = fromIndex(index);
        const out = [];
        if (ix > 0) out.push(toIndex(ix - 1, iy, iz));
        if (ix < GRID_SIZE - 1) out.push(toIndex(ix + 1, iy, iz));
        if (iy > 0) out.push(toIndex(ix, iy - 1, iz));
        if (iy < GRID_SIZE - 1) out.push(toIndex(ix, iy + 1, iz));
        if (iz > 0) out.push(toIndex(ix, iy, iz - 1));
        if (iz < GRID_DEPTH - 1) out.push(toIndex(ix, iy, iz + 1));
        return out;
      }

      const coords = makeCoords(GRID_SIZE, cubeSize);
      const depthCoords = makeCoords(GRID_DEPTH, wallDepth);
      const points = [];
      for (let iz = 0; iz < GRID_DEPTH; iz++)
        for (let iy = 0; iy < GRID_SIZE; iy++) for (let ix = 0; ix < GRID_SIZE; ix++) points.push(new THREE.Vector3(coords[ix], coords[iy], depthCoords[iz]));

      const neighborMap = Array.from({ length: points.length }, (_, i) => neighbors(i));

      const boundsPad = 0.6;
      const halfDepth = wallDepth / 2;
      const boundsMin = new THREE.Vector3(-half - boundsPad, -half - boundsPad, -halfDepth - boundsPad);
      const boundsMax = new THREE.Vector3(half + boundsPad, half + boundsPad, halfDepth + boundsPad);

      const uniforms = {
        uCam: { value: new THREE.Vector3() },
        uSphereCount: { value: SPHERE_COUNT },
        uCenters: { value: Array.from({ length: SPHERE_COUNT }, () => new THREE.Vector3()) },
        uRadius: { value: SPHERE_RADIUS },
        uThreshold: { value: METABALL_THRESHOLD },
        uBoundsMin: { value: boundsMin.clone() },
        uBoundsMax: { value: boundsMax.clone() },
      };

      const metaball = new THREE.Mesh(
        new THREE.BoxGeometry(boundsMax.x - boundsMin.x, boundsMax.y - boundsMin.y, boundsMax.z - boundsMin.z),
        new THREE.ShaderMaterial({
          uniforms,
          side: THREE.DoubleSide,
          vertexShader: `
        varying vec3 vWorldPos;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }
      `,
          fragmentShader: `
        precision highp float;

        varying vec3 vWorldPos;
        uniform vec3 uCam;
        uniform int uSphereCount;
        uniform vec3 uCenters[${SPHERE_COUNT}];
        uniform float uRadius;
        uniform float uThreshold;
        uniform vec3 uBoundsMin;
        uniform vec3 uBoundsMax;

        float fieldAt(vec3 p) {
          float r2 = uRadius * uRadius;
          float f = 0.0;
          for (int i = 0; i < ${SPHERE_COUNT}; i++) {
            if (i >= uSphereCount) break;
            vec3 d = p - uCenters[i];
            f += r2 / max(dot(d, d), 0.0001);
          }
          return f;
        }

        bool hitBox(vec3 ro, vec3 rd, vec3 bmin, vec3 bmax, out float t0, out float t1) {
          vec3 inv = 1.0 / rd;
          vec3 tMin = (bmin - ro) * inv;
          vec3 tMax = (bmax - ro) * inv;
          vec3 lo = min(tMin, tMax);
          vec3 hi = max(tMin, tMax);
          t0 = max(max(lo.x, lo.y), lo.z);
          t1 = min(min(hi.x, hi.y), hi.z);
          return t1 >= max(t0, 0.0);
        }

        void main() {
          vec3 ro = uCam;
          vec3 rd = normalize(vWorldPos - uCam);

          float t0, t1;
          if (!hitBox(ro, rd, uBoundsMin, uBoundsMax, t0, t1)) discard;

          t0 = max(t0, 0.0);
          float dt = (t1 - t0) / float(${RAYMARCH_STEPS});
          float prevT = t0;
          float prevF = fieldAt(ro + rd * prevT);

          bool found = false;
          float hitT = t0;

          if (prevF >= uThreshold) {
            found = true;
            hitT = t0;
          } else {
            for (int i = 1; i <= ${RAYMARCH_STEPS}; i++) {
              float t = t0 + float(i) * dt;
              float f = fieldAt(ro + rd * t);
              if (f >= uThreshold) {
                float a = prevT, b = t;
                for (int j = 0; j < ${REFINE_STEPS}; j++) {
                  float m = 0.5 * (a + b);
                  if (fieldAt(ro + rd * m) >= uThreshold) b = m; else a = m;
                }
                hitT = b;
                found = true;
                break;
              }
              prevT = t;
              prevF = f;
            }
          }

          if (!found) discard;

          vec3 p = ro + rd * hitT;
          float field = fieldAt(p);
          float level = max(field - uThreshold, 0.0);

          float contourFrequency = 36.0;
          float band = fract(level * contourFrequency);
          float line = 1.0 - smoothstep(0.08, 0.16, min(band, 1.0 - band));

          float terrace = smoothstep(0.0, 1.2, level);
          float fill = mix(0.05, 0.22, terrace);
          float ink = mix(fill, 0.92, line);

          gl_FragColor = vec4(vec3(ink), 1.0);
        }
      `,
        })
      );
      scene.add(metaball);

      function randInt(n) {
        return (Math.random() * n) | 0;
      }
      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = randInt(i + 1);
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }
      function sampleDistinct(count, total) {
        const used = new Set();
        while (used.size < count) used.add(randInt(total));
        return [...used];
      }

      const initialIds = sampleDistinct(SPHERE_COUNT, points.length);
      const spheres = initialIds.map((i) => ({
        index: i,
        pos: points[i].clone(),
        start: points[i].clone(),
        target: points[i].clone(),
      }));

      let phase = "move";
      let phaseStart = performance.now() * 0.001;

      function assignMovesRecursive(order, occupiedStatic, targets) {
        if (order.length === 0) return true;
        const si = order[0];
        const current = spheres[si].index;
        const options = neighborMap[current].filter((ni) => !occupiedStatic.has(ni) && !targets.has(ni));
        shuffle(options);
        for (const ni of options) {
          targets.add(ni);
          spheres[si].nextIndex = ni;
          if (assignMovesRecursive(order.slice(1), occupiedStatic, targets)) return true;
          targets.delete(ni);
        }
        return false;
      }

      function startMove() {
        for (const s of spheres) {
          s.start.copy(s.pos);
          s.target.copy(s.pos);
          s.nextIndex = s.index;
        }
        const order = shuffle([...Array(spheres.length).keys()]);
        if (assignMovesRecursive(order, new Set(), new Set())) {
          for (const s of spheres) {
            s.index = s.nextIndex;
            s.target.copy(points[s.index]);
          }
        }
        phase = "move";
        phaseStart = performance.now() * 0.001;
      }

      startMove();

      function smooth(t) {
        return t * t * (3.0 - 2.0 * t);
      }

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      renderer.setAnimationLoop(() => {
        const now = performance.now() * 0.001;
        const e = now - phaseStart;

        if (phase === "move") {
          const t = Math.min(e / MOVE_DURATION, 1.0);
          const k = smooth(t);
          for (const s of spheres) s.pos.lerpVectors(s.start, s.target, k);
          if (t >= 1.0) {
            for (const s of spheres) s.pos.copy(s.target);
            phase = "wait";
            phaseStart = now;
          }
        } else if (e >= WAIT_DURATION) {
          startMove();
        }

        uniforms.uCam.value.copy(camera.position);
        uniforms.uSphereCount.value = SPHERE_COUNT;
        for (let i = 0; i < SPHERE_COUNT; i++) uniforms.uCenters.value[i].copy(spheres[i].pos);

        controls.update();
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
