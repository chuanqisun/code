<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Space</title>
    <style>
      :root {
        --selection-color: rgba(0, 120, 215, 0.4);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #workspace {
        position: absolute;
        inset: 0;
        background: Canvas;
        overflow: hidden;
        user-select: text;
      }
      .box {
        position: absolute;
        display: inline-block;
      }
      .text {
        min-width: 14px;
        min-height: 28px;
        padding: 5px 6px;
        border: 1px dashed color-mix(in srgb, Canvas 70%, CanvasText 30%);
        background: Canvas;
        white-space: pre-wrap;
        word-break: break-word;
        outline: none;
        font: 22px/28px monospace;

        &::selection {
          background: var(--selection-color);
        }
      }
      .box.selected > .text {
        border-color: currentColor;
        border-style: solid;
      }
      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .bot-sel {
        position: absolute;
        top: 7px;
        height: 24px;
        background: var(--selection-color);
        display: none;
      }
      .bot-caret {
        position: absolute;
        top: 5px;
        width: 1px;
        height: 28px;
        background: #000;
        display: none;
      }
      .bot-lock {
        /* Invisible wrapper — used as a DOM lock, not a visual element */
      }
      #cursorLayer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
      }
      .bot-cursor {
        position: fixed;
        left: 0;
        top: 0;
        width: 24px;
        height: 24px;
        pointer-events: none;
      }
      .click {
        position: fixed;
        width: 12px;
        height: 12px;
        margin-left: -6px;
        margin-top: -6px;
        border: 1px solid CanvasText;
        border-radius: 999px;
        pointer-events: none;
        animation: pop 0.25s ease-out forwards;
      }
      @keyframes pop {
        from {
          opacity: 0.8;
          transform: scale(0.6);
        }
        to {
          opacity: 0;
          transform: scale(1.8);
        }
      }
    </style>
  </head>
  <body>
    <div id="workspace"></div>
    <div id="cursorLayer"></div>

    <script type="module">
      // ─── IMPORTS ──────────────────────────────────────────────────
      import { FONT, measureCharWidth, placeCaretEnd, showClick, nextZIndex, createBox as createBoxEl } from "./edit.js";
      import { createEventBus } from "./events.js";
      import { INITIAL_BOTS, ecologyLoop } from "./pool.js";
      import { initSound } from "./sound.js";
      import { Bot } from "./bot.js";

      // ─── LOCAL HELPERS ────────────────────────────────────────────
      function wsRect() {
        return workspace.getBoundingClientRect();
      }

      // ─── DOM REFS & STATE ─────────────────────────────────────────
      const workspace = document.getElementById("workspace");
      const cursorLayer = document.getElementById("cursorLayer");
      const eventBus = createEventBus();
      initSound(eventBus);
      const boxes = [];
      const bots = new Map();
      let boxSeq = 0;
      let botSeq = 0;
      const CHAR_W = measureCharWidth(FONT);

      // ─── BOX CREATION WRAPPER ─────────────────────────────────────
      function createBox(left, top, text) {
        const box = createBoxEl(++boxSeq, left, top, text, workspace, eventBus);
        boxes.push(box);
        return box;
      }

      // ─── BOT CONTEXT ──────────────────────────────────────────────
      const botCtx = { boxes, cursorLayer, charW: CHAR_W, wsRect, createBox, eventBus };

      // ─── MAIN LOOPS ──────────────────────────────────────────────
      function spawnBot() {
        const bot = new Bot(++botSeq, botCtx);
        bots.set(bot.id, bot);
        bot.loop().finally(() => bots.delete(bot.id));
      }

      function activeBotCount() {
        return [...bots.values()].filter((b) => !b.retiring).length;
      }

      // ─── HUMAN INTERACTION ───────────────────────────────────────

      // Ripple on every human click
      workspace.addEventListener("mousedown", (e) => {
        showClick(e.clientX, e.clientY, cursorLayer);
      });

      // Click on empty space → create new box
      workspace.addEventListener("click", (e) => {
        if (e.target !== workspace) return;
        const r = wsRect();
        const box = createBox(e.clientX - r.left, e.clientY - r.top, "");
        box.textEl.focus();
        placeCaretEnd(box.textEl);
      });

      // ─── Selection & drag-to-move ─────────────────────────────────
      let selectedBox = null;
      let dragging = null; // { box, offsetX, offsetY }

      function selectBox(box) {
        if (selectedBox && selectedBox !== box) selectedBox.el.classList.remove("selected");
        selectedBox = box;
        if (box) {
          box.el.classList.add("selected");
          box.el.style.zIndex = nextZIndex();
        }
      }

      // Click on a box → select it & bring to front
      workspace.addEventListener("mousedown", (e) => {
        const boxEl = e.target.closest(".box");
        if (!boxEl) {
          // Clicked empty space → deselect
          if (selectedBox) {
            selectedBox.el.classList.remove("selected");
            selectedBox = null;
          }
          return;
        }
        const box = boxEl._box;
        selectBox(box);

        // Start drag if mousedown is near the border (within 8px of edge)
        const rect = boxEl.getBoundingClientRect();
        const mx = e.clientX,
          my = e.clientY;
        const insetL = mx - rect.left,
          insetR = rect.right - mx;
        const insetT = my - rect.top,
          insetB = rect.bottom - my;
        const EDGE = 10;
        const nearBorder = insetL < EDGE || insetR < EDGE || insetT < EDGE || insetB < EDGE;
        if (nearBorder) {
          e.preventDefault(); // prevent text selection during drag
          dragging = { box, offsetX: mx - rect.left, offsetY: my - rect.top };
        }
      });

      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        const r = wsRect();
        const newLeft = e.clientX - r.left - dragging.offsetX;
        const newTop = e.clientY - r.top - dragging.offsetY;
        dragging.box.el.style.left = newLeft + "px";
        dragging.box.el.style.top = newTop + "px";
      });

      window.addEventListener("mouseup", () => {
        dragging = null;
      });

      // Start immediately
      for (let i = 0; i < INITIAL_BOTS; i++) setTimeout(spawnBot, i * 150);
      ecologyLoop({
        activeBotCount,
        spawnBot,
        getActiveBots: () => [...bots.values()].filter((b) => !b.retiring),
      });
    </script>
  </body>
</html>
