<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Space</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #workspace {
        position: absolute;
        inset: 0;
        background: #fff;
        overflow: hidden;
        user-select: text;
      }
      .box {
        position: absolute;
        display: inline-block;
      }
      .text {
        min-width: 14px;
        min-height: 28px;
        padding: 5px 6px;
        border: 1px dashed #bbb;
        background: #fff;
        white-space: pre;
        outline: none;
        font: 22px/28px monospace;
      }
      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .bot-sel {
        position: absolute;
        top: 7px;
        height: 24px;
        background: rgba(0, 120, 215, 0.28);
        display: none;
      }
      .bot-caret {
        position: absolute;
        top: 5px;
        width: 1px;
        height: 28px;
        background: #000;
        display: none;
      }
      #cursorLayer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
      }
      .bot-cursor {
        position: fixed;
        left: 0;
        top: 0;
        width: 24px;
        height: 24px;
        pointer-events: none;
      }
      .click {
        position: fixed;
        width: 12px;
        height: 12px;
        margin-left: -6px;
        margin-top: -6px;
        border: 1px solid #000;
        border-radius: 999px;
        pointer-events: none;
        animation: pop 0.25s ease-out forwards;
      }
      @keyframes pop {
        from {
          opacity: 0.8;
          transform: scale(0.6);
        }
        to {
          opacity: 0;
          transform: scale(1.8);
        }
      }
    </style>
  </head>
  <body>
    <div id="workspace"></div>
    <div id="cursorLayer"></div>

    <script type="module">
      // ─── IMPORTS ──────────────────────────────────────────────────
      import { FONT, measureCharWidth, placeCaretEnd, createBox as createBoxEl } from "./edit.js";
      import { createEventBus } from "./events.js";
      import { INITIAL_BOTS, ecologyLoop } from "./pool.js";
      import { initSound } from "./sound.js";
      import { Bot } from "./bot.js";

      // ─── LOCAL HELPERS ────────────────────────────────────────────
      function wsRect() {
        return workspace.getBoundingClientRect();
      }

      // ─── DOM REFS & STATE ─────────────────────────────────────────
      const workspace = document.getElementById("workspace");
      const cursorLayer = document.getElementById("cursorLayer");
      const eventBus = createEventBus();
      initSound(eventBus);
      const boxes = [];
      const bots = new Map();
      let boxSeq = 0;
      let botSeq = 0;
      const CHAR_W = measureCharWidth(FONT);

      // ─── BOX CREATION WRAPPER ─────────────────────────────────────
      function createBox(left, top, text) {
        const box = createBoxEl(++boxSeq, left, top, text, workspace, eventBus);
        boxes.push(box);
        return box;
      }

      // ─── BOT CONTEXT ──────────────────────────────────────────────
      const botCtx = { boxes, cursorLayer, charW: CHAR_W, wsRect, createBox, eventBus };

      // ─── MAIN LOOPS ──────────────────────────────────────────────
      function spawnBot() {
        const bot = new Bot(++botSeq, botCtx);
        bots.set(bot.id, bot);
        bot.loop().finally(() => bots.delete(bot.id));
      }

      function activeBotCount() {
        return [...bots.values()].filter((b) => !b.retiring).length;
      }

      // Human interaction
      workspace.addEventListener("click", (e) => {
        if (e.target !== workspace) return;
        const r = wsRect();
        const box = createBox(e.clientX - r.left, e.clientY - r.top, "");
        box.textEl.focus();
        placeCaretEnd(box.textEl);
      });

      // Start immediately
      for (let i = 0; i < INITIAL_BOTS; i++) setTimeout(spawnBot, i * 150);
      ecologyLoop({
        activeBotCount,
        spawnBot,
        getActiveBots: () => [...bots.values()].filter((b) => !b.retiring),
      });
    </script>
  </body>
</html>
