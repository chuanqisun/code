<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ascii cube editor</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05080c;
      }
      #hud {
        position: fixed;
        top: 10px;
        left: 12px;
        color: #5fd4e8;
        font: 12px/1.6 monospace;
        white-space: pre;
        pointer-events: none;
        user-select: none;
        text-shadow: 0 0 8px rgba(0, 255, 255, 0.25);
      }
      #hud b {
        color: #eaffff;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="hud"></div>
    <script type="module">
      import * as THREE from "https://esm.sh/three@0.184.0/build/three.module.js";
      import { OrbitControls } from "https://esm.sh/three@0.184.0/examples/jsm/controls/OrbitControls.js";

      const N = 16,
        H = N / 2;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05080c);

      // ---- camera: orthographic three-quarter view ----
      const camera = new THREE.OrthographicCamera();
      camera.position.set(42, 36, 42);
      camera.near = 0.1;
      camera.far = 500;
      function resize() {
        const a = innerWidth / innerHeight,
          s = 26;
        camera.left = -s * a;
        camera.right = s * a;
        camera.top = s;
        camera.bottom = -s;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      }
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(devicePixelRatio);
      document.body.appendChild(renderer.domElement);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      addEventListener("resize", resize);
      resize();

      // ---- cube bounds ----
      const box = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(N, N, N)), new THREE.LineBasicMaterial({ color: 0x1e4a55 }));
      scene.add(box);

      // axis hints
      function axisLine(dir, color) {
        const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-H, -H, -H), new THREE.Vector3(-H, -H, -H).add(dir.multiplyScalar(6))]);
        scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color })));
      }

      // ---- state ----
      let axis = 2;
      let slice = H;
      let cu = 0,
        cv = N - 1;
      const data = new Map();
      const glyphs = new Map();
      const p = (i) => i - H + 0.5;
      const key = (x, y, z) => x + "," + y + "," + z;

      function cellOf(u, v, s = slice, a = axis) {
        return a === 0 ? [s, v, u] : a === 1 ? [u, s, v] : [u, v, s];
      }
      function uvOf(x, y, z, a = axis) {
        return a === 0 ? [z, y, x] : a === 1 ? [x, z, y] : [x, y, z];
      }

      // ---- char texture cache (with glow) ----
      const texCache = new Map();
      function charTex(ch) {
        if (texCache.has(ch)) return texCache.get(ch);
        const c = document.createElement("canvas");
        c.width = c.height = 64;
        const g = c.getContext("2d");
        g.font = "48px monospace";
        g.textAlign = "center";
        g.textBaseline = "middle";
        g.shadowColor = "rgba(140,255,255,0.9)";
        g.shadowBlur = 10;
        g.fillStyle = "#fff";
        g.fillText(ch, 32, 36);
        g.shadowBlur = 0;
        g.fillText(ch, 32, 36);
        const t = new THREE.CanvasTexture(c);
        t.minFilter = THREE.LinearFilter;
        texCache.set(ch, t);
        return t;
      }

      const glyphGeo = new THREE.PlaneGeometry(0.95, 0.95);
      function orientGlyph(mesh, a) {
        mesh.rotation.set(0, 0, 0);
        if (a === 0) {
          mesh.rotation.y = Math.PI / 2;
        } else if (a === 1) {
          mesh.rotation.x = -Math.PI / 2;
        }
      }

      function setChar(x, y, z, ch, a = axis) {
        const k = key(x, y, z);
        if (glyphs.has(k)) {
          scene.remove(glyphs.get(k));
          glyphs.get(k).material.dispose();
          glyphs.delete(k);
        }
        if (ch === null) {
          data.delete(k);
          return;
        }
        data.set(k, { ch, axis: a });
        const m = new THREE.MeshBasicMaterial({ map: charTex(ch), transparent: true, side: THREE.DoubleSide, depthWrite: false });
        const mesh = new THREE.Mesh(glyphGeo, m);
        orientGlyph(mesh, a);
        mesh.position.set(p(x), p(y), p(z));
        mesh.userData.cell = [x, y, z];
        scene.add(mesh);
        glyphs.set(k, mesh);
      }

      function refreshDim() {
        for (const mesh of glyphs.values()) {
          const [x, y, z] = mesh.userData.cell;
          const inSlice = uvOf(x, y, z)[2] === slice;
          if (inSlice) {
            // active slice: bright hot cyan-white
            mesh.material.opacity = 1;
            mesh.material.color.set(0xccffff);
            mesh.renderOrder = 2;
          } else {
            // off-plane: clearly readable, cooler teal tone
            mesh.material.opacity = 0.6;
            mesh.material.color.set(0x4fa8b8);
            mesh.renderOrder = 1;
          }
        }
      }

      // ---- slice plane + grid ----
      const planeMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(N, N),
        new THREE.MeshBasicMaterial({ color: 0x00ccee, transparent: true, opacity: 0.1, side: THREE.DoubleSide, depthWrite: false }),
      );
      scene.add(planeMesh);
      const grid = new THREE.GridHelper(N, N, 0x00e5ff, 0x0c5566);
      grid.material.transparent = true;
      grid.material.opacity = 0.65;
      scene.add(grid);
      // bright frame around active slice
      const frame = new THREE.LineLoop(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-H, -H, 0),
          new THREE.Vector3(H, -H, 0),
          new THREE.Vector3(H, H, 0),
          new THREE.Vector3(-H, H, 0),
        ]),
        new THREE.LineBasicMaterial({ color: 0x00ffff }),
      );
      scene.add(frame);

      // cursor
      const cursor = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)), new THREE.LineBasicMaterial({ color: 0xff2d78 }));
      scene.add(cursor);

      const AXN = ["X", "Y", "Z"];
      function updateView() {
        const off = p(slice);
        planeMesh.rotation.set(0, 0, 0);
        grid.rotation.set(0, 0, 0);
        frame.rotation.set(0, 0, 0);
        if (axis === 0) {
          planeMesh.rotation.y = Math.PI / 2;
          planeMesh.position.set(off, 0, 0);
          grid.rotation.z = Math.PI / 2;
          grid.position.set(off, 0, 0);
          frame.rotation.y = Math.PI / 2;
          frame.position.set(off, 0, 0);
        } else if (axis === 1) {
          planeMesh.rotation.x = Math.PI / 2;
          planeMesh.position.set(0, off, 0);
          grid.position.set(0, off, 0);
          frame.rotation.x = Math.PI / 2;
          frame.position.set(0, off, 0);
        } else {
          planeMesh.position.set(0, 0, off);
          grid.rotation.x = Math.PI / 2;
          grid.position.set(0, 0, off);
          frame.position.set(0, 0, off);
        }
        const [x, y, z] = cellOf(cu, cv);
        cursor.position.set(p(x), p(y), p(z));
        refreshDim();
        hud();
      }

      function hud() {
        const [x, y, z] = cellOf(cu, cv);
        document.getElementById("hud").innerHTML = `<b>▚ ASCII CUBE 16³</b>
axis  <b>${AXN[axis]}</b>   (Tab to cycle)
slice <b>${String(slice).padStart(2, "0")}</b>/31 ([ ] or PgUp/PgDn)
cell  <b>${x},${y},${z}</b>
type to write · arrows move · click grid to place cursor
enter newline · backspace erase · drag to orbit`;
      }

      // ---- input ----
      addEventListener("keydown", (e) => {
        if (e.metaKey || e.ctrlKey) return;
        const k = e.key;
        if (k === "Tab") {
          e.preventDefault();
          axis = (axis + 1) % 3;
        } else if (k === "[" || k === "PageDown") {
          slice = Math.max(0, slice - 1);
        } else if (k === "]" || k === "PageUp") {
          slice = Math.min(N - 1, slice + 1);
        } else if (k === "ArrowLeft") {
          cu = Math.max(0, cu - 1);
        } else if (k === "ArrowRight") {
          cu = Math.min(N - 1, cu + 1);
        } else if (k === "ArrowUp") {
          cv = Math.min(N - 1, cv + 1);
        } else if (k === "ArrowDown") {
          cv = Math.max(0, cv - 1);
        } else if (k === "Enter") {
          cu = 0;
          cv = Math.max(0, cv - 1);
        } else if (k === "Backspace") {
          cu = Math.max(0, cu - 1);
          const [x, y, z] = cellOf(cu, cv);
          setChar(x, y, z, null);
        } else if (k === "Delete") {
          const [x, y, z] = cellOf(cu, cv);
          setChar(x, y, z, null);
        } else if (k.length === 1) {
          const [x, y, z] = cellOf(cu, cv);
          setChar(x, y, z, k === " " ? null : k, axis);
          cu = Math.min(N - 1, cu + 1);
          e.preventDefault();
        } else return;
        updateView();
      });

      // click-to-place cursor
      const ray = new THREE.Raycaster();
      let downPos = null;
      renderer.domElement.addEventListener("pointerdown", (e) => {
        downPos = [e.clientX, e.clientY];
      });
      renderer.domElement.addEventListener("pointerup", (e) => {
        if (!downPos) return;
        const dx = e.clientX - downPos[0],
          dy = e.clientY - downPos[1];
        downPos = null;
        if (dx * dx + dy * dy > 25) return;
        const ndc = new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
        ray.setFromCamera(ndc, camera);
        const hit = ray.intersectObject(planeMesh)[0];
        if (!hit) return;
        const pt = hit.point;
        const clamp = (v) => Math.min(N - 1, Math.max(0, Math.floor(v + H)));
        if (axis === 0) {
          cu = clamp(pt.z);
          cv = clamp(pt.y);
        } else if (axis === 1) {
          cu = clamp(pt.x);
          cv = clamp(pt.z);
        } else {
          cu = clamp(pt.x);
          cv = clamp(pt.y);
        }
        updateView();
      });

      // demo content
      "HELLO".split("").forEach((c, i) => setChar(13 + i, 16, 16, c, 2));
      "CUBE".split("").forEach((c, i) => setChar(16, 14, 14 + i, c, 0));
      "FLAT".split("").forEach((c, i) => setChar(14 + i, 16, 18, c, 1));

      updateView();

      // subtle cursor pulse for the techno feel
      const clock = new THREE.Clock();
      (function loop() {
        requestAnimationFrame(loop);
        const t = clock.getElapsedTime();
        cursor.material.color.setHSL(0.93, 1, 0.5 + 0.2 * Math.sin(t * 5));
        frame.material.color.setHSL(0.5, 1, 0.55 + 0.15 * Math.sin(t * 3));
        controls.update();
        renderer.render(scene, camera);
      })();
    </script>
  </body>
</html>
