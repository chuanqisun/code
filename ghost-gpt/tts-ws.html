<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ElevenLabs TTS Test</title>
    <style>
      body {
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
        font: 16px sans-serif;
      }
      label {
        display: block;
        margin: 16px 0 6px;
      }
      input,
      textarea,
      button {
        box-sizing: border-box;
        width: 100%;
        padding: 10px;
        font: inherit;
      }
      textarea {
        min-height: 140px;
      }
      .buttons {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket TTS Test</h1>

    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" autocomplete="off" placeholder="xi-api-key" />

    <label for="voiceId">Voice ID</label>
    <input id="voiceId" value="JBFqnCBsd6RMkjVDRZzb" />

    <label for="text">Text</label>
    <textarea id="text">The first move is what sets everything in motion.</textarea>

    <div class="buttons">
      <button id="connect">Connect</button>
      <button id="play" disabled>Play</button>
      <button id="cancel">Cancel</button>
    </div>

    <p id="status" role="status">Disconnected.</p>

    <script>
      const apiKeyInput = document.querySelector("#apiKey");
      const voiceIdInput = document.querySelector("#voiceId");
      const textInput = document.querySelector("#text");
      const connectButton = document.querySelector("#connect");
      const playButton = document.querySelector("#play");
      const cancelButton = document.querySelector("#cancel");
      const status = document.querySelector("#status");

      const API_KEY_STORAGE_KEY = "elevenlabs-api-key";

      let socket = null;
      let audioContext = null;
      let nextStart = 0;
      let connectionId = 0;
      const sources = new Set();

      apiKeyInput.value = localStorage.getItem(API_KEY_STORAGE_KEY) || "";

      const isConnected = () => socket?.readyState === WebSocket.OPEN;

      function updateUI() {
        const connecting = socket?.readyState === WebSocket.CONNECTING;
        connectButton.disabled = connecting || isConnected();
        playButton.disabled = !isConnected();
      }

      function stopAudio() {
        for (const source of sources) {
          try {
            source.stop();
          } catch {}
          try {
            source.disconnect();
          } catch {}
        }

        sources.clear();

        if (audioContext) {
          nextStart = audioContext.currentTime;
        }
      }

      function closeSocket() {
        connectionId++;

        if (socket) {
          socket.onopen = null;
          socket.onmessage = null;
          socket.onerror = null;
          socket.onclose = null;

          try {
            socket.close();
          } catch {}
          socket = null;
        }

        updateUI();
      }

      function playPCM(base64, expectedConnectionId) {
        if (!audioContext || expectedConnectionId !== connectionId) return;

        const binary = atob(base64);
        const length = binary.length - (binary.length % 2);
        if (!length) return;

        const bytes = new Uint8Array(length);
        for (let i = 0; i < length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }

        const view = new DataView(bytes.buffer);
        const samples = new Float32Array(length / 2);

        for (let i = 0; i < samples.length; i++) {
          samples[i] = view.getInt16(i * 2, true) / 32768;
        }

        const buffer = audioContext.createBuffer(1, samples.length, 24000);
        buffer.copyToChannel(samples, 0);

        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);
        sources.add(source);

        source.onended = () => {
          sources.delete(source);
          try {
            source.disconnect();
          } catch {}
        };

        nextStart = Math.max(nextStart, audioContext.currentTime + 0.03);
        source.start(nextStart);
        nextStart += buffer.duration;
      }

      async function connect() {
        const apiKey = apiKeyInput.value.trim();
        const voiceId = voiceIdInput.value.trim();

        if (!apiKey || !voiceId) {
          throw new Error("API key and voice ID are required.");
        }

        localStorage.setItem(API_KEY_STORAGE_KEY, apiKey);

        audioContext ??= new AudioContext({ sampleRate: 24000 });
        await audioContext.resume();

        const currentConnectionId = ++connectionId;
        const url =
          `wss://api.elevenlabs.io/v1/text-to-speech/${encodeURIComponent(voiceId)}/stream-input` +
          "?model_id=eleven_flash_v2_5&output_format=pcm_24000&inactivity_timeout=180";

        socket = new WebSocket(url);
        const currentSocket = socket;

        status.textContent = "Connecting…";
        updateUI();

        return new Promise((resolve, reject) => {
          currentSocket.onopen = () => {
            if (currentConnectionId !== connectionId) return;

            currentSocket.send(
              JSON.stringify({
                text: " ",
                "xi-api-key": apiKey,
              }),
            );

            status.textContent = "Connected and ready.";
            updateUI();
            resolve();
          };

          currentSocket.onmessage = (event) => {
            if (currentConnectionId !== connectionId) return;

            try {
              const message = JSON.parse(event.data);

              if (message.audio) {
                playPCM(message.audio, currentConnectionId);
                status.textContent = "Playing…";
              }

              if (message.isFinal === true) {
                status.textContent = "Generation complete.";
              }

              if (message.error) {
                throw new Error(typeof message.error === "string" ? message.error : JSON.stringify(message.error));
              }
            } catch (error) {
              status.textContent = `Error: ${error.message}`;
            }
          };

          currentSocket.onerror = () => {
            if (currentConnectionId !== connectionId) return;
            status.textContent = "WebSocket connection failed.";
            reject(new Error("WebSocket connection failed."));
          };

          currentSocket.onclose = (event) => {
            if (currentConnectionId !== connectionId) return;

            socket = null;
            status.textContent = event.reason ? `Disconnected: ${event.reason}` : "Disconnected.";
            updateUI();
          };
        });
      }

      connectButton.addEventListener("click", async () => {
        try {
          await connect();
        } catch (error) {
          status.textContent = error.message;
          closeSocket();
        }
      });

      playButton.addEventListener("click", async () => {
        if (!isConnected()) return;

        const text = textInput.value.trim();
        if (!text) {
          status.textContent = "Text is required.";
          return;
        }

        try {
          await audioContext.resume();
          stopAudio();
          nextStart = audioContext.currentTime + 0.03;
          status.textContent = "Generating…";

          socket.send(
            JSON.stringify({
              text: text + " ",
              flush: true,
            }),
          );

          // Final termination message closes this WebSocket after generation.
          socket.send(JSON.stringify({ text: "" }));
          playButton.disabled = true;
        } catch (error) {
          status.textContent = `Error: ${error.message}`;
        }
      });

      cancelButton.addEventListener("click", () => {
        stopAudio();
        closeSocket();
        status.textContent = "Cancelled and disconnected.";
      });

      apiKeyInput.addEventListener("input", () => {
        localStorage.setItem(API_KEY_STORAGE_KEY, apiKeyInput.value);
        if (socket) {
          stopAudio();
          closeSocket();
          status.textContent = "Credentials changed. Reconnect.";
        }
      });

      voiceIdInput.addEventListener("input", () => {
        if (socket) {
          stopAudio();
          closeSocket();
          status.textContent = "Voice changed. Reconnect.";
        }
      });

      updateUI();
    </script>
  </body>
</html>
