<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ElevenLabs TTS Test</title>
    <style>
      body {
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
        font: 16px sans-serif;
      }
      label {
        display: block;
        margin: 16px 0 6px;
      }
      input,
      textarea,
      button {
        box-sizing: border-box;
        width: 100%;
        padding: 10px;
        font: inherit;
      }
      textarea {
        min-height: 140px;
      }
      .buttons {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      button {
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>ElevenLabs TTS Test</h1>
    <p>Testing only: your API key is sent directly to ElevenLabs and is not stored.</p>

    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" autocomplete="off" placeholder="xi-api-key" />

    <label for="voiceId">Voice ID</label>
    <input id="voiceId" value="JBFqnCBsd6RMkjVDRZzb" />

    <label for="text">Text</label>
    <textarea id="text">The first move is what sets everything in motion.</textarea>

    <div class="buttons">
      <button id="speak">Speak</button>
      <button id="cancel" disabled>Cancel</button>
    </div>

    <p id="status" role="status"></p>

    <script>
      const speakButton = document.querySelector("#speak");
      const cancelButton = document.querySelector("#cancel");
      const status = document.querySelector("#status");

      let controller = null;
      let audioContext = null;
      let sources = new Set();
      let runId = 0;

      async function cancelSpeech(showStatus = true) {
        runId++;

        controller?.abort();
        controller = null;

        for (const source of sources) {
          try {
            source.stop();
          } catch {}
          try {
            source.disconnect();
          } catch {}
        }
        sources.clear();

        if (audioContext) {
          const context = audioContext;
          audioContext = null;
          try {
            await context.close();
          } catch {}
        }

        speakButton.disabled = false;
        cancelButton.disabled = true;
        if (showStatus) status.textContent = "Cancelled.";
      }

      cancelButton.addEventListener("click", () => cancelSpeech());

      speakButton.addEventListener("click", async () => {
        await cancelSpeech(false);

        const apiKey = document.querySelector("#apiKey").value.trim();
        const voiceId = document.querySelector("#voiceId").value.trim();
        const text = document.querySelector("#text").value.trim();

        if (!apiKey || !voiceId || !text) {
          status.textContent = "API key, voice ID, and text are required.";
          return;
        }

        const currentRun = ++runId;
        controller = new AbortController();
        audioContext = new AudioContext({ sampleRate: 24000 });
        const context = audioContext;

        speakButton.disabled = true;
        cancelButton.disabled = false;
        status.textContent = "Generating speech…";

        try {
          await context.resume();

          const url = `https://api.elevenlabs.io/v1/text-to-speech/${encodeURIComponent(voiceId)}/stream` + "?output_format=pcm_24000";

          const response = await fetch(url, {
            method: "POST",
            signal: controller.signal,
            headers: {
              "xi-api-key": apiKey,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              text,
              model_id: "eleven_flash_v2_5",
            }),
          });

          if (!response.ok) throw new Error(await response.text());
          if (!response.body) throw new Error("Streaming is unavailable.");

          status.textContent = "Streaming…";

          const reader = response.body.getReader();
          let remainder = new Uint8Array();
          let nextStart = context.currentTime + 0.05;
          let started = false;

          while (currentRun === runId) {
            const { value, done } = await reader.read();
            if (done) break;

            const bytes = new Uint8Array(remainder.length + value.length);
            bytes.set(remainder);
            bytes.set(value, remainder.length);

            const usable = bytes.length - (bytes.length % 2);
            remainder = bytes.slice(usable);
            if (!usable) continue;

            const view = new DataView(bytes.buffer, bytes.byteOffset, usable);
            const samples = new Float32Array(usable / 2);

            for (let i = 0; i < samples.length; i++) {
              samples[i] = view.getInt16(i * 2, true) / 32768;
            }

            const buffer = context.createBuffer(1, samples.length, 24000);
            buffer.copyToChannel(samples, 0);

            const source = context.createBufferSource();
            source.buffer = buffer;
            source.connect(context.destination);
            sources.add(source);
            source.onended = () => {
              sources.delete(source);
              try {
                source.disconnect();
              } catch {}
            };

            nextStart = Math.max(nextStart, context.currentTime + 0.03);
            source.start(nextStart);
            nextStart += buffer.duration;

            if (!started) {
              started = true;
              status.textContent = "Playing…";
            }
          }

          if (currentRun === runId) {
            status.textContent = started ? "Playback queued." : "No audio received.";
          }
        } catch (error) {
          if (currentRun === runId) {
            status.textContent = error.name === "AbortError" ? "Cancelled." : `Error: ${error.message}`;
          }
        } finally {
          if (currentRun === runId) {
            controller = null;
            speakButton.disabled = false;
            cancelButton.disabled = sources.size === 0;
          }
        }
      });
    </script>
  </body>
</html>
