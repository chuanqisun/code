<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Voice Sentence Completion</title>
    <style>
      body {
        font-family: monospace;
        max-width: 60rem;
        min-height: 100vh;
        margin: auto;
        padding: 8px;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 8px;
        color: #000;
        background: #fff;
      }
      header {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
        gap: 8px;
      }
      section {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      label {
        display: grid;
        gap: 4px;
        min-width: 0;
      }
      input,
      select {
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
      }
      button {
        cursor: pointer;
        min-height: 36px;
        touch-action: none;
      }
      button:disabled {
        opacity: 0.5;
      }
      #rec {
        display: none;
        color: red;
        font-weight: bold;
      }
      #results {
        margin: 0;
        overflow: auto;
      }
      #results > div {
        margin-bottom: 8px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .label {
        font-weight: bold;
      }
      .latency {
        color: #555;
      }
    </style>
  </head>
  <body>
    <header>
      <label>Groq key: <input id="groqKey" name="groqKey" type="password" placeholder="gsk_..." /></label>
      <label>ElevenLabs key: <input id="elevenKey" name="elevenKey" type="password" placeholder="xi-api-key" /></label>
      <label>Voice ID: <input id="voiceId" name="elevenVoice" value="LRBMsOzRzI614MxPFGIY" /></label>
      <label
        >Input:
        <select id="audioInput" aria-label="Audio input device"></select
      ></label>
      <label
        >Output:
        <select id="audioOutput" aria-label="Audio output device"></select
      ></label>
    </header>

    <section>
      <button id="talk">Press to talk</button>
      <button id="cancel">Cancel</button>
      <span id="rec">● REC</span>
      <span id="status">Ready</span>
    </section>

    <div id="results" aria-live="polite"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const groqKey = $("groqKey");
      const elevenKey = $("elevenKey");
      const voiceId = $("voiceId");
      const audioInput = $("audioInput");
      const audioOutput = $("audioOutput");
      const talk = $("talk");
      const cancelButton = $("cancel");
      const rec = $("rec");
      const status = $("status");
      const results = $("results");

      groqKey.value = localStorage.getItem("groq_api_key") || "";
      elevenKey.value = localStorage.getItem("elevenlabs_api_key") || "";
      voiceId.value = localStorage.getItem("elevenlabs_voice_id") || voiceId.value;

      groqKey.oninput = () => localStorage.setItem("groq_api_key", groqKey.value);
      elevenKey.oninput = () => localStorage.setItem("elevenlabs_api_key", elevenKey.value);
      voiceId.oninput = () => localStorage.setItem("elevenlabs_voice_id", voiceId.value);

      let recorder = null;
      let micStream = null;
      let chunks = [];
      let recording = false;
      let releasedAt = 0;

      let turnId = 0;
      let requestController = null;

      let socket = null;
      let socketReady = null;
      let socketConnectionId = 0;
      let audioContext = null;
      let nextAudioStart = 0;
      let ttsSentAt = 0;
      let firstAudioReceived = false;
      const audioSources = new Set();

      talk.addEventListener("click", toggleRecording);
      cancelButton.addEventListener("click", () => cancelAll("Cancelled"));
      audioOutput.addEventListener("change", selectAudioOutput);
      navigator.mediaDevices?.addEventListener("devicechange", populateAudioDevices);
      populateAudioDevices();

      async function populateAudioDevices() {
        if (!navigator.mediaDevices?.enumerateDevices) {
          audioInput.innerHTML = '<option value="">Unavailable</option>';
          audioOutput.innerHTML = '<option value="">Unavailable</option>';
          audioInput.disabled = true;
          audioOutput.disabled = true;
          return;
        }

        const selectedInput = audioInput.value;
        const selectedOutput = audioOutput.value;
        const devices = await navigator.mediaDevices.enumerateDevices();

        fillDeviceSelect(
          audioInput,
          devices.filter((device) => device.kind === "audioinput"),
          selectedInput,
          "Microphone",
        );
        fillDeviceSelect(
          audioOutput,
          devices.filter((device) => device.kind === "audiooutput"),
          selectedOutput,
          "Speaker",
        );
        audioOutput.disabled = typeof AudioContext.prototype.setSinkId !== "function";
      }

      function fillDeviceSelect(select, devices, selectedId, fallbackLabel) {
        select.replaceChildren();

        devices.forEach((device, index) => {
          const option = document.createElement("option");
          option.value = device.deviceId;
          option.textContent = device.label || `${fallbackLabel} ${index + 1}`;
          select.append(option);
        });

        if (!devices.length) {
          select.append(new Option(`No ${fallbackLabel.toLowerCase()}s found`, ""));
          select.disabled = true;
          return;
        }

        select.disabled = false;
        if (devices.some((device) => device.deviceId === selectedId)) select.value = selectedId;
      }

      async function selectAudioOutput() {
        if (!audioContext || typeof audioContext.setSinkId !== "function") return;

        try {
          await audioContext.setSinkId(audioOutput.value);
        } catch (error) {
          append("ERROR", "Output device: " + error.message);
        }
      }

      function toggleRecording(event) {
        if (recording) {
          stopRecording(event);
        } else {
          startTurn(event);
        }
      }

      async function startTurn(event) {
        event.preventDefault();
        if (recording) return;

        if (!groqKey.value.trim() || !elevenKey.value.trim() || !voiceId.value.trim()) {
          status.textContent = "Enter Groq key, ElevenLabs key, and voice ID";
          return;
        }

        cancelAll(null);
        const currentTurn = ++turnId;
        requestController = new AbortController();

        try {
          const audioConstraints = audioInput.value ? { deviceId: { exact: audioInput.value } } : true;
          const microphoneReady = navigator.mediaDevices.getUserMedia({ audio: audioConstraints });

          socketReady = connectTTS(currentTurn);
          socketReady.catch((error) => {
            if (currentTurn === turnId) {
              status.textContent = "TTS connection error: " + error.message;
            }
          });

          const stream = await microphoneReady;
          if (currentTurn !== turnId) {
            stream.getTracks().forEach((track) => track.stop());
            return;
          }
          micStream = stream;

          const preferred = "audio/webm;codecs=opus";
          const mimeType = MediaRecorder.isTypeSupported(preferred) ? preferred : MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "";

          recorder = mimeType ? new MediaRecorder(micStream, { mimeType }) : new MediaRecorder(micStream);

          chunks = [];
          recorder.ondataavailable = (event) => {
            if (event.data.size) chunks.push(event.data);
          };
          recorder.onstop = () => finishTurn(currentTurn);
          recorder.start();
          populateAudioDevices();

          recording = true;
          talk.textContent = "Stop Recording";
          rec.style.display = "inline";
          status.textContent = "Recording...";
        } catch (error) {
          if (currentTurn === turnId) {
            append("ERROR", error.message);
            cancelAll("Failed");
          }
        }
      }

      function stopRecording(event) {
        event?.preventDefault();
        if (!recording) return;

        releasedAt = performance.now();
        recording = false;
        talk.disabled = true;
        talk.textContent = "Processing...";
        rec.style.display = "none";
        status.textContent = "Transcribing...";

        if (recorder?.state === "recording") recorder.stop();
      }

      async function finishTurn(currentTurn) {
        const type = recorder?.mimeType || "audio/webm";
        const audio = new Blob(chunks, { type });
        stopMicrophone();

        try {
          const text = await transcribe(audio, requestController.signal);
          if (currentTurn !== turnId) return;

          append("STT", text || "(empty transcription)", performance.now() - releasedAt);

          if (!text.trim()) throw new Error("No speech detected");

          status.textContent = "Generating...";
          const llmSentAt = performance.now();
          const completion = await complete(text, requestController.signal);
          if (currentTurn !== turnId) return;

          append("LLM", completion || "(empty response)", performance.now() - llmSentAt);

          if (!completion.trim()) throw new Error("Empty LLM response");

          status.textContent = "Preparing speech...";
          await sendTTS(completion, currentTurn);

          if (currentTurn === turnId) status.textContent = "Speaking...";
        } catch (error) {
          if (currentTurn !== turnId || error.name === "AbortError") return;
          append("ERROR", error.message);
          status.textContent = "Failed";
          resetTalkButton();
        }
      }

      async function transcribe(audio, signal) {
        const form = new FormData();
        const extension = audio.type.includes("webm") ? "webm" : "ogg";
        form.append("file", audio, `speech.${extension}`);
        form.append("model", "whisper-large-v3-turbo");

        const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
          method: "POST",
          headers: { Authorization: `Bearer ${groqKey.value.trim()}` },
          body: form,
          signal,
        });

        if (!response.ok) {
          throw new Error(`STT ${response.status}: ${await response.text()}`);
        }
        return (await response.json()).text || "";
      }

      async function complete(text, signal) {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${groqKey.value.trim()}`,
            "Content-Type": "application/json",
          },
          signal,
          body: JSON.stringify({
            model: "openai/gpt-oss-120b",
            messages: [
              {
                role: "system",
                content:
                  "Complete user's sentence in the most sensible way. Respond only with a few words to fill the __ as if uttered by the user themselves. Respond with the __ portion and don't say anything else.",
              },
              { role: "user", content: `${text} __` },
            ],
            temperature: 0,
            max_completion_tokens: 120,
            reasoning_effort: "low",
            stream: false,
          }),
        });

        if (!response.ok) {
          throw new Error(`LLM ${response.status}: ${await response.text()}`);
        }
        return (await response.json()).choices?.[0]?.message?.content || "";
      }

      async function connectTTS(currentTurn) {
        audioContext ??= new AudioContext({ sampleRate: 24000 });
        await audioContext.resume();
        await selectAudioOutput();

        const connectionId = ++socketConnectionId;
        const url =
          `wss://api.elevenlabs.io/v1/text-to-speech/${encodeURIComponent(voiceId.value.trim())}/stream-input` +
          "?model_id=eleven_flash_v2_5&output_format=pcm_24000&inactivity_timeout=180";

        const currentSocket = new WebSocket(url);
        socket = currentSocket;

        return new Promise((resolve, reject) => {
          let settled = false;

          currentSocket.onopen = () => {
            if (currentTurn !== turnId || connectionId !== socketConnectionId) {
              currentSocket.close();
              return;
            }

            currentSocket.send(
              JSON.stringify({
                text: " ",
                "xi-api-key": elevenKey.value.trim(),
              }),
            );

            settled = true;
            resolve(currentSocket);
          };

          currentSocket.onmessage = (event) => {
            if (currentTurn !== turnId || connectionId !== socketConnectionId) return;

            try {
              const message = JSON.parse(event.data);

              if (message.audio) {
                if (!firstAudioReceived) {
                  firstAudioReceived = true;
                  append("TTS", "(audio)", performance.now() - ttsSentAt);
                }
                playPCM(message.audio, connectionId);
                status.textContent = "Speaking...";
              }

              if (message.isFinal === true) {
                status.textContent = "Ready";
                resetTalkButton();
              }

              if (message.error) {
                throw new Error(typeof message.error === "string" ? message.error : JSON.stringify(message.error));
              }
            } catch (error) {
              append("ERROR", "TTS: " + error.message);
              status.textContent = "TTS failed";
              resetTalkButton();
            }
          };

          currentSocket.onerror = () => {
            if (!settled) reject(new Error("WebSocket connection failed"));
          };

          currentSocket.onclose = (event) => {
            if (!settled) {
              reject(new Error(event.reason || "WebSocket closed before ready"));
            }
            if (socket === currentSocket) socket = null;
          };
        });
      }

      async function sendTTS(text, currentTurn) {
        const currentSocket = await socketReady;

        if (currentTurn !== turnId || currentSocket !== socket || currentSocket.readyState !== WebSocket.OPEN) {
          throw new Error("TTS connection is unavailable");
        }

        await audioContext.resume();
        stopAudio();
        nextAudioStart = audioContext.currentTime + 0.03;
        firstAudioReceived = false;
        ttsSentAt = performance.now();

        currentSocket.send(
          JSON.stringify({
            text: text + " ",
            flush: true,
          }),
        );
        currentSocket.send(JSON.stringify({ text: "" }));
      }

      function playPCM(base64, connectionId) {
        if (!audioContext || connectionId !== socketConnectionId) return;

        const binary = atob(base64);
        const length = binary.length - (binary.length % 2);
        if (!length) return;

        const bytes = new Uint8Array(length);
        for (let i = 0; i < length; i++) bytes[i] = binary.charCodeAt(i);

        const view = new DataView(bytes.buffer);
        const samples = new Float32Array(length / 2);
        for (let i = 0; i < samples.length; i++) {
          samples[i] = view.getInt16(i * 2, true) / 32768;
        }

        const buffer = audioContext.createBuffer(1, samples.length, 24000);
        buffer.copyToChannel(samples, 0);

        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);
        audioSources.add(source);

        source.onended = () => {
          audioSources.delete(source);
          try {
            source.disconnect();
          } catch {}
        };

        nextAudioStart = Math.max(nextAudioStart, audioContext.currentTime + 0.03);
        source.start(nextAudioStart);
        nextAudioStart += buffer.duration;
      }

      function stopAudio() {
        for (const source of audioSources) {
          try {
            source.stop();
          } catch {}
          try {
            source.disconnect();
          } catch {}
        }
        audioSources.clear();
        if (audioContext) nextAudioStart = audioContext.currentTime;
      }

      function closeTTS() {
        socketConnectionId++;
        const oldSocket = socket;
        socket = null;
        socketReady = null;

        if (oldSocket) {
          oldSocket.onopen = null;
          oldSocket.onmessage = null;
          oldSocket.onerror = null;
          oldSocket.onclose = null;
          try {
            oldSocket.close();
          } catch {}
        }
      }

      function stopMicrophone() {
        micStream?.getTracks().forEach((track) => track.stop());
        micStream = null;
        recorder = null;
        chunks = [];
        recording = false;
        rec.style.display = "none";
      }

      function cancelAll(message) {
        turnId++;
        requestController?.abort();
        requestController = null;

        if (recorder?.state === "recording") {
          recorder.onstop = null;
          try {
            recorder.stop();
          } catch {}
        }

        stopMicrophone();
        stopAudio();
        closeTTS();
        resetTalkButton();

        if (message) status.textContent = message;
      }

      function resetTalkButton() {
        talk.disabled = false;
        talk.textContent = "Press to talk";
      }

      function append(label, text, latencyMs) {
        const item = document.createElement("div");
        const name = document.createElement("span");
        name.className = "label";
        name.textContent = label + ": ";

        item.append(name, document.createTextNode(text));

        if (typeof latencyMs === "number") {
          const latency = document.createElement("span");
          latency.className = "latency";
          latency.textContent = ` [${(latencyMs / 1000).toFixed(2)}s]`;
          item.append(latency);
        }

        results.append(item);
        item.scrollIntoView({ block: "end" });
      }
    </script>
  </body>
</html>
