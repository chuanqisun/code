<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TS .d.ts Crawler &amp; Bundler</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      h1 {
        font-size: 1.1em;
        margin: 0 0 8px 0;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #fff;
        border-bottom: 1px solid #ccc;
        padding: 10px 16px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      #rootUrl {
        flex: 1;
        font-family: monospace;
        padding: 6px;
      }
      button {
        padding: 6px 14px;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }
      .hint {
        font-size: 11.5px;
        color: #666;
        margin-top: 4px;
      }

      main {
        flex: 1;
        min-height: 0;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        margin-bottom: 6px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #output {
        flex: 1;
        min-height: 0;
        overflow: auto;
        border: 1px solid #ccc;
        padding: 8px;
        font-family: monospace;
        font-size: 12.5px;
        white-space: pre;
        background: #fafafa;
      }

      footer {
        position: sticky;
        bottom: 0;
        z-index: 10;
        background: #f0f0f0;
        border-top: 1px solid #ccc;
        padding: 6px 16px;
        flex-shrink: 0;
      }
      .footer-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        font-family: monospace;
        font-size: 13px;
      }
      #footerPercent {
        font-weight: bold;
        min-width: 48px;
      }
      #footerCounts {
        white-space: nowrap;
      }
      #footerCounts .pending {
        color: #555;
      }
      #footerCounts .success {
        color: #0a7a2a;
      }
      #footerCounts .fail {
        color: #c0392b;
      }
      #footerLastMsg {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #toggleLogBtn {
        padding: 2px 10px;
      }
      #log {
        display: none;
        margin-top: 6px;
        max-height: 50vh;
        overflow: auto;
        border: 1px solid #ccc;
        padding: 8px;
        font-family: monospace;
        font-size: 12.5px;
        white-space: pre-wrap;
        word-break: break-all;
        background: #fafafa;
      }
      #log.expanded {
        display: block;
      }
      .log-started {
        color: #555;
      }
      .log-downloaded {
        color: #0a7a2a;
      }
      .log-failed {
        color: #c0392b;
        font-weight: bold;
      }
      .log-info {
        color: #1a5fb4;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TypeScript Declaration Crawler &amp; Bundler</h1>
      <div class="row">
        <input id="rootUrl" type="text" value="https://esm.sh/lit-html@3.3.3/development/lit-html.d.ts" />
        <button id="startBtn">Crawl &amp; Bundle</button>
      </div>
      <div class="hint">Enter a full .d.ts URL, or an npm package name e.g. <code>lodash</code>, <code>@angular/core</code>, or <code>@types/node</code></div>
    </header>

    <main>
      <div class="toolbar">
        <strong>Bundled output</strong>
        <button id="copyBtn">Copy</button>
        <button id="downloadBtn">Download .d.ts</button>
      </div>
      <div id="output"></div>
    </main>

    <footer>
      <div class="footer-bar" id="footerBar">
        <span id="footerPercent">0%</span>
        <span id="footerCounts">
          <span class="pending">pending:0</span>
          <span class="success">ok:0</span>
          <span class="fail">fail:0</span>
        </span>
        <span id="footerLastMsg">idle</span>
        <button id="toggleLogBtn">Expand ▲</button>
      </div>
      <div id="log"></div>
    </footer>

    <script>
      (() => {
        const logEl = document.getElementById("log");
        const outputEl = document.getElementById("output");
        const startBtn = document.getElementById("startBtn");
        const copyBtn = document.getElementById("copyBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const rootUrlInput = document.getElementById("rootUrl");

        const footerPercent = document.getElementById("footerPercent");
        const footerCounts = document.getElementById("footerCounts");
        const footerLastMsg = document.getElementById("footerLastMsg");
        const toggleLogBtn = document.getElementById("toggleLogBtn");
        const footerBar = document.getElementById("footerBar");

        let seen, pending, graph, counts;

        function resetState() {
          seen = new Set();
          pending = new Set();
          graph = new Map();
          counts = { started: 0, downloaded: 0, failed: 0 };
          logEl.innerHTML = "";
          outputEl.textContent = "";
          footerPercent.textContent = "0%";
          footerLastMsg.textContent = "starting...";
          updateCounts();
        }

        function updateCounts() {
          const total = seen.size;
          const success = counts.downloaded;
          const fail = counts.failed;
          const settled = success + fail;
          const pendingCount = total - settled;
          const pct = total > 0 ? Math.floor((settled / total) * 100) : 0;
          footerPercent.textContent = pct + "%";
          footerCounts.innerHTML =
            `<span class="pending">pending:${pendingCount}</span> ` + `<span class="success">ok:${success}</span> ` + `<span class="fail">fail:${fail}</span>`;
        }

        function log(url, status, extra) {
          counts[status] = (counts[status] || 0) + 1;
          updateCounts();

          const t = new Date().toLocaleTimeString();
          const msg = `[${t}] ${status.toUpperCase().padEnd(10)} ${url}${extra ? " — " + extra : ""}`;

          const div = document.createElement("div");
          div.className = "log-" + status;
          div.textContent = msg;
          logEl.appendChild(div);
          logEl.scrollTop = logEl.scrollHeight;

          footerLastMsg.textContent = msg;
        }

        function logInfo(msg) {
          const t = new Date().toLocaleTimeString();
          const full = `[${t}] INFO       ${msg}`;
          const div = document.createElement("div");
          div.className = "log-info";
          div.textContent = full;
          logEl.appendChild(div);
          logEl.scrollTop = logEl.scrollHeight;
          footerLastMsg.textContent = full;
        }

        // ---- npm package name resolution --------------------------------------

        function looksLikeUrl(input) {
          return /^https?:\/\//i.test(input.trim());
        }

        function looksLikeDts(url) {
          return /\.d\.ts$/i.test(url.split("?")[0].split("#")[0]);
        }

        async function resolvePackageToTypesUrl(pkgName) {
          const name = pkgName.trim().replace(/^\/+|\/+$/g, "");
          const esmUrl = "https://esm.sh/" + name;
          logInfo(`Resolving package "${name}" via ${esmUrl} ...`);

          // fetch() follows redirects by default; res.url will be the final URL.
          const res = await fetch(esmUrl, { method: "GET" });

          // Case 1: esm.sh redirected straight to a .d.ts file
          // (e.g. https://esm.sh/@types/node -> https://esm.sh/@types/node@X/index.d.ts)
          if (looksLikeDts(res.url)) {
            logInfo(`Package "${name}" redirected directly to a .d.ts file -> ${res.url}`);
            return res.url;
          }

          // Case 2: normal JS module response carrying x-typescript-types header
          const typesHeader = res.headers.get("x-typescript-types");
          if (typesHeader) {
            const resolved = new URL(typesHeader, res.url || esmUrl).href;
            logInfo(`Resolved package "${name}" -> ${resolved}`);
            return resolved;
          }

          throw new Error(`Could not resolve types for package "${name}" (status ${res.status}, no x-typescript-types header, final URL was ${res.url})`);
        }

        // ---- dependency extraction ----------------------------------------

        function extractDeps(src) {
          const deps = [];
          const push = (spec, kind) => {
            if (spec) deps.push({ spec, kind });
          };
          let out = src;

          out = out.replace(/\/\/\/\s*<reference\s+path\s*=\s*["']([^"']+)["']\s*\/?>\s*\r?\n?/g, (m, p) => {
            push(p, "path");
            return "";
          });

          out = out.replace(/\/\/\/\s*<reference\s+types\s*=\s*["']([^"']+)["']\s*\/?>\s*\r?\n?/g, (m, p) => {
            push(p, "types");
            return "";
          });

          out = out.replace(/import\s*["']([^"']+)["']\s*;?/g, (m, p) => {
            push(p, "path");
            return "";
          });

          out = out.replace(/import\s+(?:type\s+)?[\s\S]*?\bfrom\s+["']([^"']+)["']\s*;?/g, (m, p) => {
            push(p, "path");
            return "";
          });

          out = out.replace(/export\s+(?:type\s+)?\*(?:\s+as\s+[\w$]+)?\s*from\s+["']([^"']+)["']\s*;?/g, (m, p) => {
            push(p, "path");
            return "";
          });

          out = out.replace(/export\s+(?:type\s+)?\{[\s\S]*?\}\s*from\s+["']([^"']+)["']\s*;?/g, (m, p) => {
            push(p, "path");
            return "";
          });

          const dynRe = /import\s*\(\s*["']([^"']+)["']\s*\)/g;
          let dm;
          while ((dm = dynRe.exec(out))) push(dm[1], "path");

          out = out.replace(/\/\/#\s*sourceMappingURL=.*$/gm, "");

          out = out.replace(/\n{3,}/g, "\n\n").trim();

          return { deps, cleaned: out };
        }

        function resolveSpec(dep, baseUrl) {
          try {
            if (dep.kind === "types") {
              if (/^https?:\/\//.test(dep.spec)) return dep.spec;
              return new URL("https://esm.sh/@types/" + dep.spec, baseUrl).href;
            }
            return new URL(dep.spec, baseUrl).href;
          } catch (e) {
            return null;
          }
        }

        // ---- crawler --------------------------------------------------------

        function crawl(url) {
          if (seen.has(url)) return;
          seen.add(url);
          updateCounts();
          const p = doCrawl(url);
          pending.add(p);
          p.finally(() => pending.delete(p));
        }

        async function doCrawl(url) {
          log(url, "started");
          try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("HTTP " + res.status + " " + res.statusText);
            const text = await res.text();
            log(url, "downloaded");

            // Use the final (post-redirect) URL as the base for resolving relative deps,
            // in case this particular file was also served via a redirect.
            const finalUrl = res.url || url;

            const { deps, cleaned } = extractDeps(text);
            const resolvedDeps = [];
            for (const d of deps) {
              const resolved = resolveSpec(d, finalUrl);
              if (resolved) {
                resolvedDeps.push(resolved);
                crawl(resolved);
              }
            }
            graph.set(url, { status: "ok", content: cleaned, deps: resolvedDeps });
          } catch (err) {
            log(url, "failed", err.message || String(err));
            graph.set(url, { status: "failed", content: "", deps: [], error: err.message || String(err) });
          }
        }

        // ---- topological ordering -------------------------------------------

        function topoSort(root) {
          const visited = new Set();
          const order = [];
          (function visit(url) {
            if (visited.has(url)) return;
            visited.add(url);
            const node = graph.get(url);
            if (!node) return;
            if (node.status === "ok") {
              for (const d of node.deps) visit(d);
            }
            order.push(url);
          })(root);
          return order;
        }

        function buildOutput(root) {
          const order = topoSort(root);
          const failed = [];
          const parts = [];
          for (const url of order) {
            const node = graph.get(url);
            if (!node) continue;
            if (node.status === "failed") {
              failed.push({ url, error: node.error });
              parts.push(`// ===== FAILED TO LOAD: ${url} (${node.error}) =====`);
              continue;
            }
            if (!node.content) continue;
            parts.push(`// ===== ${url} =====\n${node.content}`);
          }

          const header = [
            "/*",
            " * Auto-bundled TypeScript declarations",
            ` * Root: ${root}`,
            ` * Files loaded: ${[...graph.values()].filter((n) => n.status === "ok").length}`,
            ` * Files failed:  ${failed.length}`,
            ...(failed.length ? [" * Failed URLs:", ...failed.map((f) => ` *   - ${f.url} (${f.error})`)] : []),
            " */",
            "",
          ].join("\n");

          return header + "\n" + parts.join("\n\n") + "\n";
        }

        // ---- driver -----------------------------------------------------------

        async function run() {
          const raw = rootUrlInput.value.trim();
          if (!raw) return;
          resetState();
          startBtn.disabled = true;
          try {
            let root = raw;
            if (!looksLikeUrl(raw)) {
              root = await resolvePackageToTypesUrl(raw);
              rootUrlInput.value = root;
            }

            crawl(root);
            while (pending.size > 0) {
              await Promise.all([...pending]);
            }
            footerLastMsg.textContent = "rendering output...";
            const text = buildOutput(root);
            outputEl.textContent = text;
            footerLastMsg.textContent = "done";
          } catch (e) {
            footerLastMsg.textContent = "error: " + (e.message || e);
            logInfo("Error: " + (e.message || e));
          } finally {
            startBtn.disabled = false;
          }
        }

        startBtn.addEventListener("click", run);

        copyBtn.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(outputEl.textContent);
            copyBtn.textContent = "Copied!";
            setTimeout(() => (copyBtn.textContent = "Copy"), 1200);
          } catch (e) {
            alert("Copy failed: " + e.message);
          }
        });

        downloadBtn.addEventListener("click", () => {
          const blob = new Blob([outputEl.textContent], { type: "text/plain" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "bundled.d.ts";
          a.click();
          URL.revokeObjectURL(a.href);
        });

        function toggleLog() {
          const expanded = logEl.classList.toggle("expanded");
          toggleLogBtn.textContent = expanded ? "Collapse ▼" : "Expand ▲";
        }
        toggleLogBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleLog();
        });
        footerBar.addEventListener("click", toggleLog);
      })();
    </script>
  </body>
</html>
