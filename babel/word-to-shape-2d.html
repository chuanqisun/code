<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Word Undulating Circle</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fff;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      .ui {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid #000;
        padding: 10px;
        font: 12px/1.2 monospace;
      }
      .ui label {
        display: block;
        margin: 6px 0 2px;
      }
      .ui input,
      .ui select {
        width: 220px;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <div class="ui">
      <div><strong>Query params:</strong> ?word=hello&base=120&amplitude=40&map=jump</div>
      <label>word</label>
      <input id="wordInput" type="text" />
      <label>base radius</label>
      <input id="baseInput" type="number" step="1" />
      <label>amplitude</label>
      <input id="ampInput" type="number" step="1" />
      <label>mapping</label>
      <select id="mapInput">
        <option value="jump">jumped ASCII alphabet</option>
        <option value="linear">linear ASCII</option>
      </select>
    </div>

    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      const wordInput = document.getElementById("wordInput");
      const baseInput = document.getElementById("baseInput");
      const ampInput = document.getElementById("ampInput");
      const mapInput = document.getElementById("mapInput");

      function getParams() {
        const q = new URLSearchParams(location.search);
        return {
          word: q.get("word") || "hello",
          base: Number(q.get("base")) || 120,
          amplitude: Number(q.get("amplitude")) || 40,
          map: q.get("map") || "jump",
        };
      }

      function updateUrl(word, base, amplitude, map) {
        const q = new URLSearchParams();
        q.set("word", word || "hello");
        q.set("base", String(base));
        q.set("amplitude", String(amplitude));
        q.set("map", map);
        history.replaceState(null, "", "?" + q.toString());
      }

      function mod(n, m) {
        return ((n % m) + m) % m;
      }

      // Covers printable ASCII 32..126 (95 chars).
      // "jump" remaps neighboring ASCII codes to distant positions in the radius range.
      // Since gcd(37,95)=1, this is a full permutation of all printable ASCII slots.
      function normalizedAsciiPosition(ch, mode) {
        const code = ch.charCodeAt(0);
        const start = 32;
        const span = 95;

        const printableIndex = mod(code - start, span);

        if (mode === "linear") {
          return printableIndex / (span - 1);
        }

        // Jumped permutation: spreads adjacent characters apart.
        const jumped = mod(printableIndex * 37, span);
        return jumped / (span - 1);
      }

      function charRadius(ch, baseRadius, amplitude, mode) {
        const t = normalizedAsciiPosition(ch, mode);
        return baseRadius + (t - 0.5) * 2 * amplitude;
      }

      function polarPoint(cx, cy, angle, radius) {
        return {
          x: cx + Math.cos(angle) * radius,
          y: cy + Math.sin(angle) * radius,
        };
      }

      function catmullRomClosed(points, tension = 1) {
        const path = [];
        const n = points.length;
        if (n < 2) return path;

        for (let i = 0; i < n; i++) {
          const p0 = points[(i - 1 + n) % n];
          const p1 = points[i];
          const p2 = points[(i + 1) % n];
          const p3 = points[(i + 2) % n];

          const cp1x = p1.x + ((p2.x - p0.x) / 6) * tension;
          const cp1y = p1.y + ((p2.y - p0.y) / 6) * tension;
          const cp2x = p2.x - ((p3.x - p1.x) / 6) * tension;
          const cp2y = p2.y - ((p3.y - p1.y) / 6) * tension;

          path.push([cp1x, cp1y, cp2x, cp2y, p2.x, p2.y]);
        }
        return path;
      }

      function buildPoints(word, baseRadius, amplitude, cx, cy, mode) {
        const chars = [...word];
        const charCount = Math.max(chars.length, 3);
        const minRadius = baseRadius - amplitude;

        const points = [];
        for (let i = 0; i < charCount; i++) {
          const ch = chars[i % chars.length] || " ";
          const a0 = (i / charCount) * Math.PI * 2 - Math.PI / 2;
          const a1 = ((i + 1) / charCount) * Math.PI * 2 - Math.PI / 2;
          const mid = (a0 + a1) / 2;

          points.push(polarPoint(cx, cy, a0, charRadius(ch, baseRadius, amplitude, mode)), polarPoint(cx, cy, mid, minRadius));
        }
        return points;
      }

      function draw() {
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;

        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, h);

        const word = wordInput.value || "hello";
        const baseRadius = Number(baseInput.value) || 120;
        const amplitude = Number(ampInput.value) || 40;
        const mapMode = mapInput.value || "jump";

        const cx = w / 2;
        const cy = h / 2;

        const points = buildPoints(word, baseRadius, amplitude, cx, cy, mapMode);
        const curves = catmullRomClosed(points, 1);

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (const seg of curves) {
          ctx.bezierCurveTo(seg[0], seg[1], seg[2], seg[3], seg[4], seg[5]);
        }
        ctx.closePath();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        ctx.stroke();

        updateUrl(word, baseRadius, amplitude, mapMode);
      }

      function syncFromParams() {
        const p = getParams();
        wordInput.value = p.word;
        baseInput.value = p.base;
        ampInput.value = p.amplitude;
        mapInput.value = p.map;
      }

      [wordInput, baseInput, ampInput, mapInput].forEach((el) => {
        el.addEventListener("input", draw);
        el.addEventListener("change", draw);
      });

      window.addEventListener("resize", draw);

      syncFromParams();
      draw();
    </script>
  </body>
</html>
