<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direct Convolution Rings</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
      }
      body {
        position: relative;
      }
      canvas {
        display: block;
        max-width: 95vw;
        max-height: 95vh;
        image-rendering: pixelated;
      }
      .controls {
        position: fixed;
        top: 16px;
        left: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        z-index: 1;
      }
      .controls input {
        width: 88px;
        padding: 4px 6px;
      }
      .controls button {
        padding: 4px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label for="frameInput">Frame</label>
      <input id="frameInput" type="number" min="0" step="1" value="0" />
      <label for="opacityInput">Opacity</label>
      <input id="opacityInput" type="number" min="0" max="1" step="0.05" value="1" />
      <label for="ringOpacityInput">Ring Opacity</label>
      <input id="ringOpacityInput" type="number" min="0" max="1" step="0.05" value="1" />
      <label for="fadeRateInput">Fade Rate</label>
      <input id="fadeRateInput" type="number" min="0" step="0.05" value="1" />
      <label for="offsetInput">Offset</label>
      <input id="offsetInput" type="number" step="1" value="0" />
      <button id="renderButton" type="button">Render</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
      (async function () {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const frameInput = document.getElementById("frameInput");
        const opacityInput = document.getElementById("opacityInput");
        const ringOpacityInput = document.getElementById("ringOpacityInput");
        const fadeRateInput = document.getElementById("fadeRateInput");
        const offsetInput = document.getElementById("offsetInput");
        const renderButton = document.getElementById("renderButton");
        const searchParams = new URLSearchParams(window.location.search);

        const url = "./data/01.jpg";
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = url;
        });
        URL.revokeObjectURL(url);

        const maxSide = 700;
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);

        canvas.width = w;
        canvas.height = h;

        const srcCanvas = document.createElement("canvas");
        srcCanvas.width = w;
        srcCanvas.height = h;
        const sctx = srcCanvas.getContext("2d");
        sctx.drawImage(img, 0, 0, w, h);

        const imageData = sctx.getImageData(0, 0, w, h);
        const seedMask = thresholdImageToMask(imageData, {
          threshold: 182,
        });

        const ringCanvas = document.createElement("canvas");
        ringCanvas.width = w;
        ringCanvas.height = h;
        const ringCtx = ringCanvas.getContext("2d");

        const fg = "#7aa2ff";
        const ringThickness = 4; // 1px ring
        const gapSize = 4; // 4px gap
        const period = ringThickness + gapSize; // 5px total cycle

        // Precompute dilated masks incrementally and cache them
        // We only need to dilate one step at a time
        let currentMask = seedMask.slice();
        const maskCache = [seedMask.slice()];
        let currentErodedMask = seedMask.slice();
        const erodedMaskCache = [seedMask.slice()];

        function ensureDilatedTo(n) {
          while (maskCache.length <= n) {
            currentMask = dilateOnce(currentMask, w, h);
            maskCache.push(currentMask.slice());
          }
        }

        function ensureErodedTo(n) {
          while (erodedMaskCache.length <= n) {
            currentErodedMask = erodeOnce(currentErodedMask, w, h);
            erodedMaskCache.push(currentErodedMask.slice());
          }
        }

        function getOffsetMask(offset) {
          if (offset > 0) {
            ensureDilatedTo(offset);
            return maskCache[offset];
          }

          if (offset < 0) {
            ensureErodedTo(-offset);
            return erodedMaskCache[-offset];
          }

          return seedMask;
        }

        function renderFrame(frameIndex) {
          const targetFrame = Math.max(0, Math.floor(Number(frameIndex) || 0));
          const initialOpacity = clamp01(Number(opacityInput.value) || 0);
          const ringStartOpacity = clamp01(Number(ringOpacityInput.value) || 0);
          const fadeRate = Math.max(0, Number(fadeRateInput.value) || 0);
          const offset = Math.floor(Number(offsetInput.value) || 0);
          const baseMask = getOffsetMask(offset);
          searchParams.set("frame", String(targetFrame));
          searchParams.set("opacity", String(initialOpacity));
          searchParams.set("ringOpacity", String(ringStartOpacity));
          searchParams.set("fadeRate", String(fadeRate));
          searchParams.set("offset", String(offset));
          window.history.replaceState({}, "", `${window.location.pathname}?${searchParams.toString()}`);

          ctx.fillStyle = "#0f1630";
          ctx.fillRect(0, 0, w, h);

          ringCtx.clearRect(0, 0, w, h);
          drawMaskTransparent(ringCtx, baseMask, w, h, fg, initialOpacity);
          ctx.drawImage(ringCanvas, 0, 0);

          let previousMask = baseMask;
          for (let dilation = 1; dilation <= targetFrame; dilation++) {
            const currentRingMask = dilateOnce(previousMask, w, h);
            const posInCycle = dilation % period;
            if (posInCycle < ringThickness) {
              const ring = subtractMask(currentRingMask, previousMask);
              const progress = targetFrame === 0 ? 0 : (dilation - 1) / targetFrame;
              const ringOpacity = ringStartOpacity * Math.max(0, 1 - fadeRate * progress);
              ringCtx.clearRect(0, 0, w, h);
              drawMaskTransparent(ringCtx, ring, w, h, fg, ringOpacity);
              ctx.drawImage(ringCanvas, 0, 0);
            }
            previousMask = currentRingMask;
          }
        }

        const initialFrame = Math.max(0, Math.floor(Number(searchParams.get("frame") ?? 0) || 0));
        const initialOpacity = clamp01(Number(searchParams.get("opacity") ?? 1));
        const initialRingOpacity = clamp01(Number(searchParams.get("ringOpacity") ?? 1));
        const initialFadeRate = Math.max(0, Number(searchParams.get("fadeRate") ?? 1) || 0);
        const initialOffset = Math.floor(Number(searchParams.get("offset") ?? 0) || 0);
        frameInput.value = String(initialFrame);
        opacityInput.value = String(initialOpacity);
        ringOpacityInput.value = String(initialRingOpacity);
        fadeRateInput.value = String(initialFadeRate);
        offsetInput.value = String(initialOffset);
        renderButton.addEventListener("click", () => renderFrame(frameInput.value));
        [frameInput, opacityInput, ringOpacityInput, fadeRateInput, offsetInput].forEach((input) => {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") renderFrame(frameInput.value);
          });
        });

        renderFrame(initialFrame);
      })();

      function thresholdImageToMask(imageData, options = {}) {
        const threshold = options.threshold ?? 200;
        const w = imageData.width;
        const h = imageData.height;
        const data = imageData.data;
        const mask = new Uint8Array(w * h);

        for (let i = 0; i < w * h; i++) {
          const i4 = i * 4;
          const r = data[i4];
          const g = data[i4 + 1];
          const b = data[i4 + 2];
          const a = data[i4 + 3];
          const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          mask[i] = a > 0 && lum >= threshold ? 1 : 0;
        }

        return mask;
      }

      function dilateOnce(mask, w, h) {
        const out = new Uint8Array(w * h);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            let on = 0;
            for (let dy = -1; dy <= 1; dy++) {
              const ny = y + dy;
              if (ny < 0 || ny >= h) continue;
              for (let dx = -1; dx <= 1; dx++) {
                const nx = x + dx;
                if (nx < 0 || nx >= w) continue;
                if (mask[ny * w + nx]) {
                  on = 1;
                  break;
                }
              }
              if (on) break;
            }
            out[y * w + x] = on;
          }
        }
        return out;
      }

      function erodeOnce(mask, w, h) {
        const out = new Uint8Array(w * h);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            let on = 1;
            for (let dy = -1; dy <= 1; dy++) {
              const ny = y + dy;
              if (ny < 0 || ny >= h) {
                on = 0;
                break;
              }
              for (let dx = -1; dx <= 1; dx++) {
                const nx = x + dx;
                if (nx < 0 || nx >= w || !mask[ny * w + nx]) {
                  on = 0;
                  break;
                }
              }
              if (!on) break;
            }
            out[y * w + x] = on;
          }
        }
        return out;
      }

      function subtractMask(a, b) {
        const out = new Uint8Array(a.length);
        for (let i = 0; i < a.length; i++) out[i] = a[i] && !b[i] ? 1 : 0;
        return out;
      }

      function drawMaskTransparent(ctx, mask, w, h, color, alpha = 1) {
        const rgb = hexToRgb(color);
        const img = ctx.createImageData(w, h);
        const d = img.data;
        const opacity = Math.round(clamp01(alpha) * 255);
        for (let i = 0; i < mask.length; i++) {
          if (!mask[i]) continue;
          const j = i * 4;
          d[j] = rgb.r;
          d[j + 1] = rgb.g;
          d[j + 2] = rgb.b;
          d[j + 3] = opacity;
        }
        ctx.putImageData(img, 0, 0);
      }

      function clamp01(value) {
        return Math.max(0, Math.min(1, value));
      }

      function hexToRgb(hex) {
        const s = hex.replace("#", "");
        return {
          r: parseInt(s.slice(0, 2), 16),
          g: parseInt(s.slice(2, 4), 16),
          b: parseInt(s.slice(4, 6), 16),
        };
      }
    </script>
  </body>
</html>
