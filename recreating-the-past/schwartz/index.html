<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milano Cortina 2026</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #0b0b0b;
        --line: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.56);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }

      body {
        padding: clamp(12px, 2vw, 28px);
      }

      main {
        width: min(100%, 1400px);
        margin: 0 auto;
      }

      header {
        display: grid;
        gap: 1ch;
        margin-block: 2ch 4ch;
        justify-items: center;
        text-align: center;
      }

      header img {
        width: 120px;
        height: auto;
      }

      h1,
      p {
        margin: 0;
        font-weight: 400;
      }

      h1 {
        font-size: clamp(14px, 1.6vw, 20px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p {
        font-size: 12px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 2ch;
      }

      .cell {
        min-width: 0;
        background: var(--panel);
        display: grid;
        grid-template-rows: 1fr auto;
        border-radius: 1ch;
        overflow: hidden;
      }

      .label {
        display: flex;
        align-items: baseline;
        text-transform: uppercase;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        min-height: 48px;
      }

      .index {
        color: var(--muted);
        font-size: 11px;
        flex: 0 0 auto;
      }

      .name {
        font-size: 11px;
        line-height: 1.35;
        word-break: break-word;
        text-align: right;
      }

      .media {
        aspect-ratio: 1 / 1;
        background: #000;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.92) contrast(1.02);
      }

      @media (max-width: 1100px) {
        .grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 460px) {
        body {
          padding: 8px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .label {
          min-height: 42px;
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="./olympics/rings.svg" alt="Olympic rings" width="200" />
        <h1>Milano Cortina<br />2026</h1>
      </header>
      <section class="grid" id="grid" aria-label="Olympics photo grid"></section>
    </main>

    <script>
      async function init() {
        const response = await fetch("./olympics/image-index.json");
        const entries = await response.json();
        const grid = document.getElementById("grid");

        entries.slice(0, 16).forEach((entry, index) => {
          const item = document.createElement("article");
          item.className = "cell";

          const slug = slugify(entry.name);
          const fileName = `${String(index + 1).padStart(2, "0")}-${slug}.webp`;

          item.innerHTML = `
						<div class="media">
							<img
								src="./olympics/output/${fileName}"
								alt="${escapeHtml(entry.name)}"
								loading="lazy"
								decoding="async"
							/>
						</div>
						<div class="label">
							<span class="index">${String(index + 1).padStart(2, "0")}</span>
							<span class="name">${escapeHtml(entry.name)}</span>
						</div>
					`;

          grid.appendChild(item);
        });
      }

      function slugify(value) {
        return value
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return map[char] || char;
        });
      }

      init().catch((error) => {
        document.body.innerHTML = `<main><p>Failed to load grid: ${escapeHtml(error.message || String(error))}</p></main>`;
        console.error(error);
      });
    </script>
  </body>
</html>
