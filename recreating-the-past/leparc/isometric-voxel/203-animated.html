<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #888;
        font-family: monospace;
        font-size: 14px;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="info">Click or Space to mutate</div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const N = 8;
      const ANIM_DURATION = 320;
      const DROP_HEIGHT = N + 4;

      // --- Heightmap ---
      const height = Array.from({ length: N }, () => new Array(N).fill(0));
      for (let x = 0; x < N; x++) for (let y = 0; y < N; y++) height[x][y] = Math.max(0, N - Math.max(x, y));

      function h(x, y) {
        if (x < 0 || x >= N || y < 0 || y >= N) return 0;
        return height[x][y];
      }

      // --- Animation state ---
      // displayHeight[x][y] = the current visual height (fractional during animation)
      const displayHeight = Array.from({ length: N }, (_, x) => Array.from({ length: N }, (_, y) => height[x][y]));

      let animations = []; // { x, y, from, to, startTime, duration, delay }
      let animating = false;
      let pendingMutations = 0;

      function easeOutQuart(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      function mutate() {
        const removable = [];
        for (let x = 0; x < N; x++) for (let y = 0; y < N; y++) if (height[x][y] > 0) removable.push({ x, y });

        if (removable.length === 0) return false;

        for (let attempt = 0; attempt < 200; attempt++) {
          const ri = Math.floor(Math.random() * removable.length);
          const rem = removable[ri];
          const remH = height[rem.x][rem.y];

          height[rem.x][rem.y] = remH - 1;

          const placeable = [];
          for (let x = 0; x < N; x++)
            for (let y = 0; y < N; y++) {
              if (x === rem.x && y === rem.y) continue;
              if (height[x][y] < N) placeable.push({ x, y });
            }

          if (placeable.length > 0) {
            const pi = Math.floor(Math.random() * placeable.length);
            const plc = placeable[pi];
            const plcOldH = height[plc.x][plc.y];
            height[plc.x][plc.y] += 1;

            const now = performance.now();

            // Raise animation: column goes UP from remH-1 to DROP_HEIGHT
            // then we conceptually move the cube to the new column
            // Drop animation: new column goes from DROP_HEIGHT down to plcOldH+1

            // Source column: animate from remH down to remH-1 (the top drops away, going UP first)
            // We animate the source column shrinking: its display height goes from remH to remH-1
            // But visually the removed cube rises. We model this as:
            //   - Source column: height drops from remH to remH-1 (quick)
            //   - A "ghost" cube rises from z=remH-1 to DROP_HEIGHT at source column
            //   - Then the target column grows from plcOldH to plcOldH+1, arriving from DROP_HEIGHT

            // Simpler: animate source column height from remH → remH-1 (it shrinks, top peels off upward)
            // Then animate target column height from plcOldH → plcOldH+1 (grows, top drops from above)

            // Source: display goes remH → remH-1 (shrink down)
            // But we want the visual to feel like the cube lifts OFF. So:
            // Source: display goes remH → (remH - 1) but we also animate a "lift" offset
            //
            // Actually, let's keep it clean with the platform model:
            // Source column animates: current display → (remH - 1)
            // Target column animates: plcOldH → DROP_HEIGHT → (plcOldH + 1)
            //   i.e. it overshoots up then settles (no, that's weird)
            //
            // Best rhythmic feel:
            // Phase 1 (0ms - ANIM_DURATION): Source rises from remH to DROP_HEIGHT (lift off)
            // Phase 2 (ANIM_DURATION - 2*ANIM_DURATION): Target drops from DROP_HEIGHT to plcOldH+1
            //
            // But source column has remH-1 remaining cubes. The "rising" is the removed cube.
            // With platform model, we animate the source column height:
            //   remH → DROP_HEIGHT (the whole column stretches up??) No.
            //
            // Let's use a different approach: track a "floating cube" separately.
            // The source column instantly becomes remH-1 in display.
            // A floating cube animates position from (rem.x, rem.y, remH-1) up to DROP_HEIGHT,
            // then from (plc.x, plc.y, DROP_HEIGHT) down to plcOldH.
            // But floating cubes break the pure heightmap model.
            //
            // SIMPLEST GOOD APPROACH:
            // Source column: animate displayHeight from remH to remH-1 (drops down = cube removed from top)
            // Target column: after delay, animate displayHeight from plcOldH to plcOldH+1 (rises up = cube placed)
            // The source "drops" and target "rises" with easeOutQuart gives a nice rhythmic pump feel.
            //
            // Even better for rhythm: source drops FAST, target rises with a slight delay and easeOutQuart.

            animations.push({
              x: rem.x,
              y: rem.y,
              from: remH,
              to: remH - 1,
              startTime: now,
              duration: ANIM_DURATION * 0.6,
            });

            animations.push({
              x: plc.x,
              y: plc.y,
              from: plcOldH,
              to: plcOldH + 1,
              startTime: now + ANIM_DURATION * 0.3,
              duration: ANIM_DURATION,
            });

            animating = true;
            return true;
          }

          height[rem.x][rem.y] = remH;
        }
        return false;
      }

      // --- Three.js ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      const aspect = window.innerWidth / window.innerHeight;
      const viewSize = 12;
      const camera = new THREE.OrthographicCamera(-viewSize * aspect, viewSize * aspect, viewSize, -viewSize, -100, 100);
      camera.position.set(10, 10, 10);
      camera.lookAt(N / 2, N / 2, N / 2);
      camera.up.set(0, 0, 1);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(N / 2, N / 2, N / 2);
      controls.update();

      // --- Walls ---
      function buildWalls() {
        const wallMat = new THREE.LineBasicMaterial({ color: 0x333333 });
        const addGrid = (pts) => {
          const g = new THREE.BufferGeometry();
          g.setAttribute("position", new THREE.Float32BufferAttribute(pts, 3));
          scene.add(new THREE.LineSegments(g, wallMat));
        };
        let pX = [],
          pY = [],
          pZ = [];
        for (let i = 0; i <= N; i++) {
          pX.push(0, i, 0, 0, i, N, 0, 0, i, 0, N, i);
          pY.push(i, 0, 0, i, 0, N, 0, 0, i, N, 0, i);
          pZ.push(i, 0, 0, i, N, 0, 0, i, 0, N, i, 0);
        }
        addGrid(pX);
        addGrid(pY);
        addGrid(pZ);
      }

      // --- Dynamic mesh ---
      const faceMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        side: THREE.DoubleSide,
        polygonOffset: true,
        polygonOffsetFactor: 1,
        polygonOffsetUnits: 1,
      });
      const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000 });

      let faceMesh = null;
      let edgeLines = null;

      function dh(x, y) {
        if (x < 0 || x >= N || y < 0 || y >= N) return 0;
        return displayHeight[x][y];
      }

      function rebuildMesh() {
        if (faceMesh) {
          scene.remove(faceMesh);
          faceMesh.geometry.dispose();
        }
        if (edgeLines) {
          scene.remove(edgeLines);
          edgeLines.geometry.dispose();
        }

        const faces = [];

        for (let x = 0; x < N; x++) {
          for (let y = 0; y < N; y++) {
            const hh = displayHeight[x][y];
            if (hh <= 0) continue;

            // Top face at fractional height
            faces.push({
              type: "zp",
              v: [
                [x, y, hh],
                [x + 1, y, hh],
                [x + 1, y + 1, hh],
                [x, y + 1, hh],
              ],
            });

            // Side faces: we need to handle fractional heights
            // +X: exposed from max(0, dh(x+1,y)) to hh
            const dirs = [
              {
                dx: 1,
                dy: 0,
                type: "xp",
                quad: (z0, z1) => [
                  [x + 1, y, z0],
                  [x + 1, y, z1],
                  [x + 1, y + 1, z1],
                  [x + 1, y + 1, z0],
                ],
              },
              {
                dx: -1,
                dy: 0,
                type: "xn",
                quad: (z0, z1) => [
                  [x, y, z0],
                  [x, y + 1, z0],
                  [x, y + 1, z1],
                  [x, y, z1],
                ],
              },
              {
                dx: 0,
                dy: 1,
                type: "yp",
                quad: (z0, z1) => [
                  [x, y + 1, z0],
                  [x, y + 1, z1],
                  [x + 1, y + 1, z1],
                  [x + 1, y + 1, z0],
                ],
              },
              {
                dx: 0,
                dy: -1,
                type: "yn",
                quad: (z0, z1) => [
                  [x, y, z0],
                  [x + 1, y, z0],
                  [x + 1, y, z1],
                  [x, y, z1],
                ],
              },
            ];

            for (const d of dirs) {
              const nh = dh(x + d.dx, y + d.dy);
              if (hh > nh) {
                // One continuous side face from nh to hh
                // But for correct edge merging with integer-height neighbors,
                // we split at integer boundaries
                const zBot = Math.max(0, nh);
                const zTop = hh;

                // Split into integer segments + fractional ends
                const splits = [zBot];
                const lo = Math.ceil(zBot);
                const hi = Math.floor(zTop);
                for (let z = lo; z <= hi; z++) {
                  if (z > zBot && z < zTop) splits.push(z);
                }
                splits.push(zTop);

                for (let i = 0; i < splits.length - 1; i++) {
                  const z0 = splits[i],
                    z1 = splits[i + 1];
                  if (z1 - z0 < 1e-6) continue;
                  faces.push({ type: d.type, v: d.quad(z0, z1) });
                }
              }
            }
          }
        }

        // Build face geometry
        const faceVerts = [],
          faceIndices = [];
        faces.forEach((f) => {
          const base = faceVerts.length / 3;
          f.v.forEach((p) => faceVerts.push(p[0], p[1], p[2]));
          faceIndices.push(base, base + 1, base + 2, base, base + 2, base + 3);
        });

        const fGeom = new THREE.BufferGeometry();
        fGeom.setAttribute("position", new THREE.Float32BufferAttribute(faceVerts, 3));
        fGeom.setIndex(faceIndices);
        fGeom.computeVertexNormals();
        faceMesh = new THREE.Mesh(fGeom, faceMat);
        scene.add(faceMesh);

        // Build external edges
        const edgeMap = new Map();
        const EPS = 1e-4;

        // Quantize to avoid floating point key issues
        function qv(v) {
          return v.map((c) => {
            const r = Math.round(c * 1024) / 1024;
            return r;
          });
        }

        faces.forEach((f) => {
          for (let i = 0; i < f.v.length; i++) {
            const a = qv(f.v[i]),
              b = qv(f.v[(i + 1) % f.v.length]);
            const ka = a.join(","),
              kb = b.join(",");
            const k = ka < kb ? ka + "|" + kb : kb + "|" + ka;
            if (!edgeMap.has(k)) edgeMap.set(k, { a, b, types: new Set() });
            edgeMap.get(k).types.add(f.type);
          }
        });

        const ev = [];
        edgeMap.forEach((e) => {
          if (e.types.size > 1) {
            ev.push(...e.a, ...e.b);
          }
        });

        const eGeom = new THREE.BufferGeometry();
        eGeom.setAttribute("position", new THREE.Float32BufferAttribute(ev, 3));
        edgeLines = new THREE.LineSegments(eGeom, edgeMat);
        scene.add(edgeLines);
      }

      // --- Input ---
      function handleAction() {
        if (animating) {
          pendingMutations++;
          return;
        }
        mutate();
      }

      let clickStart = null;
      renderer.domElement.addEventListener("pointerdown", (e) => {
        clickStart = { x: e.clientX, y: e.clientY };
      });
      renderer.domElement.addEventListener("pointerup", (e) => {
        if (!clickStart) return;
        if (Math.hypot(e.clientX - clickStart.x, e.clientY - clickStart.y) < 5) handleAction();
        clickStart = null;
      });
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          handleAction();
        }
      });

      window.addEventListener("resize", () => {
        const a = window.innerWidth / window.innerHeight;
        camera.left = -viewSize * a;
        camera.right = viewSize * a;
        camera.top = viewSize;
        camera.bottom = -viewSize;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // --- Animation loop ---
      buildWalls();

      function updateAnimations(now) {
        let anyActive = false;

        for (let i = animations.length - 1; i >= 0; i--) {
          const a = animations[i];
          const elapsed = now - a.startTime;

          if (elapsed < 0) {
            // Not started yet, keep at 'from'
            displayHeight[a.x][a.y] = a.from;
            anyActive = true;
            continue;
          }

          const t = Math.min(elapsed / a.duration, 1);
          const et = easeOutQuart(t);
          displayHeight[a.x][a.y] = a.from + (a.to - a.from) * et;

          if (t >= 1) {
            displayHeight[a.x][a.y] = a.to;
            animations.splice(i, 1);
          } else {
            anyActive = true;
          }
        }

        animating = anyActive;

        if (!anyActive && pendingMutations > 0) {
          pendingMutations--;
          mutate();
        }
      }

      // Sync displayHeight to height initially
      for (let x = 0; x < N; x++) for (let y = 0; y < N; y++) displayHeight[x][y] = height[x][y];

      function animate(now) {
        requestAnimationFrame(animate);
        updateAnimations(now);
        rebuildMesh();
        controls.update();
        renderer.render(scene, camera);
      }
      animate(performance.now());
    </script>
  </body>
</html>
