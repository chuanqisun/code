<!DOCTYPE html>
<html>
  <body style="margin: 0; background: #111; overflow: hidden">
    <canvas id="c"></canvas>

    <div
      id="ui"
      style="
        position: fixed;
        left: 50%;
        top: 12px;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        z-index: 10;
      "
    >
      <div
        id="bar"
        style="
          display: flex;
          gap: 6px;
          align-items: center;
          padding: 8px 10px;
          background: rgba(0, 0, 0, 0.45);
          border-radius: 999px;
          color: #fff;
          font: 12px sans-serif;
        "
      >
        <button id="mouseBtn">Mouse</button>
        <button id="headBtn">Head</button>
        <button id="calBtn">Calibrate</button>
        <button id="hideBtn">Hide</button>
        <span id="status">mouse</span>
      </div>
      <video
        id="video"
        autoplay
        playsinline
        muted
        style="width: 160px; height: 120px; object-fit: cover; background: #000; border-radius: 10px; opacity: 0.9; display: none"
      ></video>
    </div>

    <script type="module">
      import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

      // --- Parameters ---
      const BOARD_W = 400;
      const BOARD_H = 400;
      const INTERNAL_RES_SCALE = 3; // raise this: 2, 3, 4...
      const DROP_SIZE = 300;
      const CONTACT_ANGLE = Math.PI * 0.38;
      const REFRACT_SCALE = 85;
      const CAMERA_SHIFT_MAX = 72;
      const HEAD_GAIN_X = 42;
      const HEAD_GAIN_Y = 42;
      const COLS = 20;
      const ROWS = 20;
      const COLOR_A = "#2c2c2c";
      const COLOR_B = "#f0e6d3";

      const HI_W = BOARD_W * INTERNAL_RES_SCALE;
      const HI_H = BOARD_H * INTERNAL_RES_SCALE;
      const DROP_SIZE_HI = DROP_SIZE * INTERNAL_RES_SCALE;
      const DROP_R = DROP_SIZE_HI * 0.5;
      const DROP_CX = HI_W * 0.5;
      const DROP_CY = HI_H * 0.5;

      const a = DROP_R;
      const theta = CONTACT_ANGLE;
      const h = a * Math.tan(theta * 0.5);
      const R = a / Math.sin(theta);

      // --- Helpers / systems ---
      class Smoother {
        constructor(factor = 0.15) {
          this.factor = factor;
          this.currentValue = null;
        }
        next(target) {
          if (this.currentValue === null) this.currentValue = target;
          else this.currentValue += (target - this.currentValue) * this.factor;
          return this.currentValue;
        }
        reset(value = null) {
          this.currentValue = value;
        }
      }

      class FaceTracker extends EventTarget {
        static detectorPromise = null;
        static preloadOnIdle() {
          if ("requestIdleCallback" in window) requestIdleCallback(() => FaceTracker.preloadLibrary(), { timeout: 1000 });
          else setTimeout(() => FaceTracker.preloadLibrary(), 1000);
        }
        static async preloadLibrary() {
          if (this.detectorPromise) return this.detectorPromise;
          this.detectorPromise = (async () => {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            return FaceDetector.createFromOptions(vision, {
              baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite",
                delegate: "GPU",
              },
              runningMode: "VIDEO",
            });
          })();
          return this.detectorPromise;
        }
        constructor(videoElement, smoothFactor = 0.3) {
          super();
          this.video = videoElement;
          this.faceDetector = null;
          this.running = false;
          this.lastVideoTime = -1;
          this.requestRef = null;
          this.restingPoint = { x: 0, y: 0 };
          this.isCalibrating = false;
          this.calibrationData = [];
          this.fps = 0;
          this.lastFrameTime = 0;
          this.smootherX = new Smoother(smoothFactor);
          this.smootherY = new Smoother(smoothFactor);
        }
        async initialize() {
          if (this.faceDetector) return;
          this.faceDetector = await FaceTracker.preloadLibrary();
        }
        async start() {
          if (this.running) return;
          await this.initialize();
          this.running = true;
          this.predict();
          this.dispatchEvent(new CustomEvent("started"));
        }
        stop() {
          if (!this.running) return;
          this.running = false;
          this.lastFrameTime = 0;
          this.fps = 0;
          this.smootherX.reset();
          this.smootherY.reset();
          if (this.requestRef) cancelAnimationFrame(this.requestRef);
          this.requestRef = null;
          this.dispatchEvent(new CustomEvent("stopped"));
        }
        calibrate() {
          if (!this.running) return;
          this.isCalibrating = true;
          this.calibrationData = [];
          setTimeout(() => {
            this.isCalibrating = false;
            if (this.calibrationData.length) {
              const sumX = this.calibrationData.reduce((a, p) => a + p.x, 0);
              const sumY = this.calibrationData.reduce((a, p) => a + p.y, 0);
              this.restingPoint = { x: sumX / this.calibrationData.length, y: sumY / this.calibrationData.length };
            }
            this.dispatchEvent(new CustomEvent("calibrated", { detail: this.restingPoint }));
          }, 1000);
        }
        predict() {
          if (!this.running) return;
          const t = performance.now();
          if (this.lastFrameTime > 0) {
            const delta = t - this.lastFrameTime;
            const currentFps = 1000 / delta;
            this.fps = this.fps * 0.9 + currentFps * 0.1;
          }
          this.lastFrameTime = t;
          this.dispatchEvent(new CustomEvent("fps", { detail: { fps: this.fps } }));

          if (this.video.currentTime !== this.lastVideoTime) {
            this.lastVideoTime = this.video.currentTime;
            const result = this.faceDetector.detectForVideo(this.video, t);
            if (result.detections && result.detections.length > 0) {
              const detection = result.detections[0];
              if (detection.keypoints && detection.keypoints.length >= 2) {
                const eye1 = detection.keypoints[0];
                const eye2 = detection.keypoints[1];
                const midX = (eye1.x + eye2.x) / 2;
                const midY = (eye1.y + eye2.y) / 2;
                const rawX = (1 - midX) * 2 - 1;
                const rawY = midY * 2 - 1;
                if (this.isCalibrating) this.calibrationData.push({ x: rawX, y: rawY });
                const x = this.smootherX.next(rawX - this.restingPoint.x);
                const y = this.smootherY.next(rawY - this.restingPoint.y);
                this.dispatchEvent(new CustomEvent("updated", { detail: { x, y } }));
              }
            }
          }
          this.requestRef = requestAnimationFrame(() => this.predict());
        }
      }

      // --- DOM ---
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const ui = document.getElementById("ui");
      const bar = document.getElementById("bar");
      const video = document.getElementById("video");
      const mouseBtn = document.getElementById("mouseBtn");
      const headBtn = document.getElementById("headBtn");
      const calBtn = document.getElementById("calBtn");
      const hideBtn = document.getElementById("hideBtn");
      const statusEl = document.getElementById("status");

      // --- State ---
      const state = {
        mode: "mouse",
        mouseX: BOARD_W * 0.5,
        mouseY: BOARD_H * 0.5,
        headX: 0,
        headY: 0,
        uiHidden: false,
        uiHover: false,
        dirty: true,
      };

      // --- High res static imagery ---
      const baseCanvas = document.createElement("canvas");
      baseCanvas.width = HI_W;
      baseCanvas.height = HI_H;
      const bctx = baseCanvas.getContext("2d");

      const outCanvas = document.createElement("canvas");
      outCanvas.width = HI_W;
      outCanvas.height = HI_H;
      const octx = outCanvas.getContext("2d");

      drawCheckerboard(bctx, HI_W, HI_H, COLS, ROWS, COLOR_A, COLOR_B);

      const src = bctx.getImageData(0, 0, HI_W, HI_H);
      const out = octx.createImageData(HI_W, HI_H);

      // --- Tracking ---
      const tracker = new FaceTracker(video, 0.22);
      FaceTracker.preloadOnIdle();

      tracker.addEventListener("updated", (e) => {
        state.headX = clamp(e.detail.x, -1, 1);
        state.headY = clamp(e.detail.y, -1, 1);
        state.dirty = true;
      });
      tracker.addEventListener("started", () => {
        status("head");
        applyUiVisibility();
      });
      tracker.addEventListener("stopped", () => {
        status("mouse");
        applyUiVisibility();
      });
      tracker.addEventListener("calibrated", () => status("head calibrated"));
      tracker.addEventListener("fps", (e) => {
        if (state.mode === "head") status(`head ${e.detail.fps.toFixed(0)} fps`);
      });

      // --- UI ---
      ui.addEventListener("mouseenter", () => {
        state.uiHover = true;
        applyUiVisibility();
      });
      ui.addEventListener("mouseleave", () => {
        state.uiHover = false;
        applyUiVisibility();
      });

      hideBtn.onclick = () => {
        state.uiHidden = !state.uiHidden;
        hideBtn.textContent = state.uiHidden ? "Show" : "Hide";
        applyUiVisibility();
      };

      mouseBtn.onclick = () => {
        state.mode = "mouse";
        state.mouseX = BOARD_W * 0.5;
        state.mouseY = BOARD_H * 0.5;
        tracker.stop();
        status("mouse");
        applyUiVisibility();
        state.dirty = true;
      };

      headBtn.onclick = async () => {
        try {
          await ensureCamera(video);
          state.mode = "head";
          await tracker.start();
          status("head");
          applyUiVisibility();
          state.dirty = true;
        } catch (err) {
          status("camera denied");
          console.error(err);
        }
      };

      calBtn.onclick = () => {
        if (state.mode === "head") tracker.calibrate();
      };

      function applyUiVisibility() {
        const visible = !state.uiHidden || state.uiHover;
        bar.style.opacity = visible ? "1" : "0";
        bar.style.pointerEvents = visible ? "auto" : "none";
        const showVideo = visible && state.mode === "head" && !!video.srcObject;
        video.style.display = showVideo ? "block" : "none";
      }

      // --- Input mapping ---
      // Mouse stays in display space mapped back into the fixed 400x400 board space.
      // Internal render uses high-res board coordinates, scaled by INTERNAL_RES_SCALE.
      canvas.addEventListener("mousemove", (e) => {
        if (state.mode !== "mouse") return;
        const rect = canvas.getBoundingClientRect();
        const fit = getContainRect(rect.width, rect.height, BOARD_W, BOARD_H);
        state.mouseX = ((e.clientX - rect.left - fit.x) / fit.w) * BOARD_W;
        state.mouseY = ((e.clientY - rect.top - fit.y) / fit.h) * BOARD_H;
        state.dirty = true;
      });

      canvas.addEventListener("mouseleave", () => {
        if (state.mode !== "mouse") return;
        state.mouseX = BOARD_W * 0.5;
        state.mouseY = BOARD_H * 0.5;
        state.dirty = true;
      });

      window.addEventListener("resize", resize);
      resize();
      applyUiVisibility();
      tick();

      // --- Render ---
      function tick() {
        if (state.dirty) {
          renderDropletBoard(getViewShiftHi());
          renderToScreen();
          state.dirty = false;
        }
        requestAnimationFrame(tick);
      }

      function renderDropletBoard(viewShift) {
        for (let y = 0; y < HI_H; y++) {
          for (let x = 0; x < HI_W; x++) {
            const dx = x - DROP_CX;
            const dy = y - DROP_CY;
            const r2 = dx * dx + dy * dy;
            const i = (y * HI_W + x) * 4;

            if (r2 <= a * a) {
              const z = capHeight(r2, R, h);
              const nx = dx / R;
              const ny = dy / R;
              const strength = (z / h) * (REFRACT_SCALE * INTERNAL_RES_SCALE);
              const sx = x - nx * strength + viewShift.x;
              const sy = y - ny * strength + viewShift.y;
              sampleBilinear(src.data, HI_W, HI_H, sx, sy, out.data, i);
            } else {
              out.data[i] = src.data[i];
              out.data[i + 1] = src.data[i + 1];
              out.data[i + 2] = src.data[i + 2];
              out.data[i + 3] = 255;
            }
          }
        }
        octx.putImageData(out, 0, 0);
      }

      function renderToScreen() {
        const fit = getContainRect(canvas.width, canvas.height, BOARD_W, BOARD_H);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(outCanvas, fit.x, fit.y, fit.w, fit.h);
      }

      function getViewShiftHi() {
        if (state.mode === "head") {
          return {
            x: state.headX * HEAD_GAIN_X * INTERNAL_RES_SCALE,
            y: state.headY * HEAD_GAIN_Y * INTERNAL_RES_SCALE,
          };
        }
        return {
          x: clamp((state.mouseX - BOARD_W * 0.5) / (DROP_SIZE * 0.5), -1, 1) * CAMERA_SHIFT_MAX * INTERNAL_RES_SCALE,
          y: clamp((state.mouseY - BOARD_H * 0.5) / (DROP_SIZE * 0.5), -1, 1) * CAMERA_SHIFT_MAX * INTERNAL_RES_SCALE,
        };
      }

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        state.dirty = true;
      }

      function status(text) {
        statusEl.textContent = `${text} · res ${INTERNAL_RES_SCALE}x`;
      }

      // --- low-level pure functions ---
      function drawCheckerboard(ctx, w, h, cols, rows, a, b) {
        const cellW = w / cols;
        const cellH = h / rows;
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            ctx.fillStyle = (x + y) % 2 ? a : b;
            ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
          }
        }
      }
      function getContainRect(sw, sh, aw, ah) {
        const s = Math.min(sw / aw, sh / ah);
        const w = aw * s;
        const h = ah * s;
        return { x: (sw - w) * 0.5, y: (sh - h) * 0.5, w, h };
      }
      function capHeight(r2, R, h) {
        return Math.sqrt(R * R - r2) - (R - h);
      }
      function clamp(v, min, max) {
        return v < min ? min : v > max ? max : v;
      }
      function sampleBilinear(data, w, h, x, y, out, oi) {
        const x0 = clampInt(Math.floor(x), 0, w - 1);
        const y0 = clampInt(Math.floor(y), 0, h - 1);
        const x1 = clampInt(x0 + 1, 0, w - 1);
        const y1 = clampInt(y0 + 1, 0, h - 1);
        const tx = x - x0;
        const ty = y - y0;

        const i00 = (y0 * w + x0) * 4;
        const i10 = (y0 * w + x1) * 4;
        const i01 = (y1 * w + x0) * 4;
        const i11 = (y1 * w + x1) * 4;

        const w00 = (1 - tx) * (1 - ty);
        const w10 = tx * (1 - ty);
        const w01 = (1 - tx) * ty;
        const w11 = tx * ty;

        out[oi] = data[i00] * w00 + data[i10] * w10 + data[i01] * w01 + data[i11] * w11;
        out[oi + 1] = data[i00 + 1] * w00 + data[i10 + 1] * w10 + data[i01 + 1] * w01 + data[i11 + 1] * w11;
        out[oi + 2] = data[i00 + 2] * w00 + data[i10 + 2] * w10 + data[i01 + 2] * w01 + data[i11 + 2] * w11;
        out[oi + 3] = 255;
      }
      function clampInt(v, min, max) {
        return v < min ? min : v > max ? max : v | 0;
      }
      async function ensureCamera(video) {
        if (video.srcObject) return;
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        video.srcObject = stream;
        await video.play();
      }
    </script>
  </body>
</html>
