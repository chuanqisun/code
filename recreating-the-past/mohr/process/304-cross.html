<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #fff;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from "https://esm.sh/three@0.180.0/build/three.module.js";

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setClearColor(0xffffff);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setScissorTest(true);
      document.body.appendChild(renderer.domElement);

      const frustumSize = 4;
      const cubeSize = 1.45;
      const half = cubeSize / 2;

      function makeCamera(aspect) {
        const cam = new THREE.OrthographicCamera((-frustumSize * aspect) / 2, (frustumSize * aspect) / 2, frustumSize / 2, -frustumSize / 2, 0.1, 100);
        cam.position.set(0, 0, 6);
        cam.lookAt(0, 0, 0);
        return cam;
      }

      let viewAspect = window.innerWidth / 2 / window.innerHeight;
      const leftCamera = makeCamera(viewAspect);
      const rightCamera = makeCamera(viewAspect);

      const edgePoints = [
        [
          [-half, -half, -half],
          [half, -half, -half],
        ],
        [
          [half, -half, -half],
          [half, half, -half],
        ],
        [
          [half, half, -half],
          [-half, half, -half],
        ],
        [
          [-half, half, -half],
          [-half, -half, -half],
        ],

        [
          [-half, -half, half],
          [half, -half, half],
        ],
        [
          [half, -half, half],
          [half, half, half],
        ],
        [
          [half, half, half],
          [-half, half, half],
        ],
        [
          [-half, half, half],
          [-half, -half, half],
        ],

        [
          [-half, -half, -half],
          [-half, -half, half],
        ],
        [
          [half, -half, -half],
          [half, -half, half],
        ],
        [
          [half, half, -half],
          [half, half, half],
        ],
        [
          [-half, half, -half],
          [-half, half, half],
        ],
      ];

      function createCube() {
        const group = new THREE.Group();
        const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);

        // Invisible opaque depth shell so background lines are hidden behind cube.
        const depthShell = new THREE.Mesh(
          geometry,
          new THREE.MeshBasicMaterial({
            colorWrite: false,
            depthWrite: true,
            depthTest: true,
          })
        );
        depthShell.renderOrder = 0;
        group.add(depthShell);

        const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({ color: 0x000000 }));
        edges.renderOrder = 2;
        group.add(edges);

        const boldCount = THREE.MathUtils.randInt(3, 5);
        const shuffled = [...edgePoints].sort(() => Math.random() - 0.5);

        shuffled.slice(0, boldCount).forEach(([a, b]) => {
          const start = new THREE.Vector3(...a);
          const end = new THREE.Vector3(...b);
          const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
          const dir = new THREE.Vector3().subVectors(end, start);

          const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, dir.length(), 16), new THREE.MeshBasicMaterial({ color: 0x000000 }));

          cylinder.position.copy(mid);
          cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
          cylinder.renderOrder = 3;

          group.add(cylinder);
        });

        return group;
      }

      function createHorizontalLine() {
        const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-20, 0, -2), new THREE.Vector3(20, 0, -2)]);
        const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x000000 }));
        line.renderOrder = 1;
        return line;
      }

      const leftScene = new THREE.Scene();
      const rightScene = new THREE.Scene();
      leftScene.background = new THREE.Color(0xffffff);
      rightScene.background = new THREE.Color(0xffffff);

      const leftCube = createCube();
      const rightCube = leftCube.clone(true);

      leftScene.add(leftCube, createHorizontalLine());
      rightScene.add(rightCube, createHorizontalLine());

      function positionCubesOnDivider() {
        const viewWidth = frustumSize * viewAspect;
        leftCube.position.x = viewWidth / 2;
        rightCube.position.x = -viewWidth / 2;
      }
      positionCubesOnDivider();

      // ---- Overlay scene for vertical divider, rendered on top across full canvas ----
      const overlayScene = new THREE.Scene();
      const overlayCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      // A vertical line in NDC at x = 0
      const dividerGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -1, 0), new THREE.Vector3(0, 1, 0)]);
      const dividerLine = new THREE.Line(dividerGeom, new THREE.LineBasicMaterial({ color: 0x000000 }));
      overlayScene.add(dividerLine);

      let t = 0;

      function updateCameras() {
        viewAspect = window.innerWidth / 2 / window.innerHeight;
        [leftCamera, rightCamera].forEach((cam) => {
          cam.left = (-frustumSize * viewAspect) / 2;
          cam.right = (frustumSize * viewAspect) / 2;
          cam.top = frustumSize / 2;
          cam.bottom = -frustumSize / 2;
          cam.updateProjectionMatrix();
        });
        positionCubesOnDivider();
      }

      function animate() {
        requestAnimationFrame(animate);
        t += 0.012;

        const rx = Math.sin(t * 1.1) * 0.9;
        const ry = Math.sin(t * 0.8) * 0.9;
        const rz = Math.sin(t * 1.4) * 0.45;

        leftCube.rotation.set(rx, ry, rz);
        rightCube.rotation.set(-rx, -ry, -rz);

        const w = window.innerWidth;
        const h = window.innerHeight;
        const halfW = Math.floor(w / 2);

        renderer.clear();

        renderer.setViewport(0, 0, halfW, h);
        renderer.setScissor(0, 0, halfW, h);
        renderer.render(leftScene, leftCamera);

        renderer.setViewport(halfW, 0, w - halfW, h);
        renderer.setScissor(halfW, 0, w - halfW, h);
        renderer.render(rightScene, rightCamera);

        // Overlay divider across whole canvas
        renderer.setViewport(0, 0, w, h);
        renderer.setScissor(0, 0, w, h);
        renderer.autoClear = false;
        renderer.clearDepth();
        renderer.render(overlayScene, overlayCamera);
        renderer.autoClear = true;
      }

      animate();

      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        updateCameras();
      });
    </script>
  </body>
</html>
