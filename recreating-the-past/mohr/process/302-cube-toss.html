<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #fff;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from "https://esm.sh/three@0.180.0/build/three.module.js";

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setClearColor(0xffffff);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const aspect = window.innerWidth / window.innerHeight;
      const frustumSize = 5;

      const camera = new THREE.OrthographicCamera((-frustumSize * aspect) / 2, (frustumSize * aspect) / 2, frustumSize / 2, -frustumSize / 2, 0.1, 100);
      camera.position.set(0, 0, 6);
      camera.lookAt(0, 0, 0);

      const cubeSize = 1.4;
      const half = cubeSize / 2;

      const edgePoints = [
        [
          [-half, -half, -half],
          [half, -half, -half],
        ],
        [
          [half, -half, -half],
          [half, half, -half],
        ],
        [
          [half, half, -half],
          [-half, half, -half],
        ],
        [
          [-half, half, -half],
          [-half, -half, -half],
        ],

        [
          [-half, -half, half],
          [half, -half, half],
        ],
        [
          [half, -half, half],
          [half, half, half],
        ],
        [
          [half, half, half],
          [-half, half, half],
        ],
        [
          [-half, half, half],
          [-half, -half, half],
        ],

        [
          [-half, -half, -half],
          [-half, -half, half],
        ],
        [
          [half, -half, -half],
          [half, -half, half],
        ],
        [
          [half, half, -half],
          [half, half, half],
        ],
        [
          [-half, half, -half],
          [-half, half, half],
        ],
      ];

      function createCube() {
        const group = new THREE.Group();

        const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({ color: 0x000000 }));
        group.add(edges);

        const boldCount = THREE.MathUtils.randInt(3, 5);
        const shuffled = [...edgePoints].sort(() => Math.random() - 0.5);
        const boldEdges = shuffled.slice(0, boldCount);

        boldEdges.forEach(([a, b]) => {
          const start = new THREE.Vector3(...a);
          const end = new THREE.Vector3(...b);
          const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
          const dir = new THREE.Vector3().subVectors(end, start);
          const length = dir.length();

          const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, length, 16), new THREE.MeshBasicMaterial({ color: 0x000000 }));

          cylinder.position.copy(mid);
          cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());

          group.add(cylinder);
        });

        return group;
      }

      const leftCube = createCube();
      const rightCube = leftCube.clone(true);

      leftCube.position.x = -1.2;
      rightCube.position.x = 1.2;

      scene.add(leftCube);
      scene.add(rightCube);

      let t = 0;

      function animate() {
        requestAnimationFrame(animate);

        t += 0.012;

        const rx = Math.sin(t * 1.1) * 0.9;
        const ry = Math.sin(t * 0.8) * 0.9;
        const rz = Math.sin(t * 1.4) * 0.45;

        leftCube.rotation.set(rx, ry, rz);

        // Mirrored motion on every axis
        rightCube.rotation.set(-rx, -ry, -rz);

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener("resize", () => {
        const aspect = window.innerWidth / window.innerHeight;

        camera.left = (-frustumSize * aspect) / 2;
        camera.right = (frustumSize * aspect) / 2;
        camera.top = frustumSize / 2;
        camera.bottom = -frustumSize / 2;

        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
