<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Body Pose Visualization</title>
    <style>
      body {
        font-family: sans-serif;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .panel {
        display: inline-block;
      }
      canvas,
      video {
        border: 1px solid #000;
        display: block;
      }
      #canvas3 {
        background: #000;
      }
    </style>
  </head>
  <body>
    <h1>Webcam Pose Visualization</h1>

    <div style="margin-bottom: 12px">
      <button id="startBtn" disabled>Loading pose model...</button>
      <span id="status">Initializing MediaPipe pose landmarker</span>
    </div>

    <video id="video" autoplay playsinline muted style="display: none"></video>

    <div class="row">
      <div class="panel">
        <div>Canvas 1: Live Video</div>
        <canvas id="canvas1" width="640" height="480"></canvas>
      </div>
      <div class="panel">
        <div>Canvas 2: 3D Pose</div>
        <canvas id="canvas3" width="640" height="480"></canvas>
      </div>
    </div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.180.0/build/three.module.js";
      import { OrbitControls } from "https://esm.sh/three@0.180.0/examples/jsm/controls/OrbitControls.js";
      import { PoseLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.0";

      const video = document.getElementById("video");
      const startBtn = document.getElementById("startBtn");
      const status = document.getElementById("status");

      const canvas1 = document.getElementById("canvas1");
      const canvas3 = document.getElementById("canvas3");

      const ctx1 = canvas1.getContext("2d");

      let poseLandmarker = null;
      let webcamRunning = false;
      const runningMode = "VIDEO";
      let lastVideoTime = -1;
      let latestWorldLandmarks = null;

      const POSE_CONNECTIONS = PoseLandmarker.POSE_CONNECTIONS.map((connection) => {
        if (Array.isArray(connection)) {
          return connection;
        }

        return [connection.start, connection.end];
      });
      const LANDMARK_COUNT = 33;

      const renderer = new THREE.WebGLRenderer({ canvas: canvas3, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(40, canvas3.width / canvas3.height, 0.01, 20);
      camera.position.set(0, 0.1, 2.4);

      const controls = new OrbitControls(camera, canvas3);
      controls.enableDamping = true;
      controls.target.set(0, 0.1, 0);

      const ambientLight = new THREE.AmbientLight(0xffffff, 1.1);
      const keyLight = new THREE.DirectionalLight(0xffffff, 0.6);
      keyLight.position.set(0.5, 1.5, 2);
      scene.add(ambientLight, keyLight);

      const landmarkGroup = new THREE.Group();
      const connectorGroup = new THREE.Group();
      const hoopGroup = new THREE.Group();
      scene.add(connectorGroup, landmarkGroup, hoopGroup);

      const pointGeometry = new THREE.SphereGeometry(0.025, 18, 18);
      const pointMaterial = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.4,
        metalness: 0,
      });

      const landmarkMeshes = Array.from({ length: LANDMARK_COUNT }, () => {
        const mesh = new THREE.Mesh(pointGeometry, pointMaterial.clone());
        mesh.visible = false;
        landmarkGroup.add(mesh);
        return mesh;
      });

      const connectorMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
      const connectorLines = POSE_CONNECTIONS.map(() => {
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute([0, 0, 0, 0, 0, 0], 3));
        const line = new THREE.Line(geometry, connectorMaterial);
        line.visible = false;
        connectorGroup.add(line);
        return line;
      });

      const TORSO_LANDMARKS = {
        leftShoulder: 11,
        rightShoulder: 12,
        leftHip: 23,
        rightHip: 24,
      };

      const HOOP_COUNT = 3;
      const HOOP_SEGMENTS = 96;
      const HOOP_VERTICAL_SPAN = 0.28;
      const HOOP_RADIUS_PADDING = 0.12;
      const HOOP_MIN_RADIUS = 0.18;

      const hoopMaterial = new THREE.LineBasicMaterial({
        color: 0xff7a00,
        transparent: true,
        opacity: 0.95,
      });

      const hoopLines = Array.from({ length: HOOP_COUNT }, () => {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array((HOOP_SEGMENTS + 1) * 3);
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        const line = new THREE.LineLoop(geometry, hoopMaterial);
        line.visible = false;
        hoopGroup.add(line);
        return line;
      });

      initPoseLandmarker();
      renderThreeScene();

      startBtn.addEventListener("click", enableCam);
      window.addEventListener("resize", handleResize);
      handleResize();

      async function initPoseLandmarker() {
        try {
          const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");

          poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/latest/pose_landmarker_full.task",
              delegate: "GPU",
            },
            runningMode,
            numPoses: 1,
            minPoseDetectionConfidence: 0.5,
            minPosePresenceConfidence: 0.5,
            minTrackingConfidence: 0.5,
          });

          startBtn.disabled = false;
          startBtn.textContent = "Start Webcam";
          status.textContent = "Pose model ready";
        } catch (error) {
          console.error("Failed to initialize pose landmarker", error);
          status.textContent = "Pose model failed to load";
          startBtn.textContent = "Reload page to retry";
        }
      }

      async function enableCam() {
        if (!poseLandmarker) {
          return;
        }

        if (webcamRunning) {
          stopCam();
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 640 },
              height: { ideal: 480 },
              facingMode: "user",
            },
            audio: false,
          });

          video.srcObject = stream;
          await video.play();

          webcamRunning = true;
          startBtn.textContent = "Stop Webcam";
          status.textContent = "Tracking pose from webcam";
          syncCanvasSize(video.videoWidth || 640, video.videoHeight || 480);
          requestAnimationFrame(processFrame);
        } catch (error) {
          console.error("Could not access webcam", error);
          status.textContent = "Webcam access failed";
        }
      }

      function stopCam() {
        webcamRunning = false;
        lastVideoTime = -1;
        latestPoseLandmarks = null;
        latestWorldLandmarks = null;
        startBtn.textContent = "Start Webcam";
        status.textContent = "Pose model ready";

        const stream = video.srcObject;
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
        }
        video.srcObject = null;

        clearCanvas(ctx1, canvas1);
        updateThreePose(null);
      }

      function processFrame() {
        if (!webcamRunning) {
          return;
        }

        drawVideoFrame();
        detectPoseFrame();
        requestAnimationFrame(processFrame);
      }

      function drawVideoFrame() {
        if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
          return;
        }

        ctx1.save();
        ctx1.clearRect(0, 0, canvas1.width, canvas1.height);
        ctx1.translate(canvas1.width, 0);
        ctx1.scale(-1, 1);
        ctx1.drawImage(video, 0, 0, canvas1.width, canvas1.height);
        ctx1.restore();
      }

      function detectPoseFrame() {
        if (!poseLandmarker || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
          return;
        }

        if (video.currentTime === lastVideoTime) {
          return;
        }

        lastVideoTime = video.currentTime;
        const result = poseLandmarker.detectForVideo(video, performance.now());

        latestWorldLandmarks = result.worldLandmarks?.[0] ?? null;

        updateThreePose(latestWorldLandmarks);
        status.textContent = latestWorldLandmarks ? "Pose detected" : "No pose detected";
      }

      function updateThreePose(worldLandmarks) {
        landmarkMeshes.forEach((mesh) => {
          mesh.visible = false;
        });

        connectorLines.forEach((line) => {
          line.visible = false;
        });

        hoopLines.forEach((line) => {
          line.visible = false;
        });

        if (!worldLandmarks) {
          return;
        }

        worldLandmarks.forEach((landmark, index) => {
          const mesh = landmarkMeshes[index];
          mesh.visible = true;
          mesh.position.set(-landmark.x, -landmark.y, -landmark.z);
          const confidence = Math.max(0.25, landmark.visibility ?? 1);
          mesh.scale.setScalar(0.7 + confidence * 0.8);
        });

        POSE_CONNECTIONS.forEach(([startIndex, endIndex], index) => {
          const start = worldLandmarks[startIndex];
          const end = worldLandmarks[endIndex];

          if (!start || !end) {
            return;
          }

          const positions = connectorLines[index].geometry.attributes.position.array;
          positions[0] = -start.x;
          positions[1] = -start.y;
          positions[2] = -start.z;
          positions[3] = -end.x;
          positions[4] = -end.y;
          positions[5] = -end.z;
          connectorLines[index].geometry.attributes.position.needsUpdate = true;
          connectorLines[index].visible = true;
        });

        updateTorsoHoops(worldLandmarks);
      }

      function updateTorsoHoops(worldLandmarks) {
        const leftShoulder = worldLandmarks[TORSO_LANDMARKS.leftShoulder];
        const rightShoulder = worldLandmarks[TORSO_LANDMARKS.rightShoulder];
        const leftHip = worldLandmarks[TORSO_LANDMARKS.leftHip];
        const rightHip = worldLandmarks[TORSO_LANDMARKS.rightHip];

        if (!leftShoulder || !rightShoulder || !leftHip || !rightHip) {
          return;
        }

        const shoulderCenter = midpoint(leftShoulder, rightShoulder);
        const hipCenter = midpoint(leftHip, rightHip);
        const torsoCenter = {
          x: (shoulderCenter.x + hipCenter.x) * 0.5,
          y: (shoulderCenter.y + hipCenter.y) * 0.5,
          z: (shoulderCenter.z + hipCenter.z) * 0.5,
        };

        const shoulderWidth = distance3D(leftShoulder, rightShoulder);
        const hipWidth = distance3D(leftHip, rightHip);
        const torsoHeight = distance3D(shoulderCenter, hipCenter);
        const hoopRadius = Math.max(HOOP_MIN_RADIUS, Math.max(shoulderWidth, hipWidth) * 0.5 + HOOP_RADIUS_PADDING);
        const verticalStep = HOOP_COUNT > 1 ? torsoHeight * HOOP_VERTICAL_SPAN : 0;
        const startOffset = -verticalStep * 0.5;

        hoopLines.forEach((line, index) => {
          const yOffset = startOffset + verticalStep * (index / Math.max(HOOP_COUNT - 1, 1));
          updateHoopGeometry(line.geometry.attributes.position.array, torsoCenter, hoopRadius, yOffset);
          line.geometry.attributes.position.needsUpdate = true;
          line.visible = true;
        });
      }

      function updateHoopGeometry(positions, center, radius, yOffset) {
        for (let index = 0; index <= HOOP_SEGMENTS; index += 1) {
          const angle = (index / HOOP_SEGMENTS) * Math.PI * 2;
          const offset = index * 3;
          positions[offset] = -center.x + Math.cos(angle) * radius;
          positions[offset + 1] = -(center.y + yOffset);
          positions[offset + 2] = -center.z + Math.sin(angle) * radius;
        }
      }

      function midpoint(a, b) {
        return {
          x: (a.x + b.x) * 0.5,
          y: (a.y + b.y) * 0.5,
          z: (a.z + b.z) * 0.5,
        };
      }

      function distance3D(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
      }

      function clearCanvas(context, canvas) {
        context.clearRect(0, 0, canvas.width, canvas.height);
      }

      function syncCanvasSize(width, height) {
        [canvas1, canvas3].forEach((canvas) => {
          if (canvas.width !== width || canvas.height !== height) {
            canvas.width = width;
            canvas.height = height;
          }
        });

        handleResize();
      }

      function handleResize() {
        const rect = canvas3.getBoundingClientRect();
        const width = Math.max(1, Math.round(rect.width));
        const height = Math.max(1, Math.round(rect.height));

        renderer.setSize(width, height, false);
        renderer.setClearColor(0x000000, 1);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function renderThreeScene() {
        requestAnimationFrame(renderThreeScene);
        controls.update();
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
