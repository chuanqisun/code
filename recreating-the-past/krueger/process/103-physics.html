<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webcam Background Subtraction</title>
    <style>
      body {
        font-family: sans-serif;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .panel {
        display: inline-block;
      }
      canvas,
      video {
        border: 1px solid #000;
        display: block;
      }
      label {
        display: inline-block;
        margin-right: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Webcam Background Subtraction</h1>

    <div style="margin-bottom: 12px">
      <button id="startBtn">Start Webcam</button>
      <label>
        Mask Threshold:
        <input id="maskThreshold" type="range" min="0" max="255" value="128" disabled />
        <span id="maskThresholdValue">128</span>
      </label>
    </div>

    <video id="video" autoplay playsinline muted style="display: none"></video>

    <div class="row">
      <div class="panel">
        <div>Canvas 1: Live Video</div>
        <canvas id="canvas1" width="320" height="240"></canvas>
      </div>
      <div class="panel">
        <div>Canvas 5: Background Confidence Mask</div>
        <canvas id="canvas5" width="320" height="240"></canvas>
      </div>
      <div class="panel">
        <div>Canvas 6: Inverted Threshold Mask</div>
        <canvas id="canvas6" width="320" height="240"></canvas>
      </div>
      <div class="panel">
        <div>Canvas 7: Matter.js Physics</div>
        <canvas id="canvas7" width="320" height="240"></canvas>
      </div>
    </div>

    <script type="module">
      import Matter from "https://esm.run/matter-js";

      const video = document.getElementById("video");
      const startBtn = document.getElementById("startBtn");
      const maskThresholdInput = document.getElementById("maskThreshold");
      const maskThresholdValue = document.getElementById("maskThresholdValue");

      const canvas1 = document.getElementById("canvas1");
      const canvas5 = document.getElementById("canvas5");
      const canvas6 = document.getElementById("canvas6");
      const canvas7 = document.getElementById("canvas7");

      const ctx1 = canvas1.getContext("2d");
      const ctx5 = canvas5.getContext("2d");
      const ctx6 = canvas6.getContext("2d");
      const ctx7 = canvas7.getContext("2d");

      const { Engine, World, Bodies, Body, Composite, Runner } = Matter;

      let running = false;
      let imageSegmenter = null;
      let segmenterReady = false;
      let segmenterBusy = false;
      let segmenterLastVideoTime = -1;
      let rigidMaskBody = null;
      let lastConfidenceMask = null;
      let lastMaskWidth = canvas7.width;
      let lastMaskHeight = canvas7.height;

      const physics = createPhysicsWorld();

      initializeSegmenter();

      maskThresholdInput.addEventListener("input", () => {
        maskThresholdValue.textContent = maskThresholdInput.value;
        syncRigidBodyFromMask(lastConfidenceMask, lastMaskWidth, lastMaskHeight);
      });

      startBtn.addEventListener("click", async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 320, height: 240 },
            audio: false,
          });
          video.srcObject = stream;
          await video.play();
          maskThresholdInput.disabled = false;
          if (!running) {
            running = true;
            requestAnimationFrame(processFrame);
          }
        } catch (err) {
          alert("Could not access webcam: " + err.message);
        }
      });

      canvas7.addEventListener("click", (event) => {
        const rect = canvas7.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * canvas7.width;
        const y = ((event.clientY - rect.top) / rect.height) * canvas7.height;
        spawnPhysicsObject(x, y);
      });

      function processFrame() {
        if (!running) return;

        ctx1.drawImage(video, 0, 0, canvas1.width, canvas1.height);

        processSegmentationFrame();

        requestAnimationFrame(processFrame);
      }

      async function initializeSegmenter() {
        try {
          const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.2");
          const filesetResolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.2/wasm");

          imageSegmenter = await vision.ImageSegmenter.createFromOptions(filesetResolver, {
            baseOptions: {
              modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_multiclass_256x256/float32/latest/selfie_multiclass_256x256.tflite",
              delegate: "GPU",
            },
            runningMode: "VIDEO",
            outputCategoryMask: false,
            outputConfidenceMasks: true,
          });

          segmenterReady = true;
          paintSegmentationMask(null, canvas5.width, canvas5.height);
          paintInvertedThresholdMask(null, canvas6.width, canvas6.height);
        } catch (error) {
          console.error("Failed to initialize MediaPipe segmenter", error);
          paintSegmentationMask(null, canvas5.width, canvas5.height);
          paintInvertedThresholdMask(null, canvas6.width, canvas6.height);
        }
      }

      function processSegmentationFrame() {
        if (!segmenterReady || !imageSegmenter || segmenterBusy) {
          return;
        }

        if (video.readyState < 2 || video.currentTime === segmenterLastVideoTime) {
          return;
        }

        segmenterBusy = true;
        segmenterLastVideoTime = video.currentTime;

        imageSegmenter.segmentForVideo(video, performance.now(), (result) => {
          const backgroundConfidenceMask = result.confidenceMasks?.[0] ?? null;
          lastConfidenceMask = backgroundConfidenceMask;
          lastMaskWidth = video.videoWidth;
          lastMaskHeight = video.videoHeight;

          paintSegmentationMask(backgroundConfidenceMask, video.videoWidth, video.videoHeight);
          paintInvertedThresholdMask(backgroundConfidenceMask, video.videoWidth, video.videoHeight);
          syncRigidBodyFromMask(backgroundConfidenceMask, video.videoWidth, video.videoHeight);
          segmenterBusy = false;
        });
      }

      function createPhysicsWorld() {
        const engine = Engine.create();
        engine.world.gravity.y = 0.9;

        const walls = createWorldWalls(canvas7.width, canvas7.height);

        World.add(engine.world, walls);

        const runner = Runner.create();
        Runner.run(runner, engine);

        requestAnimationFrame(renderPhysicsFrame);

        return { engine, runner, walls };
      }

      function createWorldWalls(width, height) {
        return [
          Bodies.rectangle(width / 2, height + 20, width, 40, { isStatic: true }),
          Bodies.rectangle(-20, height / 2, 40, height, { isStatic: true }),
          Bodies.rectangle(width + 20, height / 2, 40, height, { isStatic: true }),
        ];
      }

      function updateWorldWalls(width, height) {
        World.remove(physics.engine.world, physics.walls);
        physics.walls = createWorldWalls(width, height);
        World.add(physics.engine.world, physics.walls);
      }

      function renderPhysicsFrame() {
        ctx7.clearRect(0, 0, canvas7.width, canvas7.height);
        ctx7.fillStyle = "#0d1117";
        ctx7.fillRect(0, 0, canvas7.width, canvas7.height);

        const bodies = Composite.allBodies(physics.engine.world);

        for (const body of bodies) {
          if (body === rigidMaskBody) {
            ctx7.fillStyle = "#ffffff";
          } else if (body.isStatic) {
            ctx7.fillStyle = "#3a4454";
          } else {
            ctx7.fillStyle = "#ffb000";
          }

          drawBody(body);
        }

        requestAnimationFrame(renderPhysicsFrame);
      }

      function drawBody(body) {
        if (!body.parts || body.parts.length === 0) {
          return;
        }

        const parts = body.parts.length > 1 ? body.parts.slice(1) : body.parts;

        for (const part of parts) {
          const vertices = part.vertices;
          if (!vertices.length) {
            continue;
          }

          ctx7.beginPath();
          ctx7.moveTo(vertices[0].x, vertices[0].y);

          for (let index = 1; index < vertices.length; index += 1) {
            ctx7.lineTo(vertices[index].x, vertices[index].y);
          }

          ctx7.closePath();
          ctx7.fill();
        }
      }

      function spawnPhysicsObject(x, y) {
        const radius = 6 + Math.random() * 6;
        const body =
          Math.random() > 0.5
            ? Bodies.circle(x, y, radius, {
                restitution: 0.45,
                friction: 0.02,
                density: 0.002,
              })
            : Bodies.rectangle(x, y, radius * 2, radius * 2, {
                restitution: 0.35,
                friction: 0.03,
                density: 0.002,
                chamfer: { radius: 2 },
              });

        Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.3);
        World.add(physics.engine.world, body);
      }

      function syncRigidBodyFromMask(confidenceMask, width, height) {
        if (!confidenceMask || !width || !height) {
          return;
        }

        if (canvas7.width !== width || canvas7.height !== height) {
          canvas7.width = width;
          canvas7.height = height;
          updateWorldWalls(width, height);
        }

        const threshold = parseInt(maskThresholdInput.value, 10);
        const mask = confidenceMask.getAsFloat32Array();
        const rectangles = [];
        const step = 1;

        for (let y = 0; y < height; y += step) {
          let runStart = -1;

          for (let x = 0; x < width; x += 1) {
            const index = y * width + x;
            const invertedIntensity = 255 - Math.max(0, Math.min(255, Math.round(mask[index] * 255)));
            const isSolid = invertedIntensity >= threshold;

            if (isSolid && runStart === -1) {
              runStart = x;
            }

            if ((!isSolid || x === width - 1) && runStart !== -1) {
              const runEnd = isSolid && x === width - 1 ? x + 1 : x;
              const runWidth = runEnd - runStart;

              if (runWidth >= step) {
                rectangles.push(
                  Bodies.rectangle(runStart + runWidth / 2, y + step / 2, runWidth, step, {
                    isStatic: true,
                    friction: 0.6,
                    restitution: 0.05,
                  })
                );
              }

              runStart = -1;
            }
          }
        }

        if (rectangles.length === 0) {
          if (rigidMaskBody) {
            World.remove(physics.engine.world, rigidMaskBody);
            rigidMaskBody = null;
          }
          return;
        }

        const nextRigidMaskBody = Body.create({
          parts: rectangles,
          isStatic: true,
          friction: 0.6,
          restitution: 0.05,
        });

        if (rigidMaskBody) {
          World.remove(physics.engine.world, rigidMaskBody);
        }

        rigidMaskBody = nextRigidMaskBody;
        World.add(physics.engine.world, rigidMaskBody);
      }

      function paintSegmentationMask(confidenceMask, width, height) {
        if (!width || !height) {
          return;
        }

        if (canvas5.width !== width || canvas5.height !== height) {
          canvas5.width = width;
          canvas5.height = height;
        }

        const output = new ImageData(width, height);
        const pixels = output.data;

        for (let index = 0; index < pixels.length; index += 4) {
          pixels[index + 3] = 255;
        }

        if (confidenceMask) {
          const mask = confidenceMask.getAsFloat32Array();

          for (let pixelIndex = 0; pixelIndex < mask.length; pixelIndex += 1) {
            const intensity = Math.max(0, Math.min(255, Math.round(mask[pixelIndex] * 255)));
            const targetIndex = pixelIndex * 4;

            pixels[targetIndex] = intensity;
            pixels[targetIndex + 1] = intensity;
            pixels[targetIndex + 2] = intensity;
          }
        } else {
          for (let index = 0; index < pixels.length; index += 4) {
            pixels[index] = 0;
            pixels[index + 1] = 0;
            pixels[index + 2] = 0;
          }
        }

        ctx5.putImageData(output, 0, 0);
      }

      function paintInvertedThresholdMask(confidenceMask, width, height) {
        if (!width || !height) {
          return;
        }

        if (canvas6.width !== width || canvas6.height !== height) {
          canvas6.width = width;
          canvas6.height = height;
        }

        const output = new ImageData(width, height);
        const pixels = output.data;

        for (let index = 0; index < pixels.length; index += 4) {
          pixels[index + 3] = 255;
        }

        if (confidenceMask) {
          const mask = confidenceMask.getAsFloat32Array();
          const threshold = parseInt(maskThresholdInput.value, 10);

          for (let pixelIndex = 0; pixelIndex < mask.length; pixelIndex += 1) {
            const invertedIntensity = 255 - Math.max(0, Math.min(255, Math.round(mask[pixelIndex] * 255)));
            const value = invertedIntensity >= threshold ? 255 : 0;
            const targetIndex = pixelIndex * 4;

            pixels[targetIndex] = value;
            pixels[targetIndex + 1] = value;
            pixels[targetIndex + 2] = value;
          }
        } else {
          for (let index = 0; index < pixels.length; index += 4) {
            pixels[index] = 0;
            pixels[index + 1] = 0;
            pixels[index + 2] = 0;
          }
        }

        ctx6.putImageData(output, 0, 0);
      }
    </script>
  </body>
</html>
