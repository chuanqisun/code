<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perlin Noise Face Finder</title>
    <style>
      body {
        margin: 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .controls label {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .controls span.val {
        min-width: 32px;
        text-align: right;
      }
      canvas {
        display: block;
        width: 512px;
        height: 512px;
        image-rendering: pixelated;
      }
      canvas.found {
        outline: 2px solid Highlight;
        outline-offset: 2px;
      }
      .stats {
        margin-top: 10px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      #log {
        margin-top: 10px;
        width: 512px;
        max-height: 180px;
        overflow-y: auto;
        font-size: 11px;
      }
      .log-found {
        font-weight: bold;
      }
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        gap: 12px;
      }
      .loading-overlay .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ccc;
        border-top-color: #000;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #feed {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
        width: 512px;
      }
      #feed figure {
        margin: 0;
      }
      #feed canvas {
        width: 96px;
        height: 96px;
      }
      #feed figcaption {
        font-size: 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div>Loading face detection model...</div>
    </div>

    <h2>👁 Perlin Noise Face Finder</h2>

    <div class="controls">
      <button id="startStop" disabled>Start</button>
      <label>
        Confidence:
        <input type="range" id="confidence" min="0.01" max="1" step="0.01" value="0.30" />
        <span class="val" id="confVal">0.30</span>
      </label>
      <label>
        Scale:
        <input type="range" id="noiseScale" min="4" max="80" step="1" value="28" />
        <span class="val" id="scaleVal">28</span>
      </label>
      <label>
        Octaves:
        <input type="range" id="octaves" min="1" max="8" step="1" value="4" />
        <span class="val" id="octVal">4</span>
      </label>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvas" width="256" height="256"></canvas>
    </div>

    <div class="stats">
      <div class="stat">Frames: <b id="framesChecked">0</b></div>
      <div class="stat">Faces: <b id="facesFound">0</b></div>
      <div class="stat">Seed: <b id="currentSeed">-</b></div>
      <div class="stat">Status: <b id="statusText">Loading...</b></div>
    </div>

    <div id="log"></div>

    <section>
      <h3>Face Discovery Feed</h3>
      <div id="feed"></div>
    </section>

    <script type="module">
      import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

      // --- Perlin Noise ---
      class Perlin {
        constructor(seed) {
          this.p = new Uint8Array(512);
          const perm = new Uint8Array(256);
          for (let i = 0; i < 256; i++) perm[i] = i;
          const rand = this.rng(seed | 0);
          for (let i = 255; i > 0; i--) {
            const j = Math.floor(rand() * (i + 1));
            [perm[i], perm[j]] = [perm[j], perm[i]];
          }
          for (let i = 0; i < 512; i++) this.p[i] = perm[i & 255];
        }
        rng(a) {
          return () => {
            let t = (a += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        fade(t) {
          return t * t * t * (t * (t * 6 - 15) + 10);
        }
        lerp(a, b, t) {
          return a + t * (b - a);
        }
        grad(h, x, y) {
          switch (h & 3) {
            case 0:
              return x + y;
            case 1:
              return -x + y;
            case 2:
              return x - y;
            case 3:
              return -x - y;
          }
        }
        noise(x, y) {
          const X = Math.floor(x) & 255,
            Y = Math.floor(y) & 255;
          const xf = x - Math.floor(x),
            yf = y - Math.floor(y);
          const u = this.fade(xf),
            v = this.fade(yf);
          const aa = this.p[this.p[X] + Y],
            ab = this.p[this.p[X] + Y + 1];
          const ba = this.p[this.p[X + 1] + Y],
            bb = this.p[this.p[X + 1] + Y + 1];
          return this.lerp(
            this.lerp(this.grad(aa, xf, yf), this.grad(ba, xf - 1, yf), u),
            this.lerp(this.grad(ab, xf, yf - 1), this.grad(bb, xf - 1, yf - 1), u),
            v
          );
        }
      }

      // --- DOM refs ---
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const startStopBtn = document.getElementById("startStop");
      const confSlider = document.getElementById("confidence");
      const confValEl = document.getElementById("confVal");
      const scaleSlider = document.getElementById("noiseScale");
      const scaleValEl = document.getElementById("scaleVal");
      const octSlider = document.getElementById("octaves");
      const octValEl = document.getElementById("octVal");
      const framesEl = document.getElementById("framesChecked");
      const facesEl = document.getElementById("facesFound");
      const seedEl = document.getElementById("currentSeed");
      const statusEl = document.getElementById("statusText");
      const logEl = document.getElementById("log");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const feedEl = document.getElementById("feed");

      const LEFT_EYE = 0;
      const RIGHT_EYE = 1;
      const NOSE_TIP = 2;
      const MOUTH_CENTER = 3;
      const LEFT_EAR_TRAGION = 4;
      const RIGHT_EAR_TRAGION = 5;

      const NORMALIZED_FACE_SIZE = 128;
      const CANONICAL_FACE_POINTS = {
        leftEye: { x: 42, y: 42 },
        rightEye: { x: 86, y: 42 },
        nose: { x: 64, y: 66 },
        mouth: { x: 64, y: 90 },
        leftEar: { x: 18, y: 62 },
        rightEar: { x: 110, y: 62 },
        forehead: { x: 64, y: 12 },
        chin: { x: 64, y: 118 },
        leftJaw: { x: 28, y: 103 },
        rightJaw: { x: 100, y: 103 },
      };

      const FACE_WARP_TRIANGLES = [
        ["forehead", "leftEar", "leftEye"],
        ["forehead", "leftEye", "nose"],
        ["forehead", "nose", "rightEye"],
        ["forehead", "rightEye", "rightEar"],
        ["leftEar", "leftEye", "nose"],
        ["rightEar", "nose", "rightEye"],
        ["leftEar", "nose", "leftJaw"],
        ["rightEar", "rightJaw", "nose"],
        ["leftJaw", "nose", "mouth"],
        ["nose", "rightJaw", "mouth"],
        ["leftJaw", "mouth", "chin"],
        ["mouth", "rightJaw", "chin"],
      ];

      let running = false;
      let frameCount = 0;
      let faceCount = 0;
      let faceDetector = null;

      confSlider.oninput = () => (confValEl.textContent = parseFloat(confSlider.value).toFixed(2));
      scaleSlider.oninput = () => (scaleValEl.textContent = scaleSlider.value);
      octSlider.oninput = () => (octValEl.textContent = octSlider.value);

      // --- Generate noise onto canvas ---
      function generateNoise(seed) {
        const p = new Perlin(seed);
        const { width: w, height: h } = canvas;
        const img = ctx.createImageData(w, h);
        const d = img.data;
        const scale = parseInt(scaleSlider.value);
        const octaves = parseInt(octSlider.value);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            let v = 0,
              amp = 1,
              freq = 1,
              max = 0;
            for (let o = 0; o < octaves; o++) {
              v += p.noise((x / scale) * freq, (y / scale) * freq) * amp;
              max += amp;
              amp *= 0.5;
              freq *= 2;
            }
            const c = Math.floor((v / max + 1) * 0.5 * 255);
            const i = (y * w + x) * 4;
            d[i] = d[i + 1] = d[i + 2] = c;
            d[i + 3] = 255;
          }
        }
        ctx.putImageData(img, 0, 0);
      }

      // --- Draw detections ---
      function drawDetections(detections) {
        const { width: w, height: h } = canvas;
        for (const det of detections) {
          const bb = det.boundingBox;
          const score = det.categories[0]?.score || 0;

          // Bounding box
          ctx.strokeStyle = "#00ff88";
          ctx.lineWidth = 2;
          ctx.strokeRect(bb.originX, bb.originY, bb.width, bb.height);

          // Confidence label
          ctx.fillStyle = "#00ff88";
          ctx.font = "bold 11px monospace";
          const label = (score * 100).toFixed(1) + "%";
          const textY = bb.originY - 4;
          ctx.fillStyle = "#000000aa";
          ctx.fillRect(bb.originX, textY - 11, ctx.measureText(label).width + 6, 14);
          ctx.fillStyle = "#00ff88";
          ctx.fillText(label, bb.originX + 3, textY);

          // Keypoints
          if (det.keypoints) {
            ctx.fillStyle = "#ff4757";
            for (const kp of det.keypoints) {
              ctx.beginPath();
              ctx.arc(kp.x * w, kp.y * h, 3, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }

      // --- Logging ---
      function log(msg, isFound) {
        const el = document.createElement("div");
        el.className = isFound ? "log-found" : "log-miss";
        el.textContent = msg;
        logEl.prepend(el);
        while (logEl.children.length > 300) logEl.removeChild(logEl.lastChild);
      }

      function scaleKeypoint(keypoint) {
        return {
          x: keypoint.x * canvas.width,
          y: keypoint.y * canvas.height,
        };
      }

      function averagePoint(a, b) {
        return {
          x: (a.x + b.x) * 0.5,
          y: (a.y + b.y) * 0.5,
        };
      }

      function offsetPoint(origin, dx, dy) {
        return {
          x: origin.x + dx,
          y: origin.y + dy,
        };
      }

      function getSourceFacePoints(detection) {
        if (!detection.keypoints || detection.keypoints.length < 6) return null;

        const leftEye = scaleKeypoint(detection.keypoints[LEFT_EYE]);
        const rightEye = scaleKeypoint(detection.keypoints[RIGHT_EYE]);
        const nose = scaleKeypoint(detection.keypoints[NOSE_TIP]);
        const mouth = scaleKeypoint(detection.keypoints[MOUTH_CENTER]);
        const leftEar = scaleKeypoint(detection.keypoints[LEFT_EAR_TRAGION]);
        const rightEar = scaleKeypoint(detection.keypoints[RIGHT_EAR_TRAGION]);

        const eyeMid = averagePoint(leftEye, rightEye);
        const earMid = averagePoint(leftEar, rightEar);
        const eyeSpan = Math.hypot(rightEye.x - leftEye.x, rightEye.y - leftEye.y) || 1;
        const earSpan = Math.hypot(rightEar.x - leftEar.x, rightEar.y - leftEar.y) || eyeSpan;
        const verticalAxis = {
          x: mouth.x - eyeMid.x,
          y: mouth.y - eyeMid.y,
        };
        const axisLength = Math.hypot(verticalAxis.x, verticalAxis.y) || eyeSpan * 0.7;
        const normalizedAxis = {
          x: verticalAxis.x / axisLength,
          y: verticalAxis.y / axisLength,
        };
        const sideAxis = {
          x: -normalizedAxis.y,
          y: normalizedAxis.x,
        };
        const jawDrop = Math.max(axisLength * 0.45, eyeSpan * 0.28);
        const jawInset = earSpan * 0.16;

        return {
          leftEye,
          rightEye,
          nose,
          mouth,
          leftEar,
          rightEar,
          forehead: offsetPoint(eyeMid, -normalizedAxis.x * axisLength * 1.15, -normalizedAxis.y * axisLength * 1.15),
          chin: offsetPoint(mouth, normalizedAxis.x * axisLength * 0.95, normalizedAxis.y * axisLength * 0.95),
          leftJaw: {
            x: leftEar.x * 0.58 + mouth.x * 0.42 + sideAxis.x * jawInset,
            y: leftEar.y * 0.42 + mouth.y * 0.58 + sideAxis.y * jawInset + jawDrop,
          },
          rightJaw: {
            x: rightEar.x * 0.58 + mouth.x * 0.42 - sideAxis.x * jawInset,
            y: rightEar.y * 0.42 + mouth.y * 0.58 - sideAxis.y * jawInset + jawDrop,
          },
        };
      }

      function getAffineTransform(srcTri, dstTri) {
        const [s0, s1, s2] = srcTri;
        const [d0, d1, d2] = dstTri;
        const det = s0.x * (s1.y - s2.y) + s1.x * (s2.y - s0.y) + s2.x * (s0.y - s1.y);

        if (Math.abs(det) < 1e-5) return null;

        const a = (d0.x * (s1.y - s2.y) + d1.x * (s2.y - s0.y) + d2.x * (s0.y - s1.y)) / det;
        const b = (d0.y * (s1.y - s2.y) + d1.y * (s2.y - s0.y) + d2.y * (s0.y - s1.y)) / det;
        const c = (d0.x * (s2.x - s1.x) + d1.x * (s0.x - s2.x) + d2.x * (s1.x - s0.x)) / det;
        const d = (d0.y * (s2.x - s1.x) + d1.y * (s0.x - s2.x) + d2.y * (s1.x - s0.x)) / det;
        const e = (d0.x * (s1.x * s2.y - s2.x * s1.y) + d1.x * (s2.x * s0.y - s0.x * s2.y) + d2.x * (s0.x * s1.y - s1.x * s0.y)) / det;
        const f = (d0.y * (s1.x * s2.y - s2.x * s1.y) + d1.y * (s2.x * s0.y - s0.x * s2.y) + d2.y * (s0.x * s1.y - s1.x * s0.y)) / det;

        return { a, b, c, d, e, f };
      }

      function drawWarpedTriangle(targetCtx, sourceCanvas, srcTri, dstTri) {
        const transform = getAffineTransform(srcTri, dstTri);
        if (!transform) return;

        targetCtx.save();
        targetCtx.beginPath();
        targetCtx.moveTo(dstTri[0].x, dstTri[0].y);
        targetCtx.lineTo(dstTri[1].x, dstTri[1].y);
        targetCtx.lineTo(dstTri[2].x, dstTri[2].y);
        targetCtx.closePath();
        targetCtx.clip();
        targetCtx.setTransform(transform.a, transform.b, transform.c, transform.d, transform.e, transform.f);
        targetCtx.drawImage(sourceCanvas, 0, 0);
        targetCtx.restore();
      }

      function renderNormalizedFace(detection) {
        const sourcePoints = getSourceFacePoints(detection);
        if (!sourcePoints) return null;

        const normalizedCanvas = document.createElement("canvas");
        normalizedCanvas.width = NORMALIZED_FACE_SIZE;
        normalizedCanvas.height = NORMALIZED_FACE_SIZE;
        const normalizedCtx = normalizedCanvas.getContext("2d");

        normalizedCtx.fillStyle = "#111";
        normalizedCtx.fillRect(0, 0, normalizedCanvas.width, normalizedCanvas.height);
        normalizedCtx.imageSmoothingEnabled = true;

        for (const triangle of FACE_WARP_TRIANGLES) {
          const srcTri = triangle.map((name) => sourcePoints[name]);
          const dstTri = triangle.map((name) => CANONICAL_FACE_POINTS[name]);
          if (srcTri.some((point) => !point) || dstTri.some((point) => !point)) continue;
          drawWarpedTriangle(normalizedCtx, canvas, srcTri, dstTri);
        }

        normalizedCtx.save();
        normalizedCtx.strokeStyle = "rgba(255,255,255,0.14)";
        normalizedCtx.lineWidth = 1;
        normalizedCtx.beginPath();
        normalizedCtx.moveTo(CANONICAL_FACE_POINTS.forehead.x, CANONICAL_FACE_POINTS.forehead.y);
        normalizedCtx.lineTo(CANONICAL_FACE_POINTS.leftEar.x, CANONICAL_FACE_POINTS.leftEar.y);
        normalizedCtx.lineTo(CANONICAL_FACE_POINTS.leftJaw.x, CANONICAL_FACE_POINTS.leftJaw.y);
        normalizedCtx.lineTo(CANONICAL_FACE_POINTS.chin.x, CANONICAL_FACE_POINTS.chin.y);
        normalizedCtx.lineTo(CANONICAL_FACE_POINTS.rightJaw.x, CANONICAL_FACE_POINTS.rightJaw.y);
        normalizedCtx.lineTo(CANONICAL_FACE_POINTS.rightEar.x, CANONICAL_FACE_POINTS.rightEar.y);
        normalizedCtx.closePath();
        normalizedCtx.stroke();
        normalizedCtx.restore();

        return normalizedCanvas;
      }

      function appendFaceCrop(detection, seedHex, detectionIndex) {
        const normalizedCanvas = renderNormalizedFace(detection);
        if (!normalizedCanvas) return;

        const figure = document.createElement("figure");
        const caption = document.createElement("figcaption");
        caption.textContent = `${seedHex} #${detectionIndex + 1} flat`;
        figure.append(normalizedCanvas, caption);
        feedEl.prepend(figure);

        while (feedEl.children.length > 40) {
          feedEl.removeChild(feedEl.lastChild);
        }
      }

      // --- Init model ---
      async function initDetector() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
        faceDetector = await FaceDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite",
            delegate: "GPU",
          },
          runningMode: "IMAGE",
        });
        loadingOverlay.style.display = "none";
        startStopBtn.disabled = false;
        statusEl.textContent = "Ready";
      }

      // --- Main loop ---
      async function loop() {
        if (!running) return;

        const seed = (Math.random() * 0xffffffff) | 0;
        const seedHex = seed.toString(16).toUpperCase().padStart(8, "0");
        seedEl.textContent = seedHex;

        // Generate and render noise
        generateNoise(seed);

        frameCount++;
        framesEl.textContent = frameCount;
        statusEl.textContent = "Searching...";

        // Detect faces
        const result = faceDetector.detect(canvas);
        const threshold = parseFloat(confSlider.value);
        const detections = (result.detections || []).filter((d) => (d.categories[0]?.score || 0) >= threshold);

        if (detections.length > 0) {
          detections.forEach((detection, index) => appendFaceCrop(detection, seedHex, index));

          // Draw detections on top of the noise
          drawDetections(detections);
          faceCount++;
          facesEl.textContent = faceCount;
          canvas.classList.add("found");
          statusEl.textContent = `Face found! (${detections.length})`;

          const scores = detections.map((d) => (d.categories[0]?.score * 100).toFixed(1) + "%").join(", ");
          log(`#${frameCount} [${seedHex}] ✓ ${detections.length} face(s) @ ${scores}`, true);

          // Pause to admire the face
          await new Promise((r) => setTimeout(r, 2000));
          canvas.classList.remove("found");
        } else {
          log(`#${frameCount} [${seedHex}] —`);
        }

        // Continue if still running
        if (running) {
          requestAnimationFrame(loop);
        }
      }

      // --- Start/Stop ---
      startStopBtn.addEventListener("click", () => {
        running = !running;
        startStopBtn.textContent = running ? "Stop" : "Start";
        startStopBtn.classList.toggle("running", running);
        if (running) {
          statusEl.textContent = "Starting...";
          requestAnimationFrame(loop);
        } else {
          statusEl.textContent = "Stopped";
        }
      });

      // --- Boot ---
      initDetector().catch((e) => {
        loadingOverlay.innerHTML = `<div>Failed to load model:<br>${e.message}</div>`;
        statusEl.textContent = "Error";
      });
    </script>
  </body>
</html>
