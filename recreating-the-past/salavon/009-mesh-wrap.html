<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parametric Face + MediaPipe Face Mesh Wrap</title>
    <style>
      :root {
        --canvas-size: min(400px, calc((100vw - 72px) / 2), calc((100vh - 180px) / 3));
      }

      body {
        margin: 0;
        background: #111;
        color: #eee;
        font-family: sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 16px;
        box-sizing: border-box;
      }

      .wrap {
        display: grid;
        gap: 12px;
        justify-items: center;
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        background: #1b1b1b;
        border: 1px solid #333;
        padding: 10px 12px;
        border-radius: 8px;
      }

      .canvas-stack {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, var(--canvas-size)));
        justify-items: center;
      }

      .canvas-box {
        width: var(--canvas-size);
        height: var(--canvas-size);
        border: 1px solid #333;
        background: transparent;
        position: relative;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: transparent;
      }

      #rawInputCanvas {
        cursor: crosshair;
      }

      label,
      input {
        font-size: 14px;
      }

      .status {
        opacity: 0.8;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="controls">
        <label>
          Min confidence:
          <input id="confidence" type="range" min="0" max="1" step="0.01" value="0.5" />
          <span id="confidenceValue">0.50</span>
        </label>
        <span class="status" id="status">Loading MediaPipe mesh...</span>
        <span class="status">Hold mouse on canvas to generate + detect every frame</span>
      </div>

      <div class="canvas-stack">
        <div class="canvas-box">
          <canvas id="rawInputCanvas" width="520" height="520"></canvas>
        </div>
        <div class="canvas-box">
          <canvas id="alignedFaceCanvas" width="520" height="520"></canvas>
        </div>
        <div class="canvas-box">
          <canvas id="landmarksCanvas" width="520" height="520"></canvas>
        </div>
        <div class="canvas-box">
          <canvas id="landmarksAveragingCanvas" width="520" height="520"></canvas>
        </div>
        <div class="canvas-box">
          <canvas id="faceWrapSnapshotCanvas" width="520" height="520"></canvas>
        </div>
        <div class="canvas-box">
          <canvas id="faceWrappingCanvas" width="520" height="520"></canvas>
        </div>
      </div>
    </div>

    <script type="module">
      import vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

      const { FaceLandmarker, FilesetResolver } = vision;

      const rawInputCanvas = document.getElementById("rawInputCanvas");
      const alignedFaceCanvas = document.getElementById("alignedFaceCanvas");
      const landmarksCanvas = document.getElementById("landmarksCanvas");
      const landmarksAveragingCanvas = document.getElementById("landmarksAveragingCanvas");
      const faceWrapSnapshotCanvas = document.getElementById("faceWrapSnapshotCanvas");
      const faceWrappingCanvas = document.getElementById("faceWrappingCanvas");

      const rawInputCtx = rawInputCanvas.getContext("2d");
      const alignedFaceCtx = alignedFaceCanvas.getContext("2d");
      const landmarksCtx = landmarksCanvas.getContext("2d");
      const landmarksAveragingCtx = landmarksAveragingCanvas.getContext("2d");
      const faceWrapSnapshotCtx = faceWrapSnapshotCanvas.getContext("2d");
      const faceWrappingCtx = faceWrappingCanvas.getContext("2d");

      const confidenceInput = document.getElementById("confidence");
      const confidenceValue = document.getElementById("confidenceValue");
      const statusEl = document.getElementById("status");

      let faceLandmarker = null;
      let runningMode = "IMAGE";
      let isHolding = false;
      let rafId = 0;
      let isProcessing = false;
      let averagedMesh = null;

      const LANDMARK_DECAY = 0.94;
      const LANDMARK_BLEND = 0.06;
      const FIXED_EYE_OFFSET_X = 70;
      const FIXED_EYE_Y = 196;
      const FIXED_MOUTH_BOTTOM_OFFSET = 120;
      const FIXED_OVAL_WIDTH = 245;
      const FIXED_OVAL_HEIGHT = 318;
      const IDW_POWER = 2;
      const EPSILON = 1e-4;
      const LANDMARKS_OVERLAY_ALPHA = 0.08;
      const FACE_WRAP_OVERLAY_ALPHA = 0.01;
      const LEFT_IRIS_CENTER_INDEX = 468;
      const RIGHT_IRIS_CENTER_INDEX = 473;
      const NOSE_TIP_INDEX = 4;
      const UPPER_LIP_INDEX = 13;
      const LOWER_LIP_INDEX = 14;

      const FACE_OVAL_INDICES = orderedLoopFromConnectors(FaceLandmarker.FACE_LANDMARKS_FACE_OVAL);
      const TESSELATION_TRIANGLES = buildTrianglesFromConnectors(FaceLandmarker.FACE_LANDMARKS_TESSELATION);

      confidenceInput.addEventListener("input", async () => {
        confidenceValue.textContent = Number(confidenceInput.value).toFixed(2);
        if (faceLandmarker) {
          await faceLandmarker.setOptions({
            minFaceDetectionConfidence: Number(confidenceInput.value),
            minFacePresenceConfidence: Number(confidenceInput.value),
          });
        }
      });

      async function initializeFaceLandmarker() {
        const visionFiles = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");

        faceLandmarker = await FaceLandmarker.createFromOptions(visionFiles, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
            delegate: "GPU",
          },
          runningMode,
          numFaces: 1,
          minFaceDetectionConfidence: Number(confidenceInput.value),
          minFacePresenceConfidence: Number(confidenceInput.value),
          minTrackingConfidence: Number(confidenceInput.value),
          outputFaceBlendshapes: false,
          outputFacialTransformationMatrixes: false,
        });

        statusEl.textContent = "MediaPipe mesh ready";
      }

      function orderedLoopFromConnectors(connectors) {
        const adjacency = new Map();

        for (const { start, end } of connectors) {
          if (!adjacency.has(start)) adjacency.set(start, []);
          if (!adjacency.has(end)) adjacency.set(end, []);
          adjacency.get(start).push(end);
          adjacency.get(end).push(start);
        }

        const startNode = connectors[0]?.start;
        if (startNode == null) return [];

        const ordered = [startNode];
        let previous = null;
        let current = startNode;

        while (true) {
          const neighbors = adjacency.get(current) || [];
          const next = neighbors.find((candidate) => candidate !== previous);
          if (next == null || next === startNode) {
            break;
          }
          ordered.push(next);
          previous = current;
          current = next;

          if (ordered.length > adjacency.size + 4) {
            break;
          }
        }

        return ordered;
      }

      function buildTrianglesFromConnectors(connectors) {
        const adjacency = new Map();

        for (const { start, end } of connectors) {
          if (!adjacency.has(start)) adjacency.set(start, new Set());
          if (!adjacency.has(end)) adjacency.set(end, new Set());
          adjacency.get(start).add(end);
          adjacency.get(end).add(start);
        }

        const triangles = new Set();

        for (const [a, neighbors] of adjacency.entries()) {
          const sortedNeighbors = [...neighbors].sort((left, right) => left - right);
          for (let index = 0; index < sortedNeighbors.length; index += 1) {
            const b = sortedNeighbors[index];
            if (b <= a) continue;

            for (let innerIndex = index + 1; innerIndex < sortedNeighbors.length; innerIndex += 1) {
              const c = sortedNeighbors[innerIndex];
              if (c <= b) continue;
              if (!adjacency.get(b)?.has(c)) continue;

              triangles.add([a, b, c].join("-"));
            }
          }
        }

        return [...triangles].map((triangle) => triangle.split("-").map(Number));
      }

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function randBool(p = 0.5) {
        return Math.random() < p;
      }

      function ellipsePath(ctx, x, y, rx, ry) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(rx, ry);
        ctx.beginPath();
        ctx.arc(0, 0, 1, 0, Math.PI * 2);
        ctx.restore();
      }

      function* randomFaceGenerator() {
        while (true) {
          const face = {
            centerX: rawInputCanvas.width / 2 + rand(-25, 25),
            centerY: rawInputCanvas.height / 2 + rand(-25, 25),
            rotation: rand(-0.08, 0.08),
            scale: rand(0.85, 1.15),

            head: {
              enabled: true,
              width: rand(180, 280),
              height: rand(220, 340),
              offsetX: rand(-10, 10),
              offsetY: rand(-10, 10),
              lineWidth: rand(1, 4),
              strokeStyle: "#fff",
            },

            eyes: {
              enabled: true,
              y: rand(-70, -20),
              spacing: rand(50, 110),
              offsetX: rand(-10, 10),
              eyeRadiusX: rand(6, 24),
              eyeRadiusY: rand(4, 16),
              pupilRadius: rand(2, 7),
              pupilOffsetX: rand(-2, 2),
              pupilOffsetY: rand(-2, 2),
              eyelidTilt: rand(-0.25, 0.25),
              lineWidth: rand(1, 3),
              strokeStyle: "#fff",
              pupilColor: "#fff",
            },

            eyebrows: {
              enabled: randBool(0.9),
              width: rand(15, 45),
              thickness: rand(1, 6),
              tiltLeft: rand(-0.7, 0.7),
              tiltRight: rand(-0.7, 0.7),
              offsetX: rand(-10, 10),
              spacing: rand(50, 115),
              color: "#fff",
            },

            nose: {
              enabled: true,
              offsetX: rand(-12, 12),
              width: rand(18, 42),
              height: rand(24, 70),
              bridgeHeight: rand(12, 32),
              nostrilWidth: rand(10, 24),
              nostrilHeight: rand(3, 8),
              lineWidth: rand(1, 3),
              strokeStyle: "#fff",
            },

            mouth: {
              enabled: true,
              offsetX: rand(-12, 12),
              width: rand(25, 100),
              openness: rand(0, 28),
              curvature: rand(-1, 1),
              upperLipHeight: rand(2, 16),
              lowerLipHeight: rand(2, 20),
              lineWidth: rand(1, 3),
              strokeStyle: "#fff",
            },

            relations: {
              browToEyeY: rand(10, 35),
              eyeToNoseY: rand(20, 60),
              noseToMouthY: rand(30, 85),
            },
          };

          face.eyebrows.y = face.eyes.y - face.relations.browToEyeY;
          face.nose.y = face.eyes.y + face.relations.eyeToNoseY;
          face.mouth.y = face.nose.y + face.relations.noseToMouthY;

          yield face;
        }
      }

      const faceStream = randomFaceGenerator();

      function drawFace(ctx, p) {
        ctx.clearRect(0, 0, rawInputCanvas.width, rawInputCanvas.height);

        ctx.save();
        ctx.translate(p.centerX, p.centerY);
        ctx.rotate(p.rotation);
        ctx.scale(p.scale, p.scale);

        drawHead(ctx, p.head);
        drawEyebrows(ctx, p.eyebrows);
        drawEyes(ctx, p.eyes);
        drawNose(ctx, p.nose);
        drawMouth(ctx, p.mouth);

        ctx.restore();
      }

      function drawHead(ctx, head) {
        if (!head.enabled) return;
        ctx.save();
        ctx.translate(head.offsetX, head.offsetY);
        ellipsePath(ctx, 0, 0, head.width / 2, head.height / 2);
        ctx.lineWidth = head.lineWidth;
        ctx.strokeStyle = head.strokeStyle;
        ctx.stroke();
        ctx.restore();
      }

      function drawEyes(ctx, eyes) {
        if (!eyes.enabled) return;
        const xs = [-eyes.spacing / 2 + eyes.offsetX, eyes.spacing / 2 + eyes.offsetX];

        for (const x of xs) {
          ctx.save();
          ctx.translate(x, eyes.y);
          ctx.rotate(eyes.eyelidTilt);

          ellipsePath(ctx, 0, 0, eyes.eyeRadiusX, eyes.eyeRadiusY);
          ctx.lineWidth = eyes.lineWidth;
          ctx.strokeStyle = eyes.strokeStyle;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(eyes.pupilOffsetX, eyes.pupilOffsetY, eyes.pupilRadius, 0, Math.PI * 2);
          ctx.fillStyle = eyes.pupilColor;
          ctx.fill();
          ctx.restore();
        }
      }

      function drawEyebrows(ctx, brows) {
        if (!brows.enabled) return;

        const leftX = -brows.spacing / 2 + brows.offsetX;
        const rightX = brows.spacing / 2 + brows.offsetX;
        const y = brows.y;

        ctx.save();
        ctx.lineWidth = brows.thickness;
        ctx.strokeStyle = brows.color;
        ctx.lineCap = "round";
        drawBrow(ctx, leftX, y, brows.width, brows.tiltLeft);
        drawBrow(ctx, rightX, y, brows.width, brows.tiltRight);
        ctx.restore();
      }

      function drawBrow(ctx, x, y, width, tilt) {
        const dx = width / 2;
        const dy = Math.tan(tilt) * dx * 0.35;
        ctx.beginPath();
        ctx.moveTo(x - dx, y + dy);
        ctx.lineTo(x + dx, y - dy);
        ctx.stroke();
      }

      function drawNose(ctx, nose) {
        if (!nose.enabled) return;

        const x = nose.offsetX;
        const y = nose.y;
        const apexY = y - nose.bridgeHeight / 2;
        const baseY = y + nose.height / 2;
        const halfWidth = nose.width / 2;
        const nostrilHalfWidth = nose.nostrilWidth / 2;
        const nostrilY = baseY - nose.nostrilHeight * 0.3;

        ctx.save();
        ctx.lineWidth = nose.lineWidth;
        ctx.strokeStyle = nose.strokeStyle;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(x, apexY);
        ctx.lineTo(x - halfWidth, baseY);
        ctx.lineTo(x + halfWidth, baseY);
        ctx.closePath();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x - nostrilHalfWidth, nostrilY);
        ctx.quadraticCurveTo(x, baseY + nose.nostrilHeight, x + nostrilHalfWidth, nostrilY);
        ctx.moveTo(x, apexY + nose.bridgeHeight * 0.35);
        ctx.lineTo(x, baseY - nose.nostrilHeight);
        ctx.stroke();

        ctx.restore();
      }

      function drawMouth(ctx, mouth) {
        if (!mouth.enabled) return;

        const x = mouth.offsetX;
        const y = mouth.y;
        const halfW = mouth.width / 2;
        const curve = mouth.curvature * 22;
        const open = mouth.openness;

        ctx.save();
        ctx.lineWidth = mouth.lineWidth;
        ctx.strokeStyle = mouth.strokeStyle;

        ctx.beginPath();
        ctx.moveTo(x - halfW, y);
        ctx.quadraticCurveTo(x, y + curve - mouth.upperLipHeight, x + halfW, y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x - halfW, y);
        ctx.quadraticCurveTo(x, y + curve + mouth.lowerLipHeight + open, x + halfW, y);
        ctx.stroke();

        ctx.restore();
      }

      function transformFacePoint(params, x, y) {
        const scaledX = x * params.scale;
        const scaledY = y * params.scale;
        const cos = Math.cos(params.rotation);
        const sin = Math.sin(params.rotation);

        return {
          x: params.centerX + scaledX * cos - scaledY * sin,
          y: params.centerY + scaledX * sin + scaledY * cos,
        };
      }

      function getGeneratedPupilPoints(params) {
        const localY = params.eyes.y + params.eyes.pupilOffsetY;

        return {
          left: transformFacePoint(params, -params.eyes.spacing / 2 + params.eyes.offsetX + params.eyes.pupilOffsetX, localY),
          right: transformFacePoint(params, params.eyes.spacing / 2 + params.eyes.offsetX + params.eyes.pupilOffsetX, localY),
        };
      }

      function getAlignedEyeTargets() {
        return {
          left: { x: alignedFaceCanvas.width / 2 - FIXED_EYE_OFFSET_X, y: FIXED_EYE_Y },
          right: { x: alignedFaceCanvas.width / 2 + FIXED_EYE_OFFSET_X, y: FIXED_EYE_Y },
        };
      }

      function getFixedFeatureAnchors(width, height) {
        const mouthY = height - FIXED_MOUTH_BOTTOM_OFFSET;
        return {
          leftEye: { x: width / 2 - FIXED_EYE_OFFSET_X, y: FIXED_EYE_Y },
          rightEye: { x: width / 2 + FIXED_EYE_OFFSET_X, y: FIXED_EYE_Y },
          nose: { x: width / 2, y: (FIXED_EYE_Y + mouthY) / 2 },
          mouth: { x: width / 2, y: mouthY },
          ovalCenter: { x: width / 2, y: (FIXED_EYE_Y + mouthY) / 2 + 8 },
        };
      }

      function getAlignmentFromEyePair(leftEye, rightEye, targetLeft, targetRight) {
        const currentDx = rightEye.x - leftEye.x;
        const currentDy = rightEye.y - leftEye.y;
        const currentDist = Math.hypot(currentDx, currentDy);
        if (!currentDist) return null;

        const targetDx = targetRight.x - targetLeft.x;
        const targetDy = targetRight.y - targetLeft.y;
        const targetDist = Math.hypot(targetDx, targetDy);
        if (!targetDist) return null;

        const currentAngle = Math.atan2(currentDy, currentDx);
        const targetAngle = Math.atan2(targetDy, targetDx);
        const rotation = targetAngle - currentAngle;
        const scale = targetDist / currentDist;
        const cos = Math.cos(rotation);
        const sin = Math.sin(rotation);

        function transformPoint(point) {
          const x = point.x - leftEye.x;
          const y = point.y - leftEye.y;
          return {
            x: x * scale * cos - y * scale * sin + targetLeft.x,
            y: x * scale * sin + y * scale * cos + targetLeft.y,
          };
        }

        return {
          rotation,
          scale,
          targetLeft,
          targetRight,
          transformPoint,
        };
      }

      function drawAlignedFace(ctx, params) {
        const pupils = getGeneratedPupilPoints(params);
        const targetEyes = getAlignedEyeTargets();
        const alignment = getAlignmentFromEyePair(pupils.left, pupils.right, targetEyes.left, targetEyes.right);

        ctx.clearRect(0, 0, alignedFaceCanvas.width, alignedFaceCanvas.height);
        if (!alignment) return null;

        ctx.save();
        ctx.translate(alignment.targetLeft.x, alignment.targetLeft.y);
        ctx.rotate(alignment.rotation);
        ctx.scale(alignment.scale, alignment.scale);
        ctx.translate(-pupils.left.x, -pupils.left.y);
        ctx.drawImage(rawInputCanvas, 0, 0);
        ctx.restore();

        return alignment;
      }

      function normalizedToCanvasPoint(point, width, height) {
        return {
          x: point.x * width,
          y: point.y * height,
          z: point.z ?? 0,
        };
      }

      function averagePoints(points) {
        if (!points.length) return null;

        let x = 0;
        let y = 0;
        let z = 0;
        for (const point of points) {
          x += point.x;
          y += point.y;
          z += point.z ?? 0;
        }

        return {
          x: x / points.length,
          y: y / points.length,
          z: z / points.length,
        };
      }

      function getMeshFeatureAnchors(meshPoints) {
        const leftEye = meshPoints[LEFT_IRIS_CENTER_INDEX] || null;
        const rightEye = meshPoints[RIGHT_IRIS_CENTER_INDEX] || null;
        const upperLip = meshPoints[UPPER_LIP_INDEX];
        const lowerLip = meshPoints[LOWER_LIP_INDEX];
        const nose = meshPoints[NOSE_TIP_INDEX];
        const mouth = upperLip && lowerLip ? averagePoints([upperLip, lowerLip]) : null;

        if (!leftEye || !rightEye || !nose || !mouth) {
          return null;
        }

        return {
          leftEye,
          rightEye,
          nose,
          mouth,
        };
      }

      function alignMesh(meshPoints, width, height) {
        const featureAnchors = getMeshFeatureAnchors(meshPoints);
        if (!featureAnchors) return null;

        const targets = getFixedFeatureAnchors(width, height);
        const alignment = getAlignmentFromEyePair(featureAnchors.leftEye, featureAnchors.rightEye, targets.leftEye, targets.rightEye);
        if (!alignment) return null;

        return {
          alignment,
          points: meshPoints.map((point) => alignment.transformPoint(point)),
          anchors: {
            leftEye: targets.leftEye,
            rightEye: targets.rightEye,
            nose: alignment.transformPoint(featureAnchors.nose),
            mouth: alignment.transformPoint(featureAnchors.mouth),
          },
        };
      }

      function drawConnectorSet(ctx, meshPoints, connectors, strokeStyle, lineWidth) {
        ctx.save();
        ctx.strokeStyle = strokeStyle;
        ctx.lineWidth = lineWidth;
        for (const { start, end } of connectors) {
          const a = meshPoints[start];
          const b = meshPoints[end];
          if (!a || !b) continue;

          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawAlignedMesh(ctx, meshPoints) {
        ctx.save();
        ctx.globalAlpha = LANDMARKS_OVERLAY_ALPHA;
        drawConnectorSet(ctx, meshPoints, FaceLandmarker.FACE_LANDMARKS_TESSELATION, "rgba(0, 255, 255, 0.22)", 0.75);
        drawConnectorSet(ctx, meshPoints, FaceLandmarker.FACE_LANDMARKS_FACE_OVAL, "rgba(255, 255, 255, 0.55)", 1.2);
        drawConnectorSet(ctx, meshPoints, FaceLandmarker.FACE_LANDMARKS_LIPS, "rgba(255, 180, 120, 0.55)", 1);
        ctx.restore();
      }

      function updateAveragedMesh(detectedMesh) {
        if (!averagedMesh || averagedMesh.length !== detectedMesh.length) {
          averagedMesh = detectedMesh.map((point) => ({ ...point }));
          return;
        }

        averagedMesh = detectedMesh.map((point, index) => {
          const previousPoint = averagedMesh[index];
          if (!previousPoint) {
            return { ...point };
          }

          return {
            x: previousPoint.x * LANDMARK_DECAY + point.x * LANDMARK_BLEND,
            y: previousPoint.y * LANDMARK_DECAY + point.y * LANDMARK_BLEND,
            z: (previousPoint.z ?? 0) * LANDMARK_DECAY + (point.z ?? 0) * LANDMARK_BLEND,
          };
        });
      }

      function getOvalAnchorTargets(width, height) {
        const anchors = getFixedFeatureAnchors(width, height);
        const center = anchors.ovalCenter;
        return FACE_OVAL_INDICES.map((_, index) => {
          const angle = -Math.PI / 2 + (index / FACE_OVAL_INDICES.length) * Math.PI * 2;
          return {
            x: center.x + Math.cos(angle) * (FIXED_OVAL_WIDTH / 2),
            y: center.y + Math.sin(angle) * (FIXED_OVAL_HEIGHT / 2),
          };
        });
      }

      function deformMeshToCanonicalOval(meshPoints, width, height) {
        const sourceAnchors = getMeshFeatureAnchors(meshPoints);
        if (!sourceAnchors) return null;

        const fixedAnchors = getFixedFeatureAnchors(width, height);
        const ovalTargets = getOvalAnchorTargets(width, height);

        const controlPairs = [
          { source: sourceAnchors.leftEye, target: fixedAnchors.leftEye },
          { source: sourceAnchors.rightEye, target: fixedAnchors.rightEye },
          { source: sourceAnchors.nose, target: fixedAnchors.nose },
          { source: sourceAnchors.mouth, target: fixedAnchors.mouth },
          ...FACE_OVAL_INDICES.map((index, ovalIndex) => ({
            source: meshPoints[index],
            target: ovalTargets[ovalIndex],
          })),
        ];

        return meshPoints.map((point) => {
          let totalWeight = 0;
          let deltaX = 0;
          let deltaY = 0;

          for (const pair of controlPairs) {
            const distance = Math.hypot(point.x - pair.source.x, point.y - pair.source.y);
            if (distance < EPSILON) {
              return {
                x: pair.target.x,
                y: pair.target.y,
                z: point.z ?? 0,
              };
            }

            const weight = 1 / Math.pow(distance, IDW_POWER);
            totalWeight += weight;
            deltaX += (pair.target.x - pair.source.x) * weight;
            deltaY += (pair.target.y - pair.source.y) * weight;
          }

          return {
            x: point.x + deltaX / Math.max(totalWeight, EPSILON),
            y: point.y + deltaY / Math.max(totalWeight, EPSILON),
            z: point.z ?? 0,
          };
        });
      }

      function drawCanonicalMesh(ctx, meshPoints, canonicalMesh) {
        ctx.clearRect(0, 0, landmarksAveragingCanvas.width, landmarksAveragingCanvas.height);
        if (!meshPoints || !canonicalMesh) return;

        ctx.save();
        ctx.strokeStyle = "rgba(170, 255, 180, 0.18)";
        ctx.lineWidth = 0.9;

        for (const [aIndex, bIndex, cIndex] of TESSELATION_TRIANGLES) {
          const a = canonicalMesh[aIndex];
          const b = canonicalMesh[bIndex];
          const c = canonicalMesh[cIndex];
          if (!a || !b || !c) continue;

          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.lineTo(c.x, c.y);
          ctx.closePath();
          ctx.stroke();
        }

        ctx.restore();
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function boundingBox(triangle, width, height) {
        const xs = triangle.map((point) => point.x);
        const ys = triangle.map((point) => point.y);

        return {
          minX: clamp(Math.floor(Math.min(...xs)), 0, width - 1),
          maxX: clamp(Math.ceil(Math.max(...xs)), 0, width - 1),
          minY: clamp(Math.floor(Math.min(...ys)), 0, height - 1),
          maxY: clamp(Math.ceil(Math.max(...ys)), 0, height - 1),
        };
      }

      function barycentric(point, triangle) {
        const [a, b, c] = triangle;
        const denom = (b.y - c.y) * (a.x - c.x) + (c.x - b.x) * (a.y - c.y);

        if (Math.abs(denom) < 1e-6) {
          return null;
        }

        const u = ((b.y - c.y) * (point.x - c.x) + (c.x - b.x) * (point.y - c.y)) / denom;
        const v = ((c.y - a.y) * (point.x - c.x) + (a.x - c.x) * (point.y - c.y)) / denom;
        const w = 1 - u - v;

        return [u, v, w];
      }

      function pointInTriangle(point, triangle) {
        const weights = barycentric(point, triangle);
        if (!weights) return false;

        const epsilon = 1e-4;
        return weights.every((weight) => weight >= -epsilon && weight <= 1 + epsilon);
      }

      function sampleBilinear(imageData, x, y) {
        const { width, height, data } = imageData;
        const clampedX = clamp(x, 0, width - 1);
        const clampedY = clamp(y, 0, height - 1);
        const x0 = Math.floor(clampedX);
        const y0 = Math.floor(clampedY);
        const x1 = Math.min(x0 + 1, width - 1);
        const y1 = Math.min(y0 + 1, height - 1);
        const dx = clampedX - x0;
        const dy = clampedY - y0;

        function read(ix, iy) {
          const offset = (iy * width + ix) * 4;
          return [data[offset], data[offset + 1], data[offset + 2], data[offset + 3]];
        }

        const c00 = read(x0, y0);
        const c10 = read(x1, y0);
        const c01 = read(x0, y1);
        const c11 = read(x1, y1);

        const result = [0, 0, 0, 0];
        for (let channel = 0; channel < 4; channel += 1) {
          const top = c00[channel] * (1 - dx) + c10[channel] * dx;
          const bottom = c01[channel] * (1 - dx) + c11[channel] * dx;
          result[channel] = top * (1 - dy) + bottom * dy;
        }

        return result;
      }

      function writePixel(imageData, x, y, color) {
        const offset = (y * imageData.width + x) * 4;
        imageData.data[offset] = color[0];
        imageData.data[offset + 1] = color[1];
        imageData.data[offset + 2] = color[2];
        imageData.data[offset + 3] = color[3];
      }

      function copyImageData(imageData) {
        return new ImageData(new Uint8ClampedArray(imageData.data), imageData.width, imageData.height);
      }

      function warpTriangle(sourceImageData, targetImageData, sourceTriangle, targetTriangle) {
        const touchedPixels = [];
        const box = boundingBox(targetTriangle, targetImageData.width, targetImageData.height);

        for (let y = box.minY; y <= box.maxY; y += 1) {
          for (let x = box.minX; x <= box.maxX; x += 1) {
            const point = { x: x + 0.5, y: y + 0.5 };
            if (!pointInTriangle(point, targetTriangle)) continue;

            const weights = barycentric(point, targetTriangle);
            if (!weights) continue;

            const sourcePoint = {
              x: weights[0] * sourceTriangle[0].x + weights[1] * sourceTriangle[1].x + weights[2] * sourceTriangle[2].x,
              y: weights[0] * sourceTriangle[0].y + weights[1] * sourceTriangle[1].y + weights[2] * sourceTriangle[2].y,
            };

            const color = sampleBilinear(sourceImageData, sourcePoint.x, sourcePoint.y);
            writePixel(targetImageData, x, y, color);
            touchedPixels.push((y * targetImageData.width + x) * 4);
          }
        }

        return touchedPixels;
      }

      function morphFaceMesh(sourceImageData, sourceMesh, targetMesh) {
        const outputImageData = copyImageData(sourceImageData);
        let wroteAnyPixel = false;

        for (const [aIndex, bIndex, cIndex] of TESSELATION_TRIANGLES) {
          const sourceTriangle = [sourceMesh[aIndex], sourceMesh[bIndex], sourceMesh[cIndex]];
          const targetTriangle = [targetMesh[aIndex], targetMesh[bIndex], targetMesh[cIndex]];

          if (sourceTriangle.some((point) => !point) || targetTriangle.some((point) => !point)) {
            continue;
          }

          const touchedPixels = warpTriangle(sourceImageData, outputImageData, sourceTriangle, targetTriangle);
          wroteAnyPixel = wroteAnyPixel || touchedPixels.length > 0;
        }

        return wroteAnyPixel ? outputImageData : null;
      }

      function getMeshBounds(meshPoints, width, height, padding = 24) {
        const ovalPoints = FACE_OVAL_INDICES.map((index) => meshPoints[index]).filter(Boolean);
        if (!ovalPoints.length) return null;

        const xs = ovalPoints.map((point) => point.x);
        const ys = ovalPoints.map((point) => point.y);
        const minX = clamp(Math.floor(Math.min(...xs)) - padding, 0, width);
        const minY = clamp(Math.floor(Math.min(...ys)) - padding, 0, height);
        const maxX = clamp(Math.ceil(Math.max(...xs)) + padding, 0, width);
        const maxY = clamp(Math.ceil(Math.max(...ys)) + padding, 0, height);

        return {
          minX,
          minY,
          maxX,
          maxY,
          width: Math.max(0, maxX - minX),
          height: Math.max(0, maxY - minY),
        };
      }

      function createWrappedFaceSnapshot(alignedMesh, targetMesh) {
        if (!alignedMesh || !targetMesh) return null;

        const bounds = getMeshBounds(alignedMesh, rawInputCanvas.width, rawInputCanvas.height);
        if (!bounds || bounds.width <= 0 || bounds.height <= 0) {
          return null;
        }

        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = faceWrapSnapshotCanvas.width;
        tempCanvas.height = faceWrapSnapshotCanvas.height;
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(alignedFaceCanvas, 0, 0);

        const sourceImageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const wrappedImageData = morphFaceMesh(sourceImageData, alignedMesh, targetMesh);
        if (!wrappedImageData) return null;

        tempCtx.putImageData(wrappedImageData, 0, 0);
        return tempCanvas;
      }

      function drawWrappedFaceSnapshot(ctx, alignedMesh, targetMesh) {
        const wrappedCanvas = createWrappedFaceSnapshot(alignedMesh, targetMesh);
        if (!wrappedCanvas) return false;

        ctx.clearRect(0, 0, faceWrapSnapshotCanvas.width, faceWrapSnapshotCanvas.height);
        ctx.drawImage(wrappedCanvas, 0, 0);
        return true;
      }

      function drawWrappedFacesOverlay(ctx, wrappedCanvas) {
        if (!wrappedCanvas) return;

        ctx.save();
        ctx.globalAlpha = FACE_WRAP_OVERLAY_ALPHA;
        ctx.drawImage(wrappedCanvas, 0, 0);
        ctx.restore();
      }

      async function processOneFrame() {
        if (!faceLandmarker || isProcessing) return;

        isProcessing = true;
        try {
          const params = faceStream.next().value;
          drawFace(rawInputCtx, params);
          drawAlignedFace(alignedFaceCtx, params);

          const result = faceLandmarker.detect(rawInputCanvas);
          const faceMesh = result.faceLandmarks?.[0];
          if (!faceMesh) {
            return;
          }

          const meshPoints = faceMesh.map((point) => normalizedToCanvasPoint(point, landmarksCanvas.width, landmarksCanvas.height));
          const aligned = alignMesh(meshPoints, landmarksCanvas.width, landmarksCanvas.height);
          if (!aligned) {
            return;
          }

          drawAlignedMesh(landmarksCtx, aligned.points);
          updateAveragedMesh(aligned.points);

          const canonicalMesh = deformMeshToCanonicalOval(averagedMesh, faceWrappingCanvas.width, faceWrappingCanvas.height);
          drawCanonicalMesh(landmarksAveragingCtx, averagedMesh, canonicalMesh);

          if (!canonicalMesh) {
            faceWrapSnapshotCtx.clearRect(0, 0, faceWrapSnapshotCanvas.width, faceWrapSnapshotCanvas.height);
            return;
          }

          const wrappedCanvas = createWrappedFaceSnapshot(aligned.points, canonicalMesh);

          if (wrappedCanvas) {
            faceWrapSnapshotCtx.clearRect(0, 0, faceWrapSnapshotCanvas.width, faceWrapSnapshotCanvas.height);
            faceWrapSnapshotCtx.drawImage(wrappedCanvas, 0, 0);
            drawWrappedFacesOverlay(faceWrappingCtx, wrappedCanvas);
          } else {
            faceWrapSnapshotCtx.clearRect(0, 0, faceWrapSnapshotCanvas.width, faceWrapSnapshotCanvas.height);
          }
        } catch (err) {
          console.error(err);
        } finally {
          isProcessing = false;
        }
      }

      async function tick() {
        if (isHolding) {
          await processOneFrame();
        }
        rafId = requestAnimationFrame(tick);
      }

      rawInputCanvas.addEventListener("mousedown", () => {
        isHolding = true;
      });

      window.addEventListener("mouseup", () => {
        isHolding = false;
      });

      rawInputCanvas.addEventListener("mouseleave", () => {
        isHolding = false;
      });

      await initializeFaceLandmarker();
      confidenceValue.textContent = Number(confidenceInput.value).toFixed(2);

      drawFace(rawInputCtx, faceStream.next().value);
      tick();
    </script>
  </body>
