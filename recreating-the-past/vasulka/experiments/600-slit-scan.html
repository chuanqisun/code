<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glitch</title>
    <style>
      body {
        font-family: sans-serif;
      }
      canvas,
      video {
        border: 1px solid #000;
        display: block;
      }
    </style>
  </head>
  <body>
    <div style="margin-bottom: 12px">
      <button id="startBtn">Start Webcam</button>
      <button id="slowBtn" type="button">Hold To Slow</button>
    </div>

    <video id="video" autoplay playsinline muted style="display: none"></video>

    <canvas id="liveCanvas" width="320" height="240"></canvas>
    <canvas id="historyCanvas" width="320" height="240"></canvas>
    <input id="historySlider" type="range" min="0" max="0" value="0" step="1" style="display: block; width: 320px; margin-top: 8px" />
    <pre id="stats" style="margin-top: 12px">[]</pre>

    <script>
      const video = document.getElementById("video");
      const startBtn = document.getElementById("startBtn");
      const slowBtn = document.getElementById("slowBtn");
      const liveCanvas = document.getElementById("liveCanvas");
      const historyCanvas = document.getElementById("historyCanvas");
      const historySlider = document.getElementById("historySlider");
      const stats = document.getElementById("stats");
      const liveCtx = liveCanvas.getContext("2d");
      const historyCtx = historyCanvas.getContext("2d");
      let isManualSlowActive = false;
      let isHandSlowActive = false;
      let isSlowPlaybackActive = false;

      const smoothedHandDepths = [];
      const smoothedHandOpenness = [];
      const handPresenceFrameCounts = [];
      const HAND_INITIAL_PRESENCE_FRAME_COUNT = 10;
      const HISTORY_FRAME_LIMIT = 40;
      const FINGERTIP_INDICES = [4, 8, 12, 16, 20];
      const TIME_DILATION_FACTOR = 0.5;
      const TIME_CONTRACTION_FACTOR = 4;
      const DEPTH_SMOOTHING_FACTOR = 0.5;
      const OPENNESS_SMOOTHING_FACTOR = 0.8;
      const OPEN_THRESHOLD = 0.05;

      class WebcamController {
        constructor(videoElement) {
          this.video = videoElement;
          this.running = false;
          this.startPromise = null;
        }

        async start() {
          if (this.startPromise) {
            return this.startPromise;
          }

          if (this.running) {
            return;
          }

          this.startPromise = this.startInternal();

          try {
            await this.startPromise;
          } finally {
            this.startPromise = null;
          }
        }

        async startInternal() {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 320, height: 240 },
            audio: false,
          });

          this.video.srcObject = stream;
          await this.video.play();
          this.running = true;
        }
      }

      const webcam = new WebcamController(video);

      class HistoryFrameManager {
        constructor({ sourceVideo, sourceCanvas, targetCanvas, targetContext, slider, frameLimit }) {
          this.sourceVideo = sourceVideo;
          this.sourceCanvas = sourceCanvas;
          this.targetCanvas = targetCanvas;
          this.targetContext = targetContext;
          this.slider = slider;
          this.frameLimit = frameLimit;
          this.frames = [];
          this.selectedFrameIndex = 0;
          this.followsLatestFrame = true;
          this.playbackCursor = 0;
          this.playbackRate = 1;
          this.isCatchUpPlaybackActive = false;

          this.slider.addEventListener("input", () => {
            const nextIndex = Number.parseInt(this.slider.value, 10);
            this.selectedFrameIndex = Number.isNaN(nextIndex) ? 0 : nextIndex;
            this.playbackCursor = this.selectedFrameIndex;
            this.followsLatestFrame = this.selectedFrameIndex >= this.frames.length - 1;
            this.render();
          });
        }

        setPlaybackRate(nextRate) {
          if (typeof nextRate !== "number" || Number.isNaN(nextRate) || nextRate <= 0) {
            return;
          }

          this.isCatchUpPlaybackActive = false;
          this.playbackRate = nextRate;
        }

        startCatchUpPlayback() {
          const maxIndex = Math.max(this.frames.length - 1, 0);

          if (this.playbackCursor >= maxIndex) {
            this.isCatchUpPlaybackActive = false;
            this.playbackRate = 1;
            return;
          }

          this.isCatchUpPlaybackActive = true;
          this.playbackRate = TIME_CONTRACTION_FACTOR;
        }

        captureFrame() {
          const frame = document.createElement("canvas");
          frame.width = this.sourceCanvas.width;
          frame.height = this.sourceCanvas.height;
          frame.getContext("2d").drawImage(this.sourceVideo, 0, 0, frame.width, frame.height);

          this.frames.push(frame);

          if (this.frames.length > this.frameLimit) {
            this.frames.shift();
            this.playbackCursor = Math.max(this.playbackCursor - 1, 0);
            this.selectedFrameIndex = Math.max(this.selectedFrameIndex - 1, 0);
          }

          if (this.followsLatestFrame) {
            this.advancePlayback();
          }

          this.syncSlider();
        }

        advancePlayback() {
          const maxIndex = Math.max(this.frames.length - 1, 0);

          if (maxIndex === 0) {
            this.playbackCursor = 0;
            this.selectedFrameIndex = 0;
            return;
          }

          this.playbackCursor = Math.min(this.playbackCursor + this.playbackRate, maxIndex);
          this.selectedFrameIndex = Math.min(Math.floor(this.playbackCursor), maxIndex);

          if (this.isCatchUpPlaybackActive && this.playbackCursor >= maxIndex) {
            this.isCatchUpPlaybackActive = false;
            this.playbackRate = 1;
          }
        }

        render() {
          this.targetContext.clearRect(0, 0, this.targetCanvas.width, this.targetCanvas.height);

          if (this.frames.length === 0) {
            return;
          }

          const frameCount = this.frames.length;
          const destinationSlitWidth = this.targetCanvas.width / frameCount;
          const sourceSlitWidth = Math.max(this.sourceCanvas.width / frameCount, 1);

          for (const [frameIndex, frame] of this.frames.entries()) {
            const destinationX = frameIndex * destinationSlitWidth;
            const nextDestinationX = (frameIndex + 1) * destinationSlitWidth;
            const destinationWidth = nextDestinationX - destinationX;
            const sourceX = Math.min(frameIndex * sourceSlitWidth, Math.max(this.sourceCanvas.width - sourceSlitWidth, 0));

            this.targetContext.drawImage(frame, sourceX, 0, sourceSlitWidth, frame.height, destinationX, 0, destinationWidth, this.targetCanvas.height);
          }
        }

        syncSlider() {
          const maxIndex = Math.max(this.frames.length - 1, 0);

          if (this.followsLatestFrame) {
            this.playbackCursor = Math.min(this.playbackCursor, maxIndex);
            this.selectedFrameIndex = Math.min(Math.floor(this.playbackCursor), maxIndex);
          } else {
            this.selectedFrameIndex = Math.min(this.selectedFrameIndex, maxIndex);
            this.playbackCursor = this.selectedFrameIndex;
          }

          this.slider.max = String(maxIndex);
          this.slider.value = String(this.selectedFrameIndex);
          this.slider.disabled = this.frames.length <= 1;
        }
      }

      const historyFrameManager = new HistoryFrameManager({
        sourceVideo: video,
        sourceCanvas: liveCanvas,
        targetCanvas: historyCanvas,
        targetContext: historyCtx,
        slider: historySlider,
        frameLimit: HISTORY_FRAME_LIMIT,
      });

      function setSlowPlaybackState(isSlow) {
        if (isSlowPlaybackActive === isSlow) {
          return;
        }

        isSlowPlaybackActive = isSlow;

        if (isSlow) {
          historyFrameManager.setPlaybackRate(TIME_DILATION_FACTOR);
        } else {
          historyFrameManager.startCatchUpPlayback();
        }

        slowBtn.dataset.active = isSlow ? "true" : "false";
      }

      function syncSlowPlaybackState() {
        setSlowPlaybackState(isManualSlowActive || isHandSlowActive);
      }

      slowBtn.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        isManualSlowActive = true;
        syncSlowPlaybackState();
      });

      window.addEventListener("pointerup", () => {
        isManualSlowActive = false;
        syncSlowPlaybackState();
      });

      window.addEventListener("pointercancel", () => {
        isManualSlowActive = false;
        syncSlowPlaybackState();
      });

      startBtn.addEventListener("click", async () => {
        const handLandmarker = await initializeHandLandmarker();

        async function processFrame() {
          liveCtx.drawImage(video, 0, 0, liveCanvas.width, liveCanvas.height);
          const handLandmarks = await getHandLandmarksForVideoFrame(video, handLandmarker);
          const handMetrics = calculateHandMetrics(handLandmarks);
          updateHandSlowState(handMetrics);
          historyFrameManager.captureFrame();
          historyFrameManager.render();
          renderHandMarkers(handLandmarks, liveCanvas.width, liveCanvas.height);
          logHandStats(handLandmarks, handMetrics);
          requestAnimationFrame(processFrame);
        }

        await webcam.start();
        requestAnimationFrame(processFrame);
      });

      async function initializeHandLandmarker() {
        try {
          const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34");
          const filesetResolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm");

          handLandmarker = await vision.HandLandmarker.createFromOptions(filesetResolver, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
              delegate: "GPU",
            },
            runningMode: "VIDEO",
            numHands: 2,
            minHandDetectionConfidence: 0.5,
            minHandPresenceConfidence: 0.5,
            minTrackingConfidence: 0.5,
          });

          return handLandmarker;
        } catch (error) {
          console.error("Failed to initialize MediaPipe hand landmarker", error);
          throw error;
        }
      }

      async function getHandLandmarksForVideoFrame(videoFrame, handLandmarker) {
        if (!handLandmarker) {
          return [];
        }

        const result = handLandmarker.detectForVideo(videoFrame, performance.now());
        return result.landmarks ?? [];
      }

      function calculateHandMetrics(handLandmarks) {
        const metrics = [];

        for (const [handIndex, hand] of (handLandmarks ?? []).entries()) {
          if (Array.isArray(hand) && hand.length > 0) {
            handPresenceFrameCounts[handIndex] = (handPresenceFrameCounts[handIndex] ?? 0) + 1;
          } else {
            handPresenceFrameCounts[handIndex] = 0;
            smoothedHandOpenness[handIndex] = undefined;
          }

          const fingertips = [];
          let zTotal = 0;
          let zCount = 0;

          for (const landmarkIndex of FINGERTIP_INDICES) {
            const landmark = hand?.[landmarkIndex];

            if (!landmark) {
              continue;
            }
            fingertips.push(landmark);

            if (typeof landmark.z === "number" && !Number.isNaN(landmark.z)) {
              zTotal += landmark.z;
              zCount += 1;
            }
          }

          if (zCount === 0) {
            metrics.push({ averageZ: undefined, openness: undefined });
            continue;
          }

          const averageZ = zTotal / zCount;
          const previousZ = smoothedHandDepths[handIndex];
          const smoothedZ = smoothWithExponentialDecay(previousZ, averageZ, DEPTH_SMOOTHING_FACTOR);
          let smoothedOpenness;

          if (handPresenceFrameCounts[handIndex] >= HAND_INITIAL_PRESENCE_FRAME_COUNT) {
            const openness = calculateAverageDistanceFromCenter(fingertips);
            const previousOpenness = smoothedHandOpenness[handIndex];
            smoothedOpenness = smoothWithExponentialDecay(previousOpenness, openness, OPENNESS_SMOOTHING_FACTOR);
          }

          smoothedHandDepths[handIndex] = smoothedZ;
          smoothedHandOpenness[handIndex] = smoothedOpenness;
          metrics.push({ averageZ: smoothedZ, openness: smoothedOpenness });
        }

        smoothedHandDepths.length = metrics.length;
        smoothedHandOpenness.length = metrics.length;
        handPresenceFrameCounts.length = metrics.length;

        return metrics;
      }

      function calculateAverageDistanceFromCenter(landmarks) {
        if (!Array.isArray(landmarks) || landmarks.length === 0) {
          return undefined;
        }

        let xTotal = 0;
        let yTotal = 0;
        let zTotal = 0;

        for (const landmark of landmarks) {
          xTotal += landmark.x;
          yTotal += landmark.y;
          zTotal += landmark.z;
        }

        const centerX = xTotal / landmarks.length;
        const centerY = yTotal / landmarks.length;
        const centerZ = zTotal / landmarks.length;

        let distanceTotal = 0;

        for (const landmark of landmarks) {
          const dx = landmark.x - centerX;
          const dy = landmark.y - centerY;
          const dz = landmark.z - centerZ;
          distanceTotal += Math.hypot(dx, dy, dz);
        }

        return distanceTotal / landmarks.length;
      }

      function smoothWithExponentialDecay(previousValue, nextValue, smoothingFactor) {
        if (typeof nextValue !== "number" || Number.isNaN(nextValue)) {
          return undefined;
        }

        if (typeof previousValue !== "number" || Number.isNaN(previousValue)) {
          return nextValue;
        }

        return previousValue + (nextValue - previousValue) * smoothingFactor;
      }

      function updateHandSlowState(handMetrics) {
        isHandSlowActive = (handMetrics ?? []).some(({ openness }) => typeof openness === "number" && openness > OPEN_THRESHOLD);
        syncSlowPlaybackState();
      }

      function renderHandMarkers(handLandmarks, width, height) {
        for (const [handIndex, hand] of (handLandmarks ?? []).entries()) {
          const smoothedOpenness = smoothedHandOpenness[handIndex];
          liveCtx.fillStyle = typeof smoothedOpenness === "number" && smoothedOpenness > OPEN_THRESHOLD ? "#00ffff" : "#ff0000";

          for (const landmarkIndex of FINGERTIP_INDICES) {
            const landmark = hand?.[landmarkIndex];

            if (!landmark) {
              continue;
            }

            drawMarkerDot(landmark.x * width, landmark.y * height);
          }
        }
      }

      function logHandStats(handLandmarks, handMetrics) {
        const fingertipStats = [];

        for (const [handIndex, hand] of (handLandmarks ?? []).entries()) {
          for (const landmarkIndex of FINGERTIP_INDICES) {
            const landmark = hand?.[landmarkIndex];

            if (!landmark) {
              continue;
            }

            fingertipStats.push(
              [
                `hand=${handIndex}`,
                `finger=${landmarkIndex}`,
                `x=${formatCoordinate(landmark.x)}`,
                `y=${formatCoordinate(landmark.y)}`,
                `z=${formatCoordinate(landmark.z)}`,
              ].join(" ")
            );
          }

          const smoothedZ = handMetrics?.[handIndex]?.averageZ;
          const smoothedOpenness = handMetrics?.[handIndex]?.openness;

          if (typeof smoothedZ === "number") {
            fingertipStats.push(`hand=${handIndex} z=${formatCoordinate(smoothedZ)}`);
          }

          if (typeof smoothedOpenness === "number") {
            fingertipStats.push(`hand=${handIndex} openness=${formatCoordinate(smoothedOpenness)}`);
          }
        }

        stats.textContent = fingertipStats.join("\n") || "No fingertips detected";
      }

      function formatCoordinate(value) {
        if (typeof value !== "number" || Number.isNaN(value)) return "n/a";
        return value.toFixed(4);
      }

      function drawMarkerDot(x, y) {
        liveCtx.beginPath();
        liveCtx.arc(x, y, 5, 0, Math.PI * 2);
        liveCtx.fill();
      }
    </script>
  </body>
</html>
